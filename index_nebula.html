// ─── Star generation ──────────────────────────────────────────────────────
function generateStaticStars(count) {
	STATIC_STARS = [];
	for (var i = 0; i < count; i++) {
		var r = Math.random();
		var size, baseAlpha, colors;
		if (r < 0.68) {
			size      = 0.4 + Math.random() * 0.5;
			baseAlpha = 0.12 + Math.random() * 0.28;
			colors    = [200, 210, 245];
		} else if (r < 0.91) {
			size      = 0.9 + Math.random() * 0.7;
			baseAlpha = 0.40 + Math.random() * 0.35;
			var hue = Math.random();
			if      (hue < 0.25) colors = [185, 200, 255];  // blue-white
			else if (hue < 0.50) colors = [255, 245, 215];  // warm yellow-white
			else if (hue < 0.75) colors = [225, 185, 255];  // lavender
			else                 colors = [185, 255, 240];  // aqua
		} else {
			size      = 1.4 + Math.random() * 1.6;
			baseAlpha = 0.72 + Math.random() * 0.28;
			colors    = [255, 255, 255];
		}
		STATIC_STARS.push({
			x: Math.random() * 1300,
			y: Math.random() * 700,
			size: size,
			baseAlpha: baseAlpha,
			colors: colors
		});
	}
}

// ─── Draw static star field + deep space gradient ─────────────────────────
function drawStaticStarField(bmd) {
	var ctx = bmd.context;
	// Deep space multi-tone gradient
	var grad = ctx.createLinearGradient(0, 0, 0, 700);
	grad.addColorStop(0,    '#010012');
	grad.addColorStop(0.28, '#030018');
	grad.addColorStop(0.50, '#060025');
	grad.addColorStop(0.72, '#030015');
	grad.addColorStop(1,    '#010008');
	ctx.fillStyle = grad;
	ctx.fillRect(0, 0, 1300, 700);

	for (var i = 0; i < STATIC_STARS.length; i++) {
		var s = STATIC_STARS[i];
		var r = s.colors[0], g = s.colors[1], b = s.colors[2];

		if (s.size > 1.2) {
			var gr = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 4.5);
			gr.addColorStop(0, 'rgba(' + r + ',' + g + ',' + b + ',' + (s.baseAlpha * 0.55) + ')');
			gr.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');
			ctx.fillStyle = gr;
			ctx.beginPath();
			ctx.arc(s.x, s.y, s.size * 4.5, 0, Math.PI * 2);
			ctx.fill();
		}

		ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + s.baseAlpha + ')';
		ctx.beginPath();
		ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
		ctx.fill();
	}
	bmd.dirty = true;
}

function drawNebulae(bmd, t) {
	var ctx = bmd.context;
	ctx.clearRect(0, 0, 1300, 700);

	// Seven nebulae, each drifting on a slow sinusoidal path

		// Giant violet cloud — upper left quadrant

		  dx: Math.sin(t*0.0048+2)*18, dy: Math.cos(t*0.0062)*10 }
	];

	neb.forEach(function(n) {
		var cx = n.cx + n.dx;
		var cy = n.cy + n.dy;
		// Two passes: outer diffuse + inner concentrated
		for (var pass = 0; pass < 2; pass++) {

			var breathe = 1.0 + 0.18 * Math.sin(t * 0.012 + pass * 1.4);

			ctx.save();
			ctx.translate(cx + ox, cy + oy);
			ctx.scale(1, n.ry / n.rx);
			var grad = ctx.createRadialGradient(0, 0, 0, 0, 0, n.rx);
			grad.addColorStop(0,    'rgba(' + n.r + ',' + n.g + ',' + n.b + ',' + (a0 * 1.30) + ')');
			grad.addColorStop(0.30, 'rgba(' + n.r + ',' + n.g + ',' + n.b + ',' + (a0 * 0.95) + ')');
			grad.addColorStop(0.60, 'rgba(' + n.r + ',' + n.g + ',' + n.b + ',' + (a0 * 0.42) + ')');
			grad.addColorStop(1,    'rgba(' + n.r + ',' + n.g + ',' + n.b + ',0)');
			ctx.fillStyle = grad;
			ctx.beginPath();
			ctx.arc(0, 0, n.rx, 0, Math.PI * 2);
			ctx.fill();
			ctx.restore();
		}
	});

	// Galactic rift — soft central glow band

	ctx.fillRect(0, 288, 1300, 124);

}

// ─── Twinkling bright star layer ──────────────────────────────────────────
function updateTwinkle(t) {
	var ctx = twinkleBmd.context;
	ctx.clearRect(0, 0, 1300, 700);

	for (var i = 0; i < TWINKLE_STARS.length; i++) {
		var s = TWINKLE_STARS[i];
		// Smooth sinusoidal alpha pulse
		var alpha = 0.35 + 0.65 * Math.abs(Math.sin(t * s.freq + s.phase));
		alpha = Math.max(0.05, Math.min(0.95, alpha));
		var r = s.colors[0], g = s.colors[1], b = s.colors[2];

		// Sparkle cross-rays when near peak brightness
		if (alpha > 0.72) {
			var rayLen = s.size * 4.5 * ((alpha - 0.72) * 3.5);
			ctx.save();
			ctx.strokeStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + (alpha * 0.38) + ')';
			ctx.lineWidth = 0.6;
			ctx.beginPath();
			ctx.moveTo(s.x - rayLen, s.y);
			ctx.lineTo(s.x + rayLen, s.y);
			ctx.stroke();
			ctx.beginPath();
			ctx.moveTo(s.x, s.y - rayLen * 0.65);
			ctx.lineTo(s.x, s.y + rayLen * 0.65);
			ctx.stroke();
			ctx.restore();
		}

		// Soft outer glow
		var glowGrad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 6.0);
		glowGrad.addColorStop(0,   'rgba(' + r + ',' + g + ',' + b + ',' + (alpha * 0.50) + ')');
		glowGrad.addColorStop(0.45,'rgba(' + r + ',' + g + ',' + b + ',' + (alpha * 0.14) + ')');
		glowGrad.addColorStop(1,   'rgba(' + r + ',' + g + ',' + b + ',0)');
		ctx.fillStyle = glowGrad;
		ctx.beginPath();
		ctx.arc(s.x, s.y, s.size * 6.0, 0, Math.PI * 2);
		ctx.fill();

		// Bright star core
		ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + Math.min(1.0, alpha * 1.2) + ')';
		ctx.beginPath();
		ctx.arc(s.x, s.y, s.size * alpha, 0, Math.PI * 2);
		ctx.fill();
	}
	twinkleBmd.dirty = true;
}

}

// ─── Phaser lifecycle ─────────────────────────────────────────────────────
function preload() {
	game.load.image('nuage',  'nuage.png');
	game.load.image('nuage2', 'nuage2.png');
	game.load.image('field',  'field.png');
	game.load.image('fond',   'fond.png');
	game.load.image('fond2',  'fond2.png');
}

function create() {
	game.time.desiredFps = 30;
	game.stage.backgroundColor = '#010010';

	generateStaticStars(680);
	generateTwinkleStars();

	// Layer 1: deep space + static stars
	starsBmd = game.add.bitmapData(1300, 700);
	drawStaticStarField(starsBmd);
	starsSprite = game.add.image(0, 0, starsBmd);

	// Layer 2: animated colorful nebulae
	nebulaeBmd = game.add.bitmapData(1300, 700);
	drawNebulae(nebulaeBmd, 0);
	nebulaSprite = game.add.image(0, 0, nebulaeBmd);

	// Layer 3: twinkling bright stars (transparent bitmapData, updated each frame)
	twinkleBmd = game.add.bitmapData(1300, 700);
	twinkleSprite = game.add.image(0, 0, twinkleBmd);

	// Layer 4: sky tile sprites — very transparent to let nebulae show
	fond  = game.add.tileSprite(0,   0, 1300, 400, 'fond');
	fond2 = game.add.tileSprite(0, 400, 1300, 300, 'fond2');
	fond.tint   = 0x060015;  // near-black violet tint
	fond2.tint  = 0x030010;  // even darker for reflection zone
	fond.alpha  = 0.42;
	fond2.alpha = 0.38;

	// Layer 5: cloud depth groups
	order0 = game.add.group();
	order1 = game.add.group();
	order2 = game.add.group();
	order3 = game.add.group();
	order4 = game.add.group();
	order5 = game.add.group();
	order6 = game.add.group();
	order7 = game.add.group();
	order8 = game.add.group();
	order9 = game.add.group();
}

function update() {
	timer++;
	twinkleTime++;
	nebulaFrame++;

	// Update twinkling stars every frame
	updateTwinkle(twinkleTime);

	// Slowly re-render nebulae (every 22 frames ≈ ~1.4 fps drift animation)
	if (nebulaFrame % 22 === 0) {
		drawNebulae(nebulaeBmd, nebulaFrame);
	}

	// Shooting star system
	shootingStarTimer++;
	if (shootingStarTimer > 65 + randInt(0, 110)) {
		shootingStarTimer = 0;
		spawnShootingStar();
	}
	for (var s = shootingStars.length - 1; s >= 0; s--) {
		var ss = shootingStars[s];
		ss.sprite.x += ss.vx;
		ss.sprite.y += ss.vy;
		ss.life++;
		ss.sprite.alpha = 0.95 * (1 - ss.life / ss.maxLife);
		if (ss.life >= ss.maxLife || ss.sprite.x > 1650) {
			ss.sprite.destroy();
			ss.bmd.destroy();
			shootingStars.splice(s, 1);
		}
	}

	// ─ Pi digit cloud spawning ─
	if (timer > (pi[decimal + 1]) * densityDivider) {
		decimal++;
		timer = 0;

		var digit = pi[decimal];
		var tint  = NEBULA_TINTS[digit]  || 0xAA44FF;
		var tint2 = NEBULA_TINTS2[digit] || 0x440088;

		var hudPi = document.getElementById('hud-cosmos-pi');
		if (hudPi) hudPi.textContent = digit;

		nuages.push(game.add.tileSprite(-200, 400 - (digit * 34 - 15), 768, 312, 'nuage'));
		nuages[decimal].anchor.x = 0.7;
		nuages[decimal].anchor.y = 0.5;
		nuages[decimal].scale.setTo(digit / 10, digit / 10);
		nuages[decimal].alpha = 0.85;
		nuages[decimal].tint  = tint;

		nuages2.push(game.add.tileSprite(-200, 400 + (digit * 34 - 15), 768, 312, 'nuage2'));
		nuages2[decimal].anchor.x = 0.7;
		nuages2[decimal].anchor.y = 0.5;
		nuages2[decimal].scale.setTo(digit / 10, digit / 10);
		nuages2[decimal].alpha = 0.60;
		nuages2[decimal].tint  = tint2;

		switch (digit) {
			case 0: order0.add(nuages[decimal]); order0.add(nuages2[decimal]); break;
			case 1: order1.add(nuages[decimal]); order1.add(nuages2[decimal]); break;
			case 2: order2.add(nuages[decimal]); order2.add(nuages2[decimal]); break;
			case 3: order3.add(nuages[decimal]); order3.add(nuages2[decimal]); break;
			case 4: order4.add(nuages[decimal]); order4.add(nuages2[decimal]); break;
			case 5: order5.add(nuages[decimal]); order5.add(nuages2[decimal]); break;
			case 6: order6.add(nuages[decimal]); order6.add(nuages2[decimal]); break;
			case 7: order7.add(nuages[decimal]); order7.add(nuages2[decimal]); break;
			case 8: order8.add(nuages[decimal]); order8.add(nuages2[decimal]); break;
			case 9: order9.add(nuages[decimal]); order9.add(nuages2[decimal]); break;
		}
	}

	// Move all clouds
	while (jj <= decimal) {
		if (nuages[jj].x > 1800) {
			nuages[jj].destroy();
		}
		nuages[jj].x  += (pi[jj]) / Math.abs(velocityDivider);
		nuages2[jj].x += (pi[jj]) / Math.abs(velocityDivider);
		jj++;
	}
	jj = 0;

	// Depth sort (0 = furthest back, 9 = closest)
	game.world.bringToTop(order0);
	game.world.bringToTop(order1);
	game.world.bringToTop(order2);
	game.world.bringToTop(order3);
	game.world.bringToTop(order4);
	game.world.bringToTop(order5);
	game.world.bringToTop(order6);
	game.world.bringToTop(order7);
	game.world.bringToTop(order8);
	game.world.bringToTop(order9);
	fond2.bringToTop();
}
	</script>
</head>
<body>
	<div id="PIclouds" style="
		cursor: none;
		position: absolute;
		top:  0px;
		left: 0px;
		image-rendering: optimizeSpeed;
		image-rendering: -moz-crisp-edges;
		image-rendering: -o-crisp-edges;
		image-rendering: -webkit-optimize-contrast;
		image-rendering: optimize-contrast;
		-ms-interpolation-mode: nearest-neighbor;
		image-rendering: pixelated;">
	</div>

	<!-- Ambient CSS nebula colour wash on top of the canvas -->
	<div id="nebula-overlay"></div>

	<!-- HUD -->
	<div id="cosmos-hud">
		<span id="hud-cosmos-title">Nebula&nbsp;Cosmos</span>
		<span id="hud-cosmos-pi" title="Current digit of π"></span>
		<span id="hud-cosmos-label">π digit</span>
	</div>
</body>
</html>
