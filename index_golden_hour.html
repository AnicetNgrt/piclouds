<!DOCTYPE html>
<html>
<head>
	<title>Nuages de Pi — Heure Dorée</title>
	<meta charset="utf-8"/>
	<style>
	body {
		background-color: #A04B0A;
		overflow: hidden;
		margin: 0;
		padding: 0;
	}
	canvas { display: block; }

	/* Warm amber canvas glow — pulses gently like late afternoon haze */
	@keyframes goldenPulse {
		0%   { box-shadow: 0 0 40px 10px rgba(220, 120, 20, 0.40); }
		50%  { box-shadow: 0 0 65px 18px rgba(255, 160, 40, 0.30); }
		100% { box-shadow: 0 0 40px 10px rgba(220, 120, 20, 0.40); }
	}
	canvas {
		animation: goldenPulse 5s ease-in-out infinite;
		/* Warm colour grade: slight sepia lift, extra saturation, softened contrast */
		filter: sepia(0.18) brightness(1.06) saturate(1.28) contrast(0.93);
	}

	/* ── Lens flare elements ───────────────────────────────────────── */
	@keyframes lensFlarePulse {
		0%   { opacity: 0.52; transform: translate(-50%, -50%) scale(1.00); }
		50%  { opacity: 0.78; transform: translate(-50%, -50%) scale(1.10); }
		100% { opacity: 0.52; transform: translate(-50%, -50%) scale(1.00); }
	}

	/* Slower breathing for the outermost halos */
	@keyframes haloBreath {
		0%   { opacity: 0.30; transform: translate(-50%, -50%) scale(1.00); }
		60%  { opacity: 0.50; transform: translate(-50%, -50%) scale(1.06); }
		100% { opacity: 0.30; transform: translate(-50%, -50%) scale(1.00); }
	}

	.lens-flare {
		position: fixed;
		border-radius: 50%;
		pointer-events: none;
		/* screen blend so the flare glows additively over the canvas */
		mix-blend-mode: screen;
		z-index: 600;
		/* centre the element at its named position */
		transform: translate(-50%, -50%);
	}

	/* Sun — upper-right (canvas coords 1050, 70) */
	#flare-sun {
		width: 100px; height: 100px;
		top:  70px; left: 1050px;
		background: radial-gradient(circle,
			rgba(255,255,220,0.92) 0%,
			rgba(255,230,120,0.60) 28%,
			rgba(255,180, 50,0.28) 55%,
			rgba(255,120, 20,0.00) 100%);
		animation: lensFlarePulse 3.8s ease-in-out infinite;
	}

	/* Outer corona halo */
	#flare-corona {
		width: 260px; height: 260px;
		top:  70px; left: 1050px;
		background: radial-gradient(circle,
			rgba(255,200, 80,0.22) 0%,
			rgba(255,150, 30,0.08) 55%,
			rgba(255,100, 10,0.00) 100%);
		animation: haloBreath 5.2s ease-in-out infinite;
	}

	/* Secondary glints along the flare axis:
	   Axis = from sun (1050,70) through canvas centre (650,350) and beyond.
	   Each element is placed at a fraction t along that axis from the centre.
	   Axis vector from centre toward anti-sun: (-400, 280)             */

	/* t = -0.50 (between sun and centre) */
	#flare-a {
		width: 36px; height: 36px;
		top: 210px; left: 850px;
		background: radial-gradient(circle,
			rgba(255,220, 90,0.70) 0%,
			rgba(255,170, 40,0.00) 70%);
		animation: lensFlarePulse 3.8s ease-in-out 0.35s infinite;
	}

	/* t = 0 (canvas centre) */
	#flare-b {
		width: 20px; height: 20px;
		top: 350px; left: 650px;
		background: radial-gradient(circle,
			rgba(255,240,160,0.80) 0%,
			rgba(255,200, 80,0.00) 70%);
		animation: lensFlarePulse 3.8s ease-in-out 0.70s infinite;
	}

	/* t = 0.30 (30 % past centre, toward bottom-left) */
	#flare-c {
		width: 56px; height: 56px;
		top: 434px; left: 530px;
		background: radial-gradient(circle,
			rgba(210,170,255,0.38) 0%,
			rgba(180,120,255,0.00) 70%);
		animation: lensFlarePulse 3.8s ease-in-out 1.05s infinite;
	}

	/* t = 0.60 (60 % past centre) */
	#flare-d {
		width: 16px; height: 16px;
		top: 518px; left: 410px;
		background: radial-gradient(circle,
			rgba(255,255,180,0.90) 0%,
			rgba(255,230, 80,0.00) 70%);
		animation: lensFlarePulse 3.8s ease-in-out 1.40s infinite;
	}

	/* t = 0.90 (90 % past centre, large diffuse) */
	#flare-e {
		width: 80px; height: 80px;
		top: 602px; left: 290px;
		background: radial-gradient(circle,
			rgba(255,150, 40,0.28) 0%,
			rgba(255,100, 10,0.00) 70%);
		animation: haloBreath 5.2s ease-in-out 1.80s infinite;
	}

	/* ── Warm horizon glow (HTML overlay, not canvas) ─────────────── */
	#horizon-glow {
		position: fixed;
		left: 0; right: 0;
		bottom: 0;
		height: 45vh;
		background: linear-gradient(to top,
			rgba(255, 100, 10, 0.20) 0%,
			rgba(255, 150, 40, 0.10) 40%,
			rgba(255, 180, 60, 0.00) 100%);
		pointer-events: none;
		z-index: 10;
	}
	</style>
	<script type="text/javascript" src="phaser.min.js"></script>
	<script>
// =============================================================
// Nuages de Pi — Heure Dorée (Golden Hour) Theme
//
// Warm amber sky just before sunset.  Key visual signature:
//   • Soft layered sun disc with atmospheric scatter
//   • Eight-ray star-burst (lens star) emanating from sun
//   • CSS lens-flare chain from sun to bottom-left corner
//   • 80 dust-mote particles drifting slowly upward, each
//     breathing in opacity to simulate specks in golden light
//   • Sparse, unhurried clouds (densityDivider 5.5 / velocity 0.9)
//     tinted warm gold on top, burnt-amber underneath
//   • Canvas filtered to sepia+saturation for overall warmth
// =============================================================

var game = new Phaser.Game(1300, 700, Phaser.CANVAS, 'PIclouds',
	{ preload: preload, create: create, update: update }, false, false);

// Sparser and slower: the lazy drift of late-afternoon clouds
var nuages = []; var densityDivider = 5.5; var velocityDivider = 0.9;
var nuages2 = []; var field; var fond; var fond2;
var nn = 0; var jj = 0; var sum = 0; var lock = 0;
var decimal = -1;
var pi = [3,1,4,1,5,9,2,6,5,3,5,8,9,7,9,3,2,3,8,4,6,2,6,4,3,3,8,3,2,7,9,5,0,2,8,8,4,1,9,7,1,6,9,3,9,9,3,7,5,1,0,5,8,2,0,9,7,4,9,4,4,5,9,2,3,0,7,8,1,6,4,0,6,2,8,6,2,0,8,9,9,8,6,2,8,0,3,4,8,2,5,3,4,2,1,1,7,0,6,7,9,8,2,1,4,8,0,8,6,5,1,3,2,8,2,3,0,6,6,4,7,0,9,3,8,4,4,6,0,9,5,5,0,5,8,2,2,3,1,7,2,5,3,5,9,4,0,8,1,2,8,4,8,1,1,1,7,4,5,0,2,8,4,1,0,2,7,0,1,9,3,8,5,2,1,1,0,5,5,5,9,6,4,4,6,2,2,9,4,8,9,5,4,9,3,0,3,8,1,9,6,4,4,2,8,8,1,0,9,7,5,6,6,5,9,3,3,4,4,6,1,2,8,4,7,5,6,4,8,2,3,3,7,8,6,7,8,3,1,6,5,2,7,1,2,0,1,9,0,9,1,4,5,6,4,8,5,6,6,9,2,3,4,6,0,3,4,8,6,1,0,4,5,4,3,2,6,6,4,8,2,1,3,3,9,3,6,0,7,2,6,0,2,4,9,1,4,1,2,7,3,7,2,4,5,8,7,0,0,6,6,0,6,3,1,5,5,8,8,1,7,4,8,8,1,5,2,0,9,2,0,9,6,2,8,2,9,2,5,4,0,9,1,7,1,5,3,6,4,3,6,7,8,9,2,5,9,0,3,6,0,0,1,1,3,3,0,5,3,0,5,4,8,8,2,0,4,6,6,5,2,1,3,8,4,1,4,6,9,5,1,9,4,1,5,1,1,6,0,9,4,3,3,0,5,7,2,7,0,3,6,5,7,5,9,5,9,1,9,5,3,0,9,2,1,8,6,1,1,7,3,8,1,9,3,2,6,1,1,7,9,3,1,0,5,1,1,8,5,4,8,0,7,4,4,6,2,3,7,9,9,6,2,7,4,9,5,6,7,3,5,1,8,8,5,7,5,2,7,2,4,8,9,1,2,2,7,9,3,8,1,8,3,0,1,1,9,4,9,1,2,9,8,3,3,6,7,3,3,6,2,4,4,0,6,5,6,6,4,3,0,8,6,0,2,1,3,9,4,9,4,6,3,9,5,2,2,4,7,3,7,1,9,0,7,0,2,1,7,9,8,6,0,9,4,3,7,0,2,7,7,0,5,3,9,2,1,7,1,7,6,2,9,3,1,7,6,7,5,2,3,8,4,6,7,4,8,1,8,4,6,7,6,6,9,4,0,5,1,3,2,0,0,0,5,6,8,1,2,7,1,4,5,2,6,3,5,6,0,8,2,7,7,8,5,7,7,1,3,4,2,7,5,7,7,8,9,6,0,9,1,7,3,6,3,7,1,7,8,7,2,1,4,6,8,4,4,0,9,0,1,2,2,4,9,5,3,4,3,0,1,4,6,5,4,9,5,8,5,3,7,1,0,5,0,7,9,2,2,7,9,6,8,9,2,5,8,9,2,3,5,4,2,0,1,9,9,5,6,1,1,2,1,2,9,0,2,1,9,6,0,8,6,4,0,3,4,4,1,8,1,5,9,8,1,3,6,2,9,7,7,4,7,7,1,3,0,9,9,6,0,5,1,8,7,0,7,2,1,1,3,4,9,9,9,9,9,9,8,3,7,2,9,7,8,0,4,9,9,5,1,0,5,9,7,3,1,7,3,2,8,1,6,0,9,6,3,1,8,5,9,5,0,2,4,4,5,9,4,5,5,3,4,6,9,0,8,3,0,2,6,4,2,5,2,2,3,0,8,2,5,3,3,4,4,6,8,5,0,3,5,2,6,1,9,3,1,1,8,8,1,7,1,0,1,0,0,0,3,1,3,7,8,3,8,7,5,2,8,8,6,5,8,7,5,3,3,2,0,8,3,8,1,4,2,0];

function randInt(min, max) {
	return Math.floor(Math.random() * (max - min + 1)) + min;
}

for (var i = 0; i < 10000; i++) {
	pi.push(randInt(0, 9));
}

var timer = 0;

// ──────────────────────────────────────────────────────────────────
// Dust mote system — warm light particles drifting slowly upward
// 80 individual motes, each with independent phase so they appear
// to "breathe" at different rates, simulating specks in golden air.
// ──────────────────────────────────────────────────────────────────
var dustMotes = [];
var dustGfx;
var DUST_COUNT = 80;

// ──────────────────────────────────────────────────────────────────
// Sun glow — drawn once at create, static background element.
// Built from nine concentric filled circles (atmosphere scatter)
// plus an eight-ray star-burst (lens-star effect).
// ──────────────────────────────────────────────────────────────────
var sunGfx;
var SUN_X = 1050;
var SUN_Y = 70;

function drawSunGlow() {
	sunGfx.clear();

	// Outermost atmospheric scatter (very faint)
	sunGfx.beginFill(0xFFDD44, 0.015); sunGfx.drawCircle(SUN_X, SUN_Y, 420); sunGfx.endFill();
	sunGfx.beginFill(0xFFCC33, 0.030); sunGfx.drawCircle(SUN_X, SUN_Y, 300); sunGfx.endFill();
	sunGfx.beginFill(0xFFBB22, 0.055); sunGfx.drawCircle(SUN_X, SUN_Y, 210); sunGfx.endFill();
	sunGfx.beginFill(0xFFAA11, 0.090); sunGfx.drawCircle(SUN_X, SUN_Y, 140); sunGfx.endFill();
	// Inner corona
	sunGfx.beginFill(0xFFCC44, 0.160); sunGfx.drawCircle(SUN_X, SUN_Y, 90);  sunGfx.endFill();
	sunGfx.beginFill(0xFFDD66, 0.290); sunGfx.drawCircle(SUN_X, SUN_Y, 55);  sunGfx.endFill();
	sunGfx.beginFill(0xFFEE88, 0.520); sunGfx.drawCircle(SUN_X, SUN_Y, 30);  sunGfx.endFill();
	// Bright core
	sunGfx.beginFill(0xFFFACC, 0.860); sunGfx.drawCircle(SUN_X, SUN_Y, 14);  sunGfx.endFill();
	sunGfx.beginFill(0xFFFFEE, 0.960); sunGfx.drawCircle(SUN_X, SUN_Y,  6);  sunGfx.endFill();

	// Eight-ray lens star  — four axes at 0°, 45°, 90°, 135°
	var RAY_LEN  = [220, 150, 200, 150, 200, 150, 210, 150]; // alternating long/short
	var RAY_W    = [1.2, 0.8, 1.2, 0.8, 1.2, 0.8, 1.2, 0.8];
	var RAY_ALPHA= [0.28, 0.18, 0.28, 0.18, 0.28, 0.18, 0.28, 0.18];
	for (var r = 0; r < 8; r++) {
		var ang = (r / 8) * Math.PI * 2;
		var ex  = SUN_X + Math.cos(ang) * RAY_LEN[r];
		var ey  = SUN_Y + Math.sin(ang) * RAY_LEN[r];
		sunGfx.lineStyle(RAY_W[r], 0xFFEE88, RAY_ALPHA[r]);
		sunGfx.moveTo(SUN_X, SUN_Y);
		sunGfx.lineTo(ex, ey);
	}
}

// ──────────────────────────────────────────────────────────────────
function preload() {
	game.load.image('nuage',  'nuage.png');
	game.load.image('nuage2', 'nuage2.png');
	game.load.image('field',  'field.png');
	game.load.image('fond',   'fond.png');
	game.load.image('fond2',  'fond2.png');
}

function create() {
	game.time.desiredFps = 30;

	// Deep burnt-amber sky — warm but dark enough for golden clouds to read
	game.stage.backgroundColor = "#7A3500";

	// Upper sky texture — dark amber, textured
	fond = game.add.tileSprite(0, 0, 1300, 400, 'fond');
	fond.tint  = 0x8B4010;
	fond.alpha = 0.88;

	// Lower layer — deep amber-orange horizon haze / ground reflection
	fond2 = game.add.tileSprite(0, 400, 1300, 300, 'fond2');
	fond2.tint  = 0xFF6010;   // strong orange pushes warmth through any underlying greens
	fond2.alpha = 0.75;

	// Sun glow sits below everything else
	sunGfx = game.add.graphics(0, 0);
	drawSunGlow();

	order0 = game.add.group(); order1 = game.add.group();
	order2 = game.add.group(); order3 = game.add.group();
	order4 = game.add.group(); order5 = game.add.group();
	order6 = game.add.group(); order7 = game.add.group();
	order8 = game.add.group(); order9 = game.add.group();

	// Dust mote graphics layer
	dustGfx = game.add.graphics(0, 0);

	// Seed dust motes across the whole canvas, staggered in phase
	for (var d = 0; d < DUST_COUNT; d++) {
		dustMotes.push({
			x:     Math.random() * 1300,
			y:     Math.random() * 700,
			vy:    -(0.12 + Math.random() * 0.38),   // upward drift, very slow
			vx:    (Math.random() - 0.5) * 0.22,      // gentle horizontal sway
			r:     0.8 + Math.random() * 1.4,          // radius 0.8 – 2.2 px
			phase: Math.random() * Math.PI * 2,        // independent opacity phase
			freq:  0.025 + Math.random() * 0.030       // per-frame phase increment
		});
	}

	// Warm amber ambient glow on the canvas element itself
	if (game.canvas) {
		game.canvas.style.boxShadow = '0 0 60px 16px rgba(220, 110, 20, 0.42)';
	}
}

function update() {
	timer++;

	// ── Dust motes ────────────────────────────────────────────────
	dustGfx.clear();
	var dustPalette = [0xFFCC44, 0xFFAA22, 0xFFDD88, 0xFFBB55, 0xFFE599];
	for (var d = 0; d < DUST_COUNT; d++) {
		var m = dustMotes[d];

		// Move
		m.x += m.vx;
		m.y += m.vy;
		m.phase += m.freq;

		// Wrap: when a mote exits the top it re-enters from the bottom
		if (m.y < -4)   { m.y = 704;  m.x = Math.random() * 1300; }
		if (m.x < -8)   { m.x = 1308; }
		if (m.x > 1308) { m.x = -8;   }

		// Opacity breathes sinusoidally — each mote has its own cycle
		var alpha = 0.18 + 0.35 * Math.abs(Math.sin(m.phase));

		dustGfx.beginFill(dustPalette[d % dustPalette.length], alpha);
		dustGfx.drawCircle(m.x, m.y, m.r);
		dustGfx.endFill();
	}

	// ── Cloud spawning ────────────────────────────────────────────
	if (timer > (pi[decimal + 1]) * densityDivider) {

		decimal++;
		timer = 0;

		// Upper cloud — warm golden, backlit by the low sun
		var cloud = game.add.tileSprite(
			-200,
			400 - (pi[decimal] * 34 - 15),
			768, 312, 'nuage'
		);
		cloud.anchor.x = 0.7;
		cloud.anchor.y = 0.5;
		cloud.scale.setTo(pi[decimal] / 10, pi[decimal] / 10);
		cloud.alpha = 0.90;
		cloud.tint  = 0xFFCC44; // warm gold — lit from below by the sunset
		nuages.push(cloud);

		// Lower cloud — deeper amber undersides, in soft shadow
		var cloud2 = game.add.tileSprite(
			-200,
			400 + (pi[decimal] * 34 - 15),
			768, 312, 'nuage2'
		);
		cloud2.anchor.x = 0.7;
		cloud2.anchor.y = 0.5;
		cloud2.scale.setTo(pi[decimal] / 10, pi[decimal] / 10);
		cloud2.tint  = 0xFF8811; // burnt amber — warm shadow tones
		nuages2.push(cloud2);

		nuages[decimal].alpha = 0.93;

		switch (pi[decimal]) {
		case 0: order0.add(nuages[decimal]); order0.add(nuages2[decimal]); break;
		case 1: order1.add(nuages[decimal]); order1.add(nuages2[decimal]); break;
		case 2: order2.add(nuages[decimal]); order2.add(nuages2[decimal]); break;
		case 3: order3.add(nuages[decimal]); order3.add(nuages2[decimal]); break;
		case 4: order4.add(nuages[decimal]); order4.add(nuages2[decimal]); break;
		case 5: order5.add(nuages[decimal]); order5.add(nuages2[decimal]); break;
		case 6: order6.add(nuages[decimal]); order6.add(nuages2[decimal]); break;
		case 7: order7.add(nuages[decimal]); order7.add(nuages2[decimal]); break;
		case 8: order8.add(nuages[decimal]); order8.add(nuages2[decimal]); break;
		case 9: order9.add(nuages[decimal]); order9.add(nuages2[decimal]); break;
		}
	}

	// ── Cloud movement ────────────────────────────────────────────
	while (jj <= decimal) {
		if (nuages[jj].x > 1800) {
			nuages[jj].destroy();
		}
		nuages[jj].x  += pi[jj] / Math.abs(velocityDivider);
		nuages2[jj].x += pi[jj] / Math.abs(velocityDivider);
		jj++;
	}
	jj = 0;

	// ── Depth sort ────────────────────────────────────────────────
	// Order: sun → clouds (by digit) → fond2 horizon reflection → dust motes
	game.world.bringToTop(order0); game.world.bringToTop(order1);
	game.world.bringToTop(order2); game.world.bringToTop(order3);
	game.world.bringToTop(order4); game.world.bringToTop(order5);
	game.world.bringToTop(order6); game.world.bringToTop(order7);
	game.world.bringToTop(order8); game.world.bringToTop(order9);
	fond2.bringToTop();                      // horizon haze above clouds
	game.world.bringToTop(dustGfx);          // dust motes float in front
}
	</script>
</head>
<body style="background-color: #A04B0A;">
	<div id="PIclouds" style="
		cursor: none;
		position: absolute;
		top: 0px;
		left: 0px;
		image-rendering: optimizeSpeed;
		image-rendering: -moz-crisp-edges;
		image-rendering: -o-crisp-edges;
		image-rendering: -webkit-optimize-contrast;
		image-rendering: optimize-contrast;
		-ms-interpolation-mode: nearest-neighbor;
		image-rendering: pixelated;">
	</div>

	<!-- CSS lens-flare chain: sun corona + six glints along the optical axis -->
	<div id="flare-sun"    class="lens-flare"></div>
	<div id="flare-corona" class="lens-flare"></div>
	<div id="flare-a"      class="lens-flare"></div>
	<div id="flare-b"      class="lens-flare"></div>
	<div id="flare-c"      class="lens-flare"></div>
	<div id="flare-d"      class="lens-flare"></div>
	<div id="flare-e"      class="lens-flare"></div>

	<!-- Warm horizon glow gradient overlay -->
	<div id="horizon-glow"></div>
</body>
</html>
