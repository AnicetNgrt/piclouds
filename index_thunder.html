<!DOCTYPE html>
<html>
<head>
	<title>Nuages de Pi — Tonnerre</title>
	<link href="stylesheet.css" rel="stylesheet">
	<meta charset="utf-8"/>
	<style>
	body {
		background-color: #080B12;
		overflow: hidden;
		margin: 0;
		padding: 0;
	}
	canvas { display: block; }
	@keyframes electricPulse {
		0%   { box-shadow: 0 0 18px 4px rgba(30, 70, 180, 0.30); }
		40%  { box-shadow: 0 0 32px 8px rgba(50, 100, 220, 0.20); }
		100% { box-shadow: 0 0 18px 4px rgba(30, 70, 180, 0.30); }
	}
	#PIclouds canvas, canvas {
		animation: electricPulse 4s ease-in-out infinite;
	}
	</style>
	<script type="text/javascript" src="phaser.min.js"></script>
	<script>
// =============================================================
// Nuages de Pi — Tonnerre (Thunder) Theme
// Dense, fast-moving thunderclouds; jagged lightning bolts with
// electric-blue glow; falling rain; double-strike events.
// =============================================================

var game = new Phaser.Game(1300, 700, Phaser.CANVAS, 'PIclouds',
	{ preload: preload, create: create, update: update }, false, false);

// Denser and faster than default: storm rolls in hard
var nuages = []; var densityDivider = 2.8; var velocityDivider = 0.48;
var nuages2 = []; var field; var fond; var fond2;
var nn = 0; var jj = 0; var sum = 0; var lock = 0;
var decimal = -1;
var pi = [3,1,4,1,5,9,2,6,5,3,5,8,9,7,9,3,2,3,8,4,6,2,6,4,3,3,8,3,2,7,9,5,0,2,8,8,4,1,9,7,1,6,9,3,9,9,3,7,5,1,0,5,8,2,0,9,7,4,9,4,4,5,9,2,3,0,7,8,1,6,4,0,6,2,8,6,2,0,8,9,9,8,6,2,8,0,3,4,8,2,5,3,4,2,1,1,7,0,6,7,9,8,2,1,4,8,0,8,6,5,1,3,2,8,2,3,0,6,6,4,7,0,9,3,8,4,4,6,0,9,5,5,0,5,8,2,2,3,1,7,2,5,3,5,9,4,0,8,1,2,8,4,8,1,1,1,7,4,5,0,2,8,4,1,0,2,7,0,1,9,3,8,5,2,1,1,0,5,5,5,9,6,4,4,6,2,2,9,4,8,9,5,4,9,3,0,3,8,1,9,6,4,4,2,8,8,1,0,9,7,5,6,6,5,9,3,3,4,4,6,1,2,8,4,7,5,6,4,8,2,3,3,7,8,6,7,8,3,1,6,5,2,7,1,2,0,1,9,0,9,1,4,5,6,4,8,5,6,6,9,2,3,4,6,0,3,4,8,6,1,0,4,5,4,3,2,6,6,4,8,2,1,3,3,9,3,6,0,7,2,6,0,2,4,9,1,4,1,2,7,3,7,2,4,5,8,7,0,0,6,6,0,6,3,1,5,5,8,8,1,7,4,8,8,1,5,2,0,9,2,0,9,6,2,8,2,9,2,5,4,0,9,1,7,1,5,3,6,4,3,6,7,8,9,2,5,9,0,3,6,0,0,1,1,3,3,0,5,3,0,5,4,8,8,2,0,4,6,6,5,2,1,3,8,4,1,4,6,9,5,1,9,4,1,5,1,1,6,0,9,4,3,3,0,5,7,2,7,0,3,6,5,7,5,9,5,9,1,9,5,3,0,9,2,1,8,6,1,1,7,3,8,1,9,3,2,6,1,1,7,9,3,1,0,5,1,1,8,5,4,8,0,7,4,4,6,2,3,7,9,9,6,2,7,4,9,5,6,7,3,5,1,8,8,5,7,5,2,7,2,4,8,9,1,2,2,7,9,3,8,1,8,3,0,1,1,9,4,9,1,2,9,8,3,3,6,7,3,3,6,2,4,4,0,6,5,6,6,4,3,0,8,6,0,2,1,3,9,4,9,4,6,3,9,5,2,2,4,7,3,7,1,9,0,7,0,2,1,7,9,8,6,0,9,4,3,7,0,2,7,7,0,5,3,9,2,1,7,1,7,6,2,9,3,1,7,6,7,5,2,3,8,4,6,7,4,8,1,8,4,6,7,6,6,9,4,0,5,1,3,2,0,0,0,5,6,8,1,2,7,1,4,5,2,6,3,5,6,0,8,2,7,7,8,5,7,7,1,3,4,2,7,5,7,7,8,9,6,0,9,1,7,3,6,3,7,1,7,8,7,2,1,4,6,8,4,4,0,9,0,1,2,2,4,9,5,3,4,3,0,1,4,6,5,4,9,5,8,5,3,7,1,0,5,0,7,9,2,2,7,9,6,8,9,2,5,8,9,2,3,5,4,2,0,1,9,9,5,6,1,1,2,1,2,9,0,2,1,9,6,0,8,6,4,0,3,4,4,1,8,1,5,9,8,1,3,6,2,9,7,7,4,7,7,1,3,0,9,9,6,0,5,1,8,7,0,7,2,1,1,3,4,9,9,9,9,9,9,8,3,7,2,9,7,8,0,4,9,9,5,1,0,5,9,7,3,1,7,3,2,8,1,6,0,9,6,3,1,8,5,9,5,0,2,4,4,5,9,4,5,5,3,4,6,9,0,8,3,0,2,6,4,2,5,2,2,3,0,8,2,5,3,3,4,4,6,8,5,0,3,5,2,6,1,9,3,1,1,8,8,1,7,1,0,1,0,0,0,3,1,3,7,8,3,8,7,5,2,8,8,6,5,8,7,5,3,3,2,0,8,3,8,1,4,2,0];

function randInt(min, max) {
	return Math.floor(Math.random() * (max - min + 1)) + min;
}

for (var i = 0; i < 10000; i++) {
	pi.push(randInt(0, 9));
}

var timer = 0;

// ------------------------------------------------------------------
// Rain system — a single Graphics redrawn each frame for performance
// ------------------------------------------------------------------
var rainDrops = [];
var rainGfx;
var RAIN_COUNT = 140;

// ------------------------------------------------------------------
// Lightning system
// ------------------------------------------------------------------
var lightningGroup;
var nextLightning   = 0;   // ms timestamp of next scheduled strike
var secondStrike    = -1;  // ms timestamp of optional follow-up strike

// Draw a jagged bolt from (x0, y0) down to y1.
// Returns an array of Graphics objects so the caller can tween them out.
// depth controls how many branch levels are generated.
function drawBolt(x0, y0, y1, depth) {
	var results = [];
	var STEPS = 8 + randInt(0, 4);
	var stepH = (y1 - y0) / STEPS;
	var cx = x0;
	var pts = [{ x: x0, y: y0 }];

	// Build the jagged path, with a slight rightward bias (wind)
	for (var s = 0; s < STEPS; s++) {
		cx += (Math.random() - 0.44) * 86;
		cx = Math.max(20, Math.min(1280, cx));
		pts.push({ x: cx, y: y0 + stepH * (s + 1) });
	}

	// Layer 1 — wide outer glow (electric blue, very transparent)
	var glow = game.add.graphics(0, 0);
	lightningGroup.add(glow);
	glow.lineStyle(7, 0x2244CC, 0.14);
	glow.moveTo(pts[0].x, pts[0].y);
	for (var p = 1; p < pts.length; p++) glow.lineTo(pts[p].x, pts[p].y);
	results.push(glow);

	// Layer 2 — mid halo (brighter blue-white)
	var mid = game.add.graphics(0, 0);
	lightningGroup.add(mid);
	mid.lineStyle(3, 0x88AAFF, 0.55);
	mid.moveTo(pts[0].x, pts[0].y);
	for (var p = 1; p < pts.length; p++) mid.lineTo(pts[p].x, pts[p].y);
	results.push(mid);

	// Layer 3 — bright white core
	var core = game.add.graphics(0, 0);
	lightningGroup.add(core);
	core.lineStyle(1, 0xFFFFFF, 0.95);
	core.moveTo(pts[0].x, pts[0].y);
	for (var p = 1; p < pts.length; p++) core.lineTo(pts[p].x, pts[p].y);
	results.push(core);

	// Optional branch from a random midpoint
	if (depth > 0 && Math.random() < 0.55) {
		var bpi = randInt(2, STEPS - 2);
		var branchEndY = pts[bpi].y + (y1 - pts[bpi].y) * (0.25 + Math.random() * 0.45);
		var sub = drawBolt(pts[bpi].x, pts[bpi].y, branchEndY, depth - 1);
		for (var s = 0; s < sub.length; s++) results.push(sub[s]);
	}

	return results;
}

// Execute a single lightning strike: bolt + flash overlay, then fade both out.
function doStrike() {
	var bx   = randInt(100, 1200);
	var endY = randInt(280, 580);
	var bolts = drawBolt(bx, 0, endY, 2);

	// Full-screen flash overlay — added into lightningGroup so it always
	// sits on top of fond2, rain, and cloud layers.
	var flash = game.add.graphics(0, 0);
	lightningGroup.add(flash);
	flash.beginFill(0xFFFFFF, 0.30);
	flash.drawRect(0, 0, 1300, 700);
	flash.endFill();
	game.add.tween(flash)
		.to({ alpha: 0 }, 160, Phaser.Easing.Quadratic.Out, true)
		.onComplete.add(function() { flash.destroy(); });

	// Fade each bolt layer out after a short visible hold
	for (var i = 0; i < bolts.length; i++) {
		(function(g) {
			game.add.tween(g)
				.to({ alpha: 0 }, 350 + randInt(0, 180), Phaser.Easing.Quadratic.Out, true)
				.onComplete.add(function() { g.destroy(); });
		})(bolts[i]);
	}
}

// Trigger a lightning event: always one strike, 25% chance of a follow-up.
function triggerLightning() {
	doStrike();
	if (Math.random() < 0.25) {
		secondStrike = game.time.now + randInt(90, 200);
	}
}

// ------------------------------------------------------------------
function preload() {
	game.load.image('nuage',  'nuage.png');
	game.load.image('nuage2', 'nuage2.png');
	game.load.image('field',  'field.png');
	game.load.image('fond',   'fond.png');
	game.load.image('fond2',  'fond2.png');
}

function create() {
	game.time.desiredFps = 30;

	// Deep navy-black stormy sky (slightly lighter than absolute black so clouds read)
	game.stage.backgroundColor = "#0A0D14";

	// Sky tile — dark blue tint, high opacity so the texture reads through
	fond = game.add.tileSprite(0, 0, 1300, 400, 'fond');
	fond.tint  = 0x141A24;
	fond.alpha = 0.85;

	// Reflection tile — deep blue-black underside of the storm
	fond2 = game.add.tileSprite(0, 400, 1300, 300, 'fond2');
	fond2.tint  = 0x0C1018;
	fond2.alpha = 0.80;

	order0 = game.add.group(); order1 = game.add.group();
	order2 = game.add.group(); order3 = game.add.group();
	order4 = game.add.group(); order5 = game.add.group();
	order6 = game.add.group(); order7 = game.add.group();
	order8 = game.add.group(); order9 = game.add.group();

	// Rain — a single Graphics object redrawn every frame
	rainGfx = game.add.graphics(0, 0);
	for (var r = 0; r < RAIN_COUNT; r++) {
		rainDrops.push({
			x:   Math.random() * 1500,
			y:   Math.random() * 720,        // pre-scattered vertically
			vy:  8 + Math.random() * 5,      // fall speed
			len: 5 + Math.random() * 5       // drop length in pixels
		});
	}

	// Lightning group — always brought to top in update()
	lightningGroup = game.add.group();

	// Electric ambient glow on the canvas element
	if (game.canvas) {
		game.canvas.style.boxShadow = '0 0 40px 10px rgba(20, 50, 130, 0.35)';
	}

	// First lightning strike: 4–10 seconds after load
	nextLightning = game.time.now + randInt(4000, 10000);
}

function update() {

	timer++;

	// ---- Rain -------------------------------------------------------
	// Redraw all drops onto a single Graphics each frame
	rainGfx.clear();
	rainGfx.lineStyle(1, 0x7799BB, 0.22);
	for (var r = 0; r < rainDrops.length; r++) {
		var d = rainDrops[r];
		d.x += 0.9;   // slight rightward drift — wind
		d.y += d.vy;
		if (d.y > 720) {
			d.y = -12;
			d.x = Math.random() * 1500;
		}
		if (d.x > 1310) { d.x -= 1310; }
		rainGfx.moveTo(d.x, d.y);
		rainGfx.lineTo(d.x + 1.5, d.y + d.len);
	}

	// ---- Cloud spawning ---------------------------------------------
	if (timer > (pi[decimal + 1]) * densityDivider) {

		decimal++;
		timer = 0;

		// Upper thunderhead — dark blue-grey
		var cloud = game.add.tileSprite(-200, 400 - (pi[decimal] * 34 - 15), 768, 312, 'nuage');
		cloud.anchor.x = 0.7;
		cloud.anchor.y = 0.5;
		cloud.scale.setTo(pi[decimal] / 10, pi[decimal] / 10);
		cloud.alpha = 0.92;
		cloud.tint = 0x3A4860; // dark blue-grey thunderhead — bright enough to read against black sky
		nuages.push(cloud);

		// Lower reflection — near-black underside
		var cloud2 = game.add.tileSprite(-200, 400 + (pi[decimal] * 34 - 15), 768, 312, 'nuage2');
		cloud2.anchor.x = 0.7;
		cloud2.anchor.y = 0.5;
		cloud2.scale.setTo(pi[decimal] / 10, pi[decimal] / 10);
		cloud2.tint = 0x222E3C; // dark blue-grey underside — distinct from sky
		nuages2.push(cloud2);

		nuages[decimal].alpha = 0.99;

		switch (pi[decimal]) {
		case 0: order0.add(nuages[decimal]); order0.add(nuages2[decimal]); break;
		case 1: order1.add(nuages[decimal]); order1.add(nuages2[decimal]); break;
		case 2: order2.add(nuages[decimal]); order2.add(nuages2[decimal]); break;
		case 3: order3.add(nuages[decimal]); order3.add(nuages2[decimal]); break;
		case 4: order4.add(nuages[decimal]); order4.add(nuages2[decimal]); break;
		case 5: order5.add(nuages[decimal]); order5.add(nuages2[decimal]); break;
		case 6: order6.add(nuages[decimal]); order6.add(nuages2[decimal]); break;
		case 7: order7.add(nuages[decimal]); order7.add(nuages2[decimal]); break;
		case 8: order8.add(nuages[decimal]); order8.add(nuages2[decimal]); break;
		case 9: order9.add(nuages[decimal]); order9.add(nuages2[decimal]); break;
		}
	}

	// ---- Cloud movement ---------------------------------------------
	while (jj <= decimal) {
		if (nuages[jj].x > 1800) {
			nuages[jj].destroy();
		}
		nuages[jj].x  += pi[jj] / Math.abs(velocityDivider);
		nuages2[jj].x += pi[jj] / Math.abs(velocityDivider);
		jj++;
	}
	jj = 0;

	// ---- Depth sort — clouds, then fond2, then rain, then lightning --
	game.world.bringToTop(order0); game.world.bringToTop(order1);
	game.world.bringToTop(order2); game.world.bringToTop(order3);
	game.world.bringToTop(order4); game.world.bringToTop(order5);
	game.world.bringToTop(order6); game.world.bringToTop(order7);
	game.world.bringToTop(order8); game.world.bringToTop(order9);
	fond2.bringToTop();                       // reflection sits above clouds
	game.world.bringToTop(rainGfx);           // rain in front — Graphics has no .bringToTop(), use world.bringToTop()
	game.world.bringToTop(lightningGroup);    // lightning always on top of everything

	// ---- Lightning triggers -----------------------------------------
	if (game.time.now >= nextLightning) {
		nextLightning = game.time.now + randInt(5000, 14000);
		triggerLightning();
	}
	if (secondStrike > 0 && game.time.now >= secondStrike) {
		secondStrike = -1;
		doStrike();
	}
}

	</script>
</head>
<body style="background-color: #080B12;">
	<div id="game" style="
		cursor: none;
		position: absolute;
		TOP: 0px;
		LEFT: 0px;

		image-rendering: optimizeSpeed;
		image-rendering: -moz-crisp-edges;
		image-rendering: -o-crisp-edges;
		image-rendering: -webkit-optimize-contrast;
		image-rendering: optimize-contrast;
		-ms-interpolation-mode: nearest-neighbor;
