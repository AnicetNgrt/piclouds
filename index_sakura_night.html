<!DOCTYPE html>
<html>
<head>
	<title>Nuages de Pi — Sakura Night</title>
	<link href="stylesheet.css" rel="stylesheet">
	<meta charset="utf-8"/>
	<style>
	body {
		background-color: #080510;
		overflow: hidden;
		margin: 0;
		padding: 0;
	}
	canvas { display: block; }
	@keyframes sakuraPulse {
		0%   { box-shadow: 0 0 22px 6px rgba(200, 60, 130, 0.22); }
		50%  { box-shadow: 0 0 42px 14px rgba(240, 100, 160, 0.12); }
		100% { box-shadow: 0 0 22px 6px rgba(200, 60, 130, 0.22); }
	}
	#PIclouds canvas, canvas {
		animation: sakuraPulse 6s ease-in-out infinite;
	}
	</style>
	<script type="text/javascript" src="phaser.min.js"></script>
	<script>
// =============================================================
// Nuages de Pi — Sakura Night
// Midnight indigo sky with glowing pink cherry blossom clouds,
// drifting petals, floating paper lanterns, stars and soft moon.
// =============================================================

var game = new Phaser.Game(1300, 700, Phaser.CANVAS, 'PIclouds',
	{ preload: preload, create: create, update: update }, false, false);

// Moderate density, gently paced — dreamlike midnight drift
var nuages = []; var densityDivider = 3.2; var velocityDivider = 0.52;
var nuages2 = []; var field; var fond; var fond2;
var nn = 0; var jj = 0; var sum = 0; var lock = 0;
var decimal = -1;
var pi = [3,1,4,1,5,9,2,6,5,3,5,8,9,7,9,3,2,3,8,4,6,2,6,4,3,3,8,3,2,7,9,5,0,2,8,8,4,1,9,7,1,6,9,3,9,9,3,7,5,1,0,5,8,2,0,9,7,4,9,4,4,5,9,2,3,0,7,8,1,6,4,0,6,2,8,6,2,0,8,9,9,8,6,2,8,0,3,4,8,2,5,3,4,2,1,1,7,0,6,7,9,8,2,1,4,8,0,8,6,5,1,3,2,8,2,3,0,6,6,4,7,0,9,3,8,4,4,6,0,9,5,5,0,5,8,2,2,3,1,7,2,5,3,5,9,4,0,8,1,2,8,4,8,1,1,1,7,4,5,0,2,8,4,1,0,2,7,0,1,9,3,8,5,2,1,1,0,5,5,5,9,6,4,4,6,2,2,9,4,8,9,5,4,9,3,0,3,8,1,9,6,4,4,2,8,8,1,0,9,7,5,6,6,5,9,3,3,4,4,6,1,2,8,4,7,5,6,4,8,2,3,3,7,8,6,7,8,3,1,6,5,2,7,1,2,0,1,9,0,9,1,4,5,6,4,8,5,6,6,9,2,3,4,6,0,3,4,8,6,1,0,4,5,4,3,2,6,6,4,8,2,1,3,3,9,3,6,0,7,2,6,0,2,4,9,1,4,1,2,7,3,7,2,4,5,8,7,0,0,6,6,0,6,3,1,5,5,8,8,1,7,4,8,8,1,5,2,0,9,2,0,9,6,2,8,2,9,2,5,4,0,9,1,7,1,5,3,6,4,3,6,7,8,9,2,5,9,0,3,6,0,0,1,1,3,3,0,5,3,0,5,4,8,8,2,0,4,6,6,5,2,1,3,8,4,1,4,6,9,5,1,9,4,1,5,1,1,6,0,9,4,3,3,0,5,7,2,7,0,3,6,5,7,5,9,5,9,1,9,5,3,0,9,2,1,8,6,1,1,7,3,8,1,9,3,2,6,1,1,7,9,3,1,0,5,1,1,8,5,4,8,0,7,4,4,6,2,3,7,9,9,6,2,7,4,9,5,6,7,3,5,1,8,8,5,7,5,2,7,2,4,8,9,1,2,2,7,9,3,8,1,8,3,0,1,1,9,4,9,1,2,9,8,3,3,6,7,3,3,6,2,4,4,0,6,5,6,6,4,3,0,8,6,0,2,1,3,9,4,9,4,6,3,9,5,2,2,4,7,3,7,1,9,0,7,0,2,1,7,9,8,6,0,9,4,3,7,0,2,7,7,0,5,3,9,2,1,7,1,7,6,2,9,3,1,7,6,7,5,2,3,8,4,6,7,4,8,1,8,4,6,7,6,6,9,4,0,5,1,3,2,0,0,0,5,6,8,1,2,7,1,4,5,2,6,3,5,6,0,8,2,7,7,8,5,7,7,1,3,4,2,7,5,7,7,8,9,6,0,9,1,7,3,6,3,7,1,7,8,7,2,1,4,6,8,4,4,0,9,0,1,2,2,4,9,5,3,4,3,0,1,4,6,5,4,9,5,8,5,3,7,1,0,5,0,7,9,2,2,7,9,6,8,9,2,5,8,9,2,3,5,4,2,0,1,9,9,5,6,1,1,2,1,2,9,0,2,1,9,6,0,8,6,4,0,3,4,4,1,8,1,5,9,8,1,3,6,2,9,7,7,4,7,7,1,3,0,9,9,6,0,5,1,8,7,0,7,2,1,1,3,4,9,9,9,9,9,9,8,3,7,2,9,7,8,0,4,9,9,5,1,0,5,9,7,3,1,7,3,2,8,1,6,0,9,6,3,1,8,5,9,5,0,2,4,4,5,9,4,5,5,3,4,6,9,0,8,3,0,2,6,4,2,5,2,2,3,0,8,2,5,3,3,4,4,6,8,5,0,3,5,2,6,1,9,3,1,1,8,8,1,7,1,0,1,0,0,0,3,1,3,7,8,3,8,7,5,2,8,8,6,5,8,7,5,3,3,2,0,8,3,8,1,4,2,0];

function randInt(min, max) {
	return Math.floor(Math.random() * (max - min + 1)) + min;
}

for (var i = 0; i < 10000; i++) {
	pi.push(randInt(0, 9));
}

var timer = 0;

// ------------------------------------------------------------------
// Petal particle system — drifting cherry blossom petals
// ------------------------------------------------------------------
var petals = [];
var petalsGroup;
var petalTimer = 0;
var petalSpawnRate = 20;   // every 20 frames (~0.67s at 30fps)
var maxPetals = 55;
// Palette: pale blush → warm pink → deep rose
var petalColors = [0xFF9EC4, 0xFFBDD5, 0xE86B9E, 0xFFD6E8, 0xCC5580, 0xF5A0C0, 0xFFCCE0];

function spawnPetal() {
	var color = petalColors[Math.floor(Math.random() * petalColors.length)];
	var sizeW = 5 + Math.random() * 6;        // 5–11px width
	var sizeH = sizeW * (0.38 + Math.random() * 0.38);
	var g = game.add.graphics(1325 + Math.random() * 90, Math.random() * 680);
	g.beginFill(color, 0.62 + Math.random() * 0.32);
	g.drawEllipse(0, 0, sizeW, sizeH);
	g.endFill();
	g.rotation = Math.random() * Math.PI * 2;
	g.rotSpeed = (Math.random() - 0.5) * 0.055;
	g.vx = -(0.38 + Math.random() * 1.05);   // leftward drift
	g.spawnY = g.y;
	g.dropY = 0;
	g.vy = 0.14 + Math.random() * 0.28;       // gentle downward fall
	g.age = Math.random() * 300;              // stagger wobble phases
	g.wobble = 12 + Math.random() * 22;       // sinusoidal vertical bobble
	g.wobbleFreq = 0.020 + Math.random() * 0.028;
	petalsGroup.add(g);
	petals.push(g);
}

// ------------------------------------------------------------------
// Paper lantern system — warm lights rising into the night sky
// ------------------------------------------------------------------
var lanterns = [];
var lanternsGroup;
var nextLanternTime = 0;
var LANTERN_COLORS = [0xFFAA33, 0xFF9922, 0xFF6633, 0xFF5544, 0xFFCC44, 0xFF7733];

function drawLantern(g, color) {
	// Outermost soft ambient halo
	g.beginFill(color, 0.04);
	g.drawCircle(0, 0, 60);
	g.endFill();

	// Inner warm glow ring
	g.beginFill(color, 0.10);
	g.drawCircle(0, 0, 34);
	g.endFill();

	// Lantern body — warm colour fill
	g.beginFill(color, 0.74);
	g.drawRoundedRect(-9, -16, 18, 32, 7);
	g.endFill();

	// Inner paper glow — lighter centre imitating candle light shining through
	g.beginFill(0xFFFFDD, 0.20);
	g.drawRoundedRect(-5, -10, 10, 20, 4);
	g.endFill();

	// Top cap ring
	g.beginFill(0xFFEEBB, 0.92);
	g.drawRoundedRect(-8, -21, 16, 7, 3);
	g.endFill();

	// Bottom cap ring
	g.beginFill(0xFFEEBB, 0.92);
	g.drawRoundedRect(-8, 14, 16, 7, 3);
	g.endFill();

	// Horizontal rib lines (bamboo frame)
	g.lineStyle(1, 0xFFEEAA, 0.45);
	g.moveTo(-9, -6); g.lineTo(9, -6);
	g.moveTo(-9,  4); g.lineTo(9,  4);

	// Hanging tassel below
	g.lineStyle(1.5, 0xCCBB77, 0.52);
	g.moveTo( 0, 21); g.lineTo( 0, 30);
	g.moveTo(-2, 30); g.lineTo( 0, 38);
	g.moveTo( 2, 30); g.lineTo( 0, 38);

	// Suspension wire above
	g.lineStyle(1, 0xAA9955, 0.50);
	g.moveTo(0, -21);
	g.lineTo(0, -32);
}

function spawnLantern(startY) {
	var color = LANTERN_COLORS[Math.floor(Math.random() * LANTERN_COLORS.length)];
	var x = 80 + Math.random() * 1140;
	var y = (startY !== undefined) ? startY : 730 + randInt(0, 50);

	var g = game.add.graphics(x, y);
	lanternsGroup.add(g);
	drawLantern(g, color);

	g.vy       = -(0.26 + Math.random() * 0.48);  // float upward (negative y)
	g.baseX    = x;
	g.age      = Math.random() * 200;
	g.swayAmp  = 6 + Math.random() * 18;           // sway width in pixels
	g.swaySpeed = 0.007 + Math.random() * 0.013;

	lanterns.push(g);
	return g;
}

// ------------------------------------------------------------------
function preload() {
	game.load.image('nuage',  'nuage.png');
	game.load.image('nuage2', 'nuage2.png');
	game.load.image('field',  'field.png');
	game.load.image('fond',   'fond.png');
	game.load.image('fond2',  'fond2.png');
}

function create() {
	game.time.desiredFps = 30;

	// Midnight indigo-black sky
	game.stage.backgroundColor = "#080510";

	// Sky tile — deep indigo-purple overlay on the night background
	fond = game.add.tileSprite(0, 0, 1300, 400, 'fond');
	fond.tint  = 0x2A1048;   // deep indigo-purple
	fond.alpha = 0.75;

	// Reflection tile — near-black violet underside
	fond2 = game.add.tileSprite(0, 400, 1300, 300, 'fond2');
	fond2.tint  = 0x180830;  // very dark purple-black
	fond2.alpha = 0.82;

	// Stars — drawn on top of fond (sky portion, y 0–390)
	// Never bringToTop'd so they stay just above fond, below clouds
	var starsGfx = game.add.graphics(0, 0);
	var starPalette = [0xFFFFFF, 0xFFDDF0, 0xCCDDFF, 0xFFEECC];
	for (var s = 0; s < 230; s++) {
		var sx = Math.random() * 1300;
		var sy = Math.random() * 390;
		var sr = Math.random();
		var sAlpha = 0.22 + Math.random() * 0.68;
		var sSize  = sr < 0.77 ? 1 : (sr < 0.93 ? 2 : 3);  // diameter 1–3
		var sColor = starPalette[Math.floor(Math.random() * starPalette.length)];
		starsGfx.beginFill(sColor, sAlpha);
		starsGfx.drawCircle(sx, sy, sSize);
		starsGfx.endFill();
	}

	// Moon — layered soft glow disc in the upper-right sky
	// Also never bringToTop'd; stays below clouds, above stars
	var moonGfx = game.add.graphics(0, 0);
	moonGfx.beginFill(0xFFEEDD, 0.03);
	moonGfx.drawCircle(960, 82, 150);   // outermost halo (diameter 150)
	moonGfx.endFill();
	moonGfx.beginFill(0xFFF0EE, 0.06);
	moonGfx.drawCircle(960, 82, 90);
	moonGfx.endFill();
	moonGfx.beginFill(0xFFF5EE, 0.10);
	moonGfx.drawCircle(960, 82, 56);
	moonGfx.endFill();
	moonGfx.beginFill(0xFFF8F2, 0.18);
	moonGfx.drawCircle(960, 82, 34);    // moon disc
	moonGfx.endFill();
	moonGfx.beginFill(0xFFFFFF, 0.28);
	moonGfx.drawCircle(960, 82, 20);    // bright core
	moonGfx.endFill();

	// Cloud depth groups
	order0 = game.add.group(); order1 = game.add.group();
	order2 = game.add.group(); order3 = game.add.group();
	order4 = game.add.group(); order5 = game.add.group();
	order6 = game.add.group(); order7 = game.add.group();
	order8 = game.add.group(); order9 = game.add.group();

	// Lanterns — pre-scatter 6 lanterns at random heights so the scene
	// is populated from the first frame
	lanternsGroup = game.add.group();
	for (var l = 0; l < 6; l++) {
		spawnLantern(80 + Math.random() * 580);
	}
	nextLanternTime = game.time.now + randInt(2000, 5000);

	// Petals layer — pre-scatter 22 petals across the canvas
	petalsGroup = game.add.group();
	for (var p = 0; p < 22; p++) {
		spawnPetal();
		petals[p].x = Math.random() * 1300;
	}

	// Soft rose-pink ambient glow on the canvas border
	if (game.canvas) {
		game.canvas.style.boxShadow = '0 0 48px 12px rgba(180, 55, 120, 0.18)';
	}
}

function update() {

	timer++;

	// ---- Petal system -----------------------------------------------
	petalTimer++;
	if (petalTimer >= petalSpawnRate && petals.length < maxPetals) {
		petalTimer = 0;
		spawnPetal();
	}
	for (var p = petals.length - 1; p >= 0; p--) {
		var petal = petals[p];
		petal.age++;
		petal.x += petal.vx;
		petal.dropY += petal.vy;
		// Combine gentle fall with sinusoidal vertical bobble
		petal.y = petal.spawnY + petal.dropY + Math.sin(petal.age * petal.wobbleFreq) * petal.wobble;
		petal.rotation += petal.rotSpeed;
		if (petal.x < -20 || petal.y > 730) {
			petal.destroy();
			petals.splice(p, 1);
		}
	}

	// ---- Lantern system ---------------------------------------------
	if (game.time.now >= nextLanternTime && lanterns.length < 10) {
		spawnLantern();
		nextLanternTime = game.time.now + randInt(2000, 6000);
	}
	for (var l = lanterns.length - 1; l >= 0; l--) {
		var lant = lanterns[l];
		lant.age++;
		lant.y += lant.vy;   // float upward
		// Gentle sinusoidal sway from spawn x
		lant.x = lant.baseX + Math.sin(lant.age * lant.swaySpeed) * lant.swayAmp;
		if (lant.y < -90) {
			lant.destroy();
			lanterns.splice(l, 1);
		}
	}

	// ---- Cloud spawning ---------------------------------------------
	if (timer > (pi[decimal + 1]) * densityDivider) {

		decimal++;
		timer = 0;

		// Upper blossom cloud — warm glowing pink, as if lit by moonlight
		var cloud = game.add.tileSprite(-200, 400 - (pi[decimal] * 34 - 15), 768, 312, 'nuage');
		cloud.anchor.x = 0.7;
		cloud.anchor.y = 0.5;
		cloud.scale.setTo(pi[decimal] / 10, pi[decimal] / 10);
		cloud.alpha = 0.88;
		cloud.tint = 0xDE7DAA;   // warm dusty rose — moonlit cherry blossoms
		nuages.push(cloud);

		// Lower reflection — deeper rose underside
		var cloud2 = game.add.tileSprite(-200, 400 + (pi[decimal] * 34 - 15), 768, 312, 'nuage2');
		cloud2.anchor.x = 0.7;
		cloud2.anchor.y = 0.5;
		cloud2.scale.setTo(pi[decimal] / 10, pi[decimal] / 10);
		cloud2.tint = 0x9B3D68;  // deep wine-rose reflection
		nuages2.push(cloud2);

		nuages[decimal].alpha = 0.93;

		switch (pi[decimal]) {
		case 0: order0.add(nuages[decimal]); order0.add(nuages2[decimal]); break;
		case 1: order1.add(nuages[decimal]); order1.add(nuages2[decimal]); break;
		case 2: order2.add(nuages[decimal]); order2.add(nuages2[decimal]); break;
		case 3: order3.add(nuages[decimal]); order3.add(nuages2[decimal]); break;
		case 4: order4.add(nuages[decimal]); order4.add(nuages2[decimal]); break;
		case 5: order5.add(nuages[decimal]); order5.add(nuages2[decimal]); break;
		case 6: order6.add(nuages[decimal]); order6.add(nuages2[decimal]); break;
		case 7: order7.add(nuages[decimal]); order7.add(nuages2[decimal]); break;
		case 8: order8.add(nuages[decimal]); order8.add(nuages2[decimal]); break;
		case 9: order9.add(nuages[decimal]); order9.add(nuages2[decimal]); break;
		}
	}

	// ---- Cloud movement ---------------------------------------------
	while (jj <= decimal) {
		if (nuages[jj].x > 1800) {
			nuages[jj].destroy();
		}
		nuages[jj].x  += pi[jj] / Math.abs(velocityDivider);
		nuages2[jj].x += pi[jj] / Math.abs(velocityDivider);
		jj++;
	}
	jj = 0;

	// ---- Depth sort -------------------------------------------------
	// Render order (back to front):
	//   fond (sky, never moved) → starsGfx (never moved) → moonGfx (never moved)
	//   → blossom clouds (order0-9) → fond2 (reflection)
	//   → lanternsGroup (floating lanterns) → petalsGroup (foreground petals)
	game.world.bringToTop(order0); game.world.bringToTop(order1);
	game.world.bringToTop(order2); game.world.bringToTop(order3);
	game.world.bringToTop(order4); game.world.bringToTop(order5);
	game.world.bringToTop(order6); game.world.bringToTop(order7);
	game.world.bringToTop(order8); game.world.bringToTop(order9);
	fond2.bringToTop();                         // reflection sits above clouds
	game.world.bringToTop(lanternsGroup);       // lanterns float above reflection
	game.world.bringToTop(petalsGroup);         // petals always in front
}

	</script>
</head>
<body style="background-color: #080510;">
	<div id="game" style="
		cursor: none;
		position: absolute;
		TOP: 0px;
		LEFT: 0px;

		image-rendering: optimizeSpeed;
		image-rendering: -moz-crisp-edges;
		image-rendering: -o-crisp-edges;
		image-rendering: -webkit-optimize-contrast;
		image-rendering: optimize-contrast;
		-ms-interpolation-mode: nearest-neighbor;
		image-rendering: pixelated;">
	</div>
</body>
