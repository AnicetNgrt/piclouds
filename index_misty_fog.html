<!DOCTYPE html>
<html>
<head>
	<title>Nuages de Pi — Misty Fog</title>
	<meta charset="utf-8"/>
	<script type="text/javascript" src="phaser.min.js"></script>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			overflow: hidden;
			background-color: #8C9FAD;
		}

		/* Veil overlay — atmospheric haze that gently breathes */
		#fog-veil {
			position: fixed;
			inset: 0;
			pointer-events: none;
			z-index: 500;
			background:
				radial-gradient(ellipse 130% 60% at 20% 80%,
					rgba(210,222,230,0.28) 0%, transparent 60%),
				radial-gradient(ellipse 100% 50% at 80% 75%,
					rgba(205,218,228,0.22) 0%, transparent 55%),
				radial-gradient(ellipse 80%  40% at 50% 15%,
					rgba(195,210,222,0.14) 0%, transparent 50%);
			animation: mistPulse 9s ease-in-out infinite;
		}

		@keyframes mistPulse {
			0%   { opacity: 0.65; }
			28%  { opacity: 1.00; }
			60%  { opacity: 0.75; }
			82%  { opacity: 0.95; }
			100% { opacity: 0.65; }
		}

		/* Theme label */
		#theme-label {
			position: fixed;
			bottom: 12px;
			right: 12px;
			padding: 3px 10px;
			border-radius: 4px;
			font-family: sans-serif;
			font-size: 12px;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			border: 1px solid rgba(160,178,192,0.70);
			background: rgba(110,130,148,0.65);
			color: #EDF2F5;
			opacity: 0.85;
			z-index: 1000;
			pointer-events: none;
		}

		/* Desaturate + brighten canvas for pale foggy silhouettes */
		#PIclouds canvas {
			filter: brightness(1.06) saturate(0.38) contrast(0.88);
		}
	</style>
</head>
<body>
	<div id="PIclouds" style="
		cursor: none;
		position: absolute;
		top: 0px;
		left: 0px;
		image-rendering: optimizeSpeed;
		image-rendering: -moz-crisp-edges;
		image-rendering: -o-crisp-edges;
		image-rendering: -webkit-optimize-contrast;
		image-rendering: optimize-contrast;
		-ms-interpolation-mode: nearest-neighbor;
		image-rendering: pixelated;">
	</div>

	<div id="fog-veil"></div>
	<div id="theme-label">Misty Fog</div>

	<script>
/* ── Theme definition ──────────────────────────────────────────── */
var THEME = {
	name:         'Misty Fog',
	skyBg:        '#8C9FAD',
	cloudPrimary: 0xCCDBE4,   /* pale grey-blue — barely-there silhouette */
	cloudAccent:  0xA8BECC    /* deeper haze for reflection layer          */
};

/* ── Slightly denser + slower for heavy atmospheric haze ──────── */
var densityDivider  = 3.6;
var velocityDivider = 0.78;

/* ── Fog particle state ──────────────────────────────────────── */
var fogParticles = [];
var fogGfx;

/* ── Phaser game ─────────────────────────────────────────────── */
var game = new Phaser.Game(1300, 700, Phaser.CANVAS, 'PIclouds',
	{ preload: preload, create: create, update: update }, false, false);

var nuages  = [];
var nuages2 = [];
var fond, fond2;
var order0, order1, order2, order3, order4;
var order5, order6, order7, order8, order9;
var nn = 0, jj = 0, decimal = -1;

var pi = [3,1,4,1,5,9,2,6,5,3,5,8,9,7,9,3,2,3,8,4,6,2,6,4,3,3,8,3,2,7,9,5,0,2,8,8,4,1,9,7,1,6,9,3,9,9,3,7,5,1,0,5,8,2,0,9,7,4,9,4,4,5,9,2,3,0,7,8,1,6,4,0,6,2,8,6,2,0,8,9,9,8,6,2,8,0,3,4,8,2,5,3,4,2,1,1,7,0,6,7,9,8,2,1,4,8,0,8,6,5,1,3,2,8,2,3,0,6,6,4,7,0,9,3,8,4,4,6,0,9,5,5,0,5,8,2,2,3,1,7,2,5,3,5,9,4,0,8,1,2,8,4,8,1,1,1,7,4,5,0,2,8,4,1,0,2,7,0,1,9,3,8,5,2,1,1,0,5,5,5,9,6,4,4,6,2,2,9,4,8,9,5,4,9,3,0,3,8,1,9,6,4,4,2,8,8,1,0,9,7,5,6,6,5,9,3,3,4,4,6,1,2,8,4,7,5,6,4,8,2,3,3,7,8,6,7,8,3,1,6,5,2,7,1,2,0,1,9,0,9,1,4,5,6,4,8,5,6,6,9,2,3,4,6,0,3,4,8,6,1,0,4,5,4,3,2,6,6,4,8,2,1,3,3,9,3,6,0,7,2,6,0,2,4,9,1,4,1,2,7,3,7,2,4,5,8,7,0,0,6,6,0,6,3,1,5,5,8,8,1,7,4,8,8,1,5,2,0,9,2,0,9,6,2,8,2,9,2,5,4,0,9,1,7,1,5,3,6,4,3,6,7,8,9,2,5,9,0,3,6,0,0,1,1,3,3,0,5,3,0,5,4,8,8,2,0,4,6,6,5,2,1,3,8,4,1,4,6,9,5,1,9,4,1,5,1,1,6,0,9,4,3,3,0,5,7,2,7,0,3,6,5,7,5,9,5,9,1,9,5,3,0,9,2,1,8,6,1,1,7,3,8,1,9,3,2,6,1,1,7,9,3,1,0,5,1,1,8,5,4,8,0,7,4,4,6,2,3,7,9,9,6,2,7,4,9,5,6,7,3,5,1,8,8,5,7,5,2,7,2,4,8,9,1,2,2,7,9,3,8,1,8,3,0,1,1,9,4,9,1,2,9,8,3,3,6,7,3,3,6,2,4,4,0,6,5,6,6,4,3,0,8,6,0,2,1,3,9,4,9,4,6,3,9,5,2,2,4,7,3,7,1,9,0,7,0,2,1,7,9,8,6,0,9,4,3,7,0,2,7,7,0,5,3,9,2,1,7,1,7,6,2,9,3,1,7,6,7,5,2,3,8,4,6,7,4,8,1,8,4,6,7,6,6,9,4,0,5,1,3,2,0,0,0,5,6,8,1,2,7,1,4,5,2,6,3,5,6,0,8,2,7,7,8,5,7,7,1,3,4,2,7,5,7,7,8,9,6,0,9,1,7,3,6,3,7,1,7,8,7,2,1,4,6,8,4,4,0,9,0,1,2,2,4,9,5,3,4,3,0,1,4,6,5,4,9,5,8,5,3,7,1,0,5,0,7,9,2,2,7,9,6,8,9,2,5,8,9,2,3,5,4,2,0,1,9,9,5,6,1,1,2,1,2,9,0,2,1,9,6,0,8,6,4,0,3,4,4,1,8,1,5,9,8,1,3,6,2,9,7,7,4,7,7,1,3,0,9,9,6,0,5,1,8,7,0,7,2,1,1,3,4,9,9,9,9,9,9,8,3,7,2,9,7,8,0,4,9,9,5,1,0,5,9,7,3,1,7,3,2,8,1,6,0,9,6,3,1,8,5,9,5,0,2,4,4,5,9,4,5,5,3,4,6,9,0,8,3,0,2,6,4,2,5,2,2,3,0,8,2,5,3,3,4,4,6,8,5,0,3,5,2,6,1,9,3,1,1,8,8,1,7,1,0,1,0,0,0,3,1,3,7,8,3,8,7,5,2,8,8,6,5,8,7,5,3,3,2,0,8,3,8,1,4,2,0];

function randInt(min, max) {
	return Math.floor(Math.random() * (max - min + 1)) + min;
}
for (var i = 0; i < 10000; i++) {
	pi.push(randInt(0, 9));
}

var timer = 0;

/* ── Fog haze gradient background ──────────────────────────────── */
function drawFogBg(bmd) {
	var ctx = bmd.context;

	/* Sky gradient — pale steel-grey fading to silver mist */
	var sky = ctx.createLinearGradient(0, 0, 0, 700);
	sky.addColorStop(0,    '#7D9BAE');
	sky.addColorStop(0.38, '#8FAABC');
	sky.addColorStop(0.60, '#9DB7C6');
	sky.addColorStop(0.80, '#AABFCC');
	sky.addColorStop(1,    '#B5C8D2');
	ctx.fillStyle = sky;
	ctx.fillRect(0, 0, 1300, 700);

	/* Horizon luminance band — pale glow where sky meets ground mist */
	var horizGlow = ctx.createLinearGradient(0, 310, 0, 430);
	horizGlow.addColorStop(0,   'rgba(220,232,240,0)');
	horizGlow.addColorStop(0.4, 'rgba(218,230,238,0.18)');
	horizGlow.addColorStop(0.6, 'rgba(215,228,236,0.18)');
	horizGlow.addColorStop(1,   'rgba(210,225,234,0)');
	ctx.fillStyle = horizGlow;
	ctx.fillRect(0, 310, 1300, 120);

	/* Four ground-level fog pools — radial gradients fading upward */
	var pools = [
		{ x:  -50, y: 560, rx: 440, ry: 180 },
		{ x:  420, y: 590, rx: 380, ry: 160 },
		{ x:  830, y: 570, rx: 420, ry: 175 },
		{ x: 1230, y: 555, rx: 360, ry: 165 }
	];
	pools.forEach(function(p) {
		ctx.save();
		ctx.translate(p.x, p.y);
		ctx.scale(1, p.ry / p.rx);
		var g = ctx.createRadialGradient(0, 0, 0, 0, 0, p.rx);
		g.addColorStop(0,    'rgba(225,235,242,0.30)');
		g.addColorStop(0.45, 'rgba(218,230,238,0.16)');
		g.addColorStop(1,    'rgba(210,224,234,0)');
		ctx.fillStyle = g;
		ctx.beginPath();
		ctx.arc(0, 0, p.rx, 0, Math.PI * 2);
		ctx.fill();
		ctx.restore();
	});

	/* Sparse mid-air wisps — very faint oblong patches */
	var wisps = [
		{ x: 160,  y: 260, rx: 280, ry: 70  },
		{ x: 700,  y: 200, rx: 340, ry: 55  },
		{ x: 1080, y: 310, rx: 260, ry: 65  }
	];
	wisps.forEach(function(w) {
		ctx.save();
		ctx.translate(w.x, w.y);
		ctx.scale(1, w.ry / w.rx);
		var g = ctx.createRadialGradient(0, 0, 0, 0, 0, w.rx);
		g.addColorStop(0,   'rgba(220,232,240,0.12)');
		g.addColorStop(0.6, 'rgba(215,228,238,0.06)');
		g.addColorStop(1,   'rgba(210,224,234,0)');
		ctx.fillStyle = g;
		ctx.beginPath();
		ctx.arc(0, 0, w.rx, 0, Math.PI * 2);
		ctx.fill();
		ctx.restore();
	});

	bmd.dirty = true;
}

/* ── Drifting fog particle initialisation ──────────────────────── */
function initFogParticles() {
	fogParticles = [];
	for (var i = 0; i < 60; i++) {
		fogParticles.push({
			x:      Math.random() * 1600 - 150,
			y:      Math.random() * 750,
			radius: 70  + Math.random() * 190,
			alpha:  0.025 + Math.random() * 0.075,
			vx:     0.12 + Math.random() * 0.38,
			vy:     (Math.random() - 0.5) * 0.10,
			phase:  Math.random() * Math.PI * 2
		});
	}
}

/* ── Preload ─────────────────────────────────────────────────── */
function preload() {
	game.load.image('nuage',  'nuage.png');
	game.load.image('nuage2', 'nuage2.png');
	game.load.image('field',  'field.png');
	game.load.image('fond',   'fond.png');
	game.load.image('fond2',  'fond2.png');
}

/* ── Create ──────────────────────────────────────────────────── */
function create() {
	game.time.desiredFps = 30;
	game.stage.backgroundColor = THEME.skyBg;

	/* Static fog background layer */
	var fogBmd = game.add.bitmapData(1300, 700);
	drawFogBg(fogBmd);
	game.add.image(0, 0, fogBmd);

	/* Background tile sprites — tinted pale grey */
	fond  = game.add.tileSprite(0,   0, 1300, 400, 'fond');
	fond2 = game.add.tileSprite(0, 400, 1300, 300, 'fond2');
	fond.tint   = THEME.cloudPrimary;
	fond2.tint  = THEME.cloudAccent;
	fond2.alpha = 0.68;

	/* Depth ordering groups */
	order0 = game.add.group();
	order1 = game.add.group();
	order2 = game.add.group();
	order3 = game.add.group();
	order4 = game.add.group();
	order5 = game.add.group();
	order6 = game.add.group();
	order7 = game.add.group();
	order8 = game.add.group();
	order9 = game.add.group();

	/* Fog particle Graphics layer (on top of everything) */
	fogGfx = game.add.graphics(0, 0);

	initFogParticles();
}

/* ── Update ──────────────────────────────────────────────────── */
function update() {
	timer++;

	/* ── Spawn next cloud ──────────────────────────────────────── */
	if (timer > (pi[decimal + 1]) * densityDivider) {
		decimal++;
		timer = 0;

		/* Upper cloud — very low opacity for ghostly silhouette */
		nuages.push(game.add.tileSprite(-200, 400 - (pi[decimal] * 34 - 15), 768, 312, 'nuage'));
		nuages[decimal].anchor.x = 0.7;
		nuages[decimal].anchor.y = 0.5;
		nuages[decimal].scale.setTo(pi[decimal] / 10, pi[decimal] / 10);
		nuages[decimal].alpha = 0.62;
		nuages[decimal].tint  = THEME.cloudPrimary;

		/* Lower reflection — even more transparent */
		nuages2.push(game.add.tileSprite(-200, 400 + (pi[decimal] * 34 - 15), 768, 312, 'nuage2'));
		nuages2[decimal].anchor.x = 0.7;
		nuages2[decimal].anchor.y = 0.5;
		nuages2[decimal].scale.setTo(pi[decimal] / 10, pi[decimal] / 10);
		nuages2[decimal].alpha = 0.40;
		nuages2[decimal].tint  = THEME.cloudAccent;

		/* Assign to depth group */
		switch (pi[decimal]) {
		case 0: order0.add(nuages[decimal]); order0.add(nuages2[decimal]); break;
		case 1: order1.add(nuages[decimal]); order1.add(nuages2[decimal]); break;
		case 2: order2.add(nuages[decimal]); order2.add(nuages2[decimal]); break;
		case 3: order3.add(nuages[decimal]); order3.add(nuages2[decimal]); break;
		case 4: order4.add(nuages[decimal]); order4.add(nuages2[decimal]); break;
		case 5: order5.add(nuages[decimal]); order5.add(nuages2[decimal]); break;
		case 6: order6.add(nuages[decimal]); order6.add(nuages2[decimal]); break;
		case 7: order7.add(nuages[decimal]); order7.add(nuages2[decimal]); break;
		case 8: order8.add(nuages[decimal]); order8.add(nuages2[decimal]); break;
		case 9: order9.add(nuages[decimal]); order9.add(nuages2[decimal]); break;
		}
	}

	/* ── Move existing clouds ─────────────────────────────────── */
	while (jj <= decimal) {
		if (nuages[jj].x > 1800) {
			nuages[jj].destroy();
		}
		nuages[jj].x  += pi[jj] / Math.abs(velocityDivider);
		nuages2[jj].x += pi[jj] / Math.abs(velocityDivider);
		jj++;
	}
	jj = 0;

	/* ── Depth sort ──────────────────────────────────────────── */
	game.world.bringToTop(order0);
	game.world.bringToTop(order1);
	game.world.bringToTop(order2);
	game.world.bringToTop(order3);
	game.world.bringToTop(order4);
	game.world.bringToTop(order5);
	game.world.bringToTop(order6);
	game.world.bringToTop(order7);
	game.world.bringToTop(order8);
	game.world.bringToTop(order9);
	fond2.bringToTop();

	/* ── Animate drifting fog wisps ──────────────────────────── */
	fogGfx.clear();
	var elapsed = game.time.totalElapsedSeconds();

	for (var i = 0; i < fogParticles.length; i++) {
		var p = fogParticles[i];

		/* Drift horizontally, small vertical oscillation */
		p.x += p.vx;
		p.y += p.vy + Math.sin(elapsed * 0.25 + p.phase) * 0.06;

		/* Wrap around screen edges */
		if (p.x > 1550)  p.x = -350;
		if (p.y < -250)  p.y =  850;
		if (p.y >  850)  p.y = -250;

		/* Gentle opacity breathing tied to phase */
		var breathe = Math.sin(elapsed * 0.35 + p.phase) * 0.018;
		var a = Math.max(0, Math.min(1, p.alpha + breathe));

		/* Soft circle — multiple nested rings create illusion of soft edge */
		fogGfx.beginFill(0xD2E0EA, a * 0.40);
		fogGfx.drawCircle(p.x, p.y, p.radius * 2.8);
		fogGfx.endFill();

		fogGfx.beginFill(0xCEDDE8, a * 0.65);
		fogGfx.drawCircle(p.x, p.y, p.radius * 1.6);
		fogGfx.endFill();

		fogGfx.beginFill(0xCADAE6, a);
		fogGfx.drawCircle(p.x, p.y, p.radius * 0.7);
		fogGfx.endFill();
	}

	/* Fog always renders above clouds */
	game.world.bringToTop(fogGfx);
}
	</script>
</body>
</html>
