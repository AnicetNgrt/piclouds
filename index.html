<script>
(function () {
  var S = 4;
  var O = '#e8a06a', D = '#c47834', B = '#111', P = '#ff88aa', T = '#d4883a';

  function shadow(rows) {
    var parts = [];
    var map = { O: O, D: D, B: B, P: P, T: T };
    rows.forEach(function (row, r) {
      for (var c = 0; c < row.length; c++) {
        var color = map[row[c]];
        if (color) parts.push((c * S) + 'px ' + (r * S) + 'px 0 0 ' + color);
      }
    });
    return parts.join(',');
  }

  var body = [
    'OO...OO...',  // 0 ears
    'OOOOOOOO..',  // 1 head top
    'OBOOOOBO..',  // 2 eyes
    'OOOPOOO...',  // 3 nose
    'OOOOOOOO..',  // 4 chin
    '.OOOOOOOOT',  // 5 neck + tail tip
    '.OODOOOOOO',  // 6 body (stripe)
    '.OOOOOOOO.',  // 7 body lower
  ];
  var legs1 = ['.O..OO..O.', '.O..OO..O.'];
  var legs2 = ['..O.OO.O..', '..O.OO.O..'];

  function makeFrame(legs) {
    var el = document.createElement('div');
    el.className = 'cat-frame';
    el.style.boxShadow = shadow(body.concat(legs));
    return el;
  }

  var f1 = makeFrame(legs1); f1.classList.add('cat-frame-1');
  var f2 = makeFrame(legs2); f2.classList.add('cat-frame-2');

  var sprite = document.getElementById('cat-sprite');
  sprite.style.width  = (10 * S) + 'px';
  sprite.style.height = (10 * S) + 'px';
  sprite.appendChild(f1);
  sprite.appendChild(f2);

  var jokes = [
    "Why do programmers prefer\ndark mode?\nLight attracts bugs! \uD83D\uDC1B",
    "A SQL query walks into a bar\nand asks two tables:\n'Can I JOIN you?'",
    "!false\n// funny because it's true",
    "99 bugs in the code...\n98 bugs in the code...\nfix one, push, deploy:\n127 bugs in the code.",
    "Why do Java devs\nwear glasses?\nThey don't C#.",
    "How to comfort a JS bug?\nYou console it.",
    "There are 10 types of people:\nthose who get binary\nand those who don't.",
    "Git blame yourself.\n// commit message: fix\n// (that's all, just 'fix')",
    "Debugging: being the detective\nin a crime where you are\nalso the murderer.",
    "It works on my machine.\n// (ship the machine)",
  ];

  var idx = 0;
  var bubble = document.getElementById('cat-bubble');

  function showJoke() {
    bubble.textContent = jokes[idx++ % jokes.length];
    bubble.classList.add('show');
    setTimeout(function () { bubble.classList.remove('show'); }, 4200);
  }

  setTimeout(function () {
    showJoke();
    setInterval(showJoke, 9000);
  }, 2500);
})();
</script>
