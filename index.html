function create() {
	game.time.desiredFps = 30;
	var tcfg = THEMES[THEME];
	game.stage.backgroundColor = tcfg.stageBg;

		var stars = game.add.graphics(0, 0);
		// Dense faint field of stars.
		stars.beginFill(0xffffff, 0.7);
		for (var s = 0; s < 160; s++) {
			var sx = Math.random() * 1300;
			var sy = Math.random() * 380;
			var sr = Math.random() * 1.1 + 0.3;
			stars.drawCircle(sx, sy, sr);
		}
		stars.endFill();
		// A handful of brighter stars.
		stars.beginFill(0xffffff, 1);
		for (var b = 0; b < 25; b++) {
			var bx = Math.random() * 1300;
			var by = Math.random() * 340;
			stars.drawCircle(bx, by, Math.random() * 1.2 + 1.2);
