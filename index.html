var DIGIT_COLORS = [
	'#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa',
	'#fb923c','#38bdf8','#4ade80','#e879f9','#f9a8d4'
];

// ── State ─────────────────────────────────────────────────────────────────────
var currentKey = 'pi';
var currentConst = CONSTANTS[currentKey];
var digits = currentConst.digits.slice();

// ── Build constant-selector buttons ──────────────────────────────────────────
var panel = document.getElementById('constants-panel');
Object.keys(CONSTANTS).forEach(function(key) {
	var c = CONSTANTS[key];
	var btn = document.createElement('button');
	btn.className = 'const-btn' + (key === currentKey ? ' active' : '');
	btn.id = 'btn-' + key;
	btn.innerHTML = '<span style="color:' + c.color + '">' + c.symbol + '</span> ' + c.name;
	btn.addEventListener('click', function() { switchConstant(key); });
	panel.appendChild(btn);
});

// ── Digit stream ──────────────────────────────────────────────────────────────
var STREAM_MAX = 24;
var streamEl = document.getElementById('digit-stream');
var streamBubbles = [];

function addDigitBubble(d) {
	streamBubbles.forEach(function(b) { b.classList.remove('latest'); });
	var bubble = document.createElement('div');
	bubble.className = 'digit-bubble latest';
	bubble.style.background = DIGIT_COLORS[d];
	bubble.textContent = d;
	streamEl.appendChild(bubble);
	streamBubbles.push(bubble);
	if (streamBubbles.length > STREAM_MAX) {
		var old = streamBubbles.shift();
		old.style.opacity = '0.35';
		old.style.transform = 'scale(0.8)';
	}
}

function clearDigitStream() {
	streamBubbles.forEach(function(b) { b.remove(); });
	streamBubbles = [];
}

// ── Switch constant ───────────────────────────────────────────────────────────
function switchConstant(key) {
	if (key === currentKey) return;
	currentKey = key;
	currentConst = CONSTANTS[key];

	document.querySelectorAll('.const-btn').forEach(function(b) { b.classList.remove('active'); });
	document.getElementById('btn-' + key).classList.add('active');
	document.getElementById('info-symbol').textContent = currentConst.symbol;
	document.getElementById('info-eq').textContent = currentConst.eq;

	clearDigitStream();
	resetSimulation();
}

// ── Phaser game ───────────────────────────────────────────────────────────────
var game = new Phaser.Game(1300, 700, Phaser.CANVAS, 'PIclouds',
	{ preload: preload, create: create, update: update }, false, false);

var nuages = []; var densityDivider = 4; var velocityDivider = 0.6;
var nuages2 = [];
var jj = 0;
var decimal = -1;
var timer = 0;
var orderGroups = [];
var fond, fond2;

function preload() {
	game.load.image('nuage', 'nuage.png');
	game.load.image('nuage2', 'nuage2.png');
	game.load.image('fond', 'fond.png');
	game.load.image('fond2', 'fond2.png');
}

function create() {
	game.time.desiredFps = 30;
	game.stage.backgroundColor = '#4488AA';
	fond  = game.add.tileSprite(0, 0, 1300, 400, 'fond');
	fond2 = game.add.tileSprite(0, 400, 1300, 300, 'fond2');
	fond2.alpha = 0.9;
	for (var i = 0; i < 10; i++) orderGroups.push(game.add.group());
}

function resetSimulation() {
	nuages.forEach(function(n) { if (n && n.alive) n.destroy(); });
	nuages2.forEach(function(n) { if (n && n.alive) n.destroy(); });
	nuages = []; nuages2 = [];
	decimal = -1; timer = 0; jj = 0;
	digits = currentConst.digits.slice();
	document.getElementById('info-pos').textContent = '0';
	document.getElementById('info-digit').textContent = digits[0];
	document.getElementById('info-digit').style.color = DIGIT_COLORS[digits[0]];
}

function update() {
	timer++;
	if (decimal + 1 < digits.length && timer > digits[decimal + 1] * densityDivider) {
		decimal++;
		timer = 0;
		var d = digits[decimal];

		var cloud = game.add.tileSprite(-200, 400 - (d * 34 - 15), 768, 312, 'nuage');
		cloud.anchor.x = 0.7; cloud.anchor.y = 0.5;
		cloud.scale.setTo(d / 10, d / 10);
		cloud.alpha = 0.99;

		var cloud2 = game.add.tileSprite(-200, 400 + (d * 34 - 15), 768, 312, 'nuage2');
		cloud2.anchor.x = 0.7; cloud2.anchor.y = 0.5;
		cloud2.scale.setTo(d / 10, d / 10);

		nuages.push(cloud);
		nuages2.push(cloud2);

		if (d >= 0 && d <= 9) {
			orderGroups[d].add(nuages[decimal]);
			orderGroups[d].add(nuages2[decimal]);
		}

		document.getElementById('info-pos').textContent = decimal + 1;
		document.getElementById('info-digit').style.color = DIGIT_COLORS[d];
		document.getElementById('info-digit').textContent = d;
		addDigitBubble(d);
	}

	while (jj <= decimal) {
		if (nuages[jj] && nuages[jj].alive) {
			if (nuages[jj].x > 1800) {
				nuages[jj].destroy();
				nuages2[jj].destroy();
			} else {
				nuages[jj].x  += digits[jj] / Math.abs(velocityDivider);
				nuages2[jj].x += digits[jj] / Math.abs(velocityDivider);
			}
		}
		jj++;
	}
	jj = 0;

	orderGroups.forEach(function(g) { game.world.bringToTop(g); });
	fond2.bringToTop();
}
