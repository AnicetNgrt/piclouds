var timer = 0;

// ── Pi Music Engine ───────────────────────────────────────────────────────────
// Each Pi digit (0–9) maps to a pentatonic note across two octaves.
// Pentatonic avoids dissonance so any sequence sounds musical — perfect for
// Pi's infinite, non-repeating decimal.
var audioCtx = null;
var masterGain = null;
var musicEnabled = false;
var musicBtn = null;

// C D E G A pentatonic scale, two octaves
var NOTE_FREQS = [
	261.63,  // 0 → C4
	293.66,  // 1 → D4
	329.63,  // 2 → E4
	392.00,  // 3 → G4
	440.00,  // 4 → A4
	523.25,  // 5 → C5
	587.33,  // 6 → D5
	659.25,  // 7 → E5
	783.99,  // 8 → G5
	880.00   // 9 → A5
];
var NOTE_NAMES = ['C4','D4','E4','G4','A4','C5','D5','E5','G5','A5'];
var lastNoteName = '—';

function initAudio() {
	if (audioCtx) return;
	audioCtx = new (window.AudioContext || window.webkitAudioContext)();
	masterGain = audioCtx.createGain();
	masterGain.gain.setValueAtTime(0.28, audioCtx.currentTime);
	masterGain.connect(audioCtx.destination);
}

function playPiNote(digit) {
	if (!musicEnabled || !audioCtx) return;
	var freq = NOTE_FREQS[digit];
	var now = audioCtx.currentTime;

	// Primary tone: soft sine with fade-in + exponential decay
	var osc = audioCtx.createOscillator();
	var env = audioCtx.createGain();
	osc.type = 'sine';
	osc.frequency.setValueAtTime(freq, now);
	env.gain.setValueAtTime(0, now);
	env.gain.linearRampToValueAtTime(0.65, now + 0.05);
	env.gain.exponentialRampToValueAtTime(0.001, now + 2.0);
	osc.connect(env);
	env.connect(masterGain);
	osc.start(now);
	osc.stop(now + 2.1);

	// Octave overtone (adds warmth)
	var osc2 = audioCtx.createOscillator();
	var env2 = audioCtx.createGain();
	osc2.type = 'sine';
	osc2.frequency.setValueAtTime(freq * 2, now);
	env2.gain.setValueAtTime(0, now);
	env2.gain.linearRampToValueAtTime(0.18, now + 0.04);
	env2.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
	osc2.connect(env2);
	env2.connect(masterGain);
	osc2.start(now);
	osc2.stop(now + 1.3);

	lastNoteName = NOTE_NAMES[digit];
}

function toggleMusic() {
	initAudio();
	if (audioCtx.state === 'suspended') audioCtx.resume();
	musicEnabled = !musicEnabled;
	if (musicBtn) {
		musicBtn.textContent = musicEnabled ? '♪ Music: ON' : '♪ Music: OFF';
		musicBtn.style.background = musicEnabled
			? 'rgba(70,180,255,0.75)'
			: 'rgba(0,0,0,0.7)';
	}
}

function update() {

	if (isPaused) {
		updateStatsDisplay();
		return;
	}

	timer++;

	if (timer > (pi[decimal+1])*densityDivider) {

		decimal++;
		timer = 0;
		nuages.push(game.add.tileSprite(-200, 400-(pi[decimal]*34-15)/*+(((pi[decimal]-pi[decimal+pi[decimal]])*pi[decimal]))/2)*/, 768, 312, 'nuage'));
		nuages[decimal].anchor.x = 0.7;
		nuages[decimal].anchor.y = 0.5;
		nuages[decimal].scale.setTo((pi[decimal])/10/*+Math.abs(((pi[decimal]-pi[decimal+1])/9))*/, (pi[decimal])/10);
		nuages[decimal].alpha = 0.9;
		//sum += pi[decimal];
		nuages2.push(game.add.tileSprite(-200, 400+(pi[decimal]*34-15)/*+(((pi[decimal]-pi[decimal+pi[decimal]])*pi[decimal]))/2)*/, 768, 312, 'nuage2'));
		nuages2[decimal].anchor.x = 0.7;
		nuages2[decimal].anchor.y = 0.5;
		nuages2[decimal].scale.setTo((pi[decimal])/10/*+Math.abs(((pi[decimal]-pi[decimal+1])/9))*/, (pi[decimal])/10);
		nuages[decimal].alpha = 0.99;

		digitCounts[pi[decimal]]++;
		totalCloudsGenerated++;
		playPiNote(pi[decimal]);

		switch(pi[decimal]) {
		case 0:
			order0.add(nuages[decimal]);
			order0.add(nuages2[decimal]);
			break;
		case 1:
			order1.add(nuages[decimal]);
			order1.add(nuages2[decimal]);
			break;
		case 2:
			order2.add(nuages[decimal]);
			order2.add(nuages2[decimal]);
			break;
		case 3:
			order3.add(nuages[decimal]);
			order3.add(nuages2[decimal]);
			break;
		case 4:
			order4.add(nuages[decimal]);
			order4.add(nuages2[decimal]);
			break;
		case 5:
			order5.add(nuages[decimal]);
			order5.add(nuages2[decimal]);
			break;
		case 6:
			order6.add(nuages[decimal]);
			order6.add(nuages2[decimal]);
			break;
		case 7:
			order7.add(nuages[decimal]);
			order7.add(nuages2[decimal]);
			break;
		case 8:
			order8.add(nuages[decimal]);
			order8.add(nuages2[decimal]);
			break;
		case 9:
			order9.add(nuages[decimal]);
			order9.add(nuages2[decimal]);
			break;
		}
	}

	while (jj <= decimal ) {
		if (nuages[jj].x > 1800) {
			nuages[jj].destroy();
		}
		nuages[jj].x += (pi[jj])/Math.abs(velocityDivider);
		nuages2[jj].x += (pi[jj])/Math.abs(velocityDivider);
		//nuages[jj].angle += (1/(pi[jj]))*3;
		jj++;
		//if (nuages[jj].x > 1300) {
		//}

}

	controlsDiv.id = 'controls';
	controlsDiv.style.cssText = 'position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); color: white; padding: 20px; border-radius: 8px; font-family: monospace; font-size: 13px; z-index: 1000;';
	controlsDiv.innerHTML = '<strong>Controls</strong><br/>SPACE: Pause/Resume<br/>↑/↓: Speed Control<br/>R: Reset Stats<br/>M: Toggle Music';
	document.body.appendChild(controlsDiv);

	// Music toggle button — bottom-right
	musicBtn = document.createElement('button');
	musicBtn.id = 'music-btn';
	musicBtn.textContent = '♪ Music: OFF';
	musicBtn.style.cssText = 'position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 10px 18px; border-radius: 8px; font-family: monospace; font-size: 14px; cursor: pointer; z-index: 1000; transition: background 0.2s;';
	musicBtn.onclick = toggleMusic;
	document.body.appendChild(musicBtn);
}

function setupKeyboard() {
	document.addEventListener('keydown', function(e) {
		if (e.code === 'Space') {
			e.preventDefault();
			isPaused = !isPaused;
		} else if (e.code === 'ArrowUp') {
			velocityDivider = Math.max(0.1, velocityDivider - 0.1);
		} else if (e.code === 'ArrowDown') {
			velocityDivider = Math.min(2, velocityDivider + 0.1);
		} else if (e.code === 'KeyM') {
			toggleMusic();
		} else if (e.code === 'KeyR') {
			decimal = -1;
			digitCounts = new Array(10).fill(0);
			totalCloudsGenerated = 0;
			startTime = Date.now();
			timer = 0;
			jj = 0;
			nuages.forEach(function(n) { if (n) n.destroy(); });
			nuages2.forEach(function(n) { if (n) n.destroy(); });
			nuages = [];
			nuages2 = [];
		}
	});
}

function updateStatsDisplay() {
	var statsDiv = document.getElementById('stats-overlay');
	if (!statsDiv) return;

	var elapsed = Math.floor((Date.now() - startTime) / 1000);
	var minutes = Math.floor(elapsed / 60);
	var seconds = elapsed % 60;
	var timeStr = minutes + 'm ' + (seconds < 10 ? '0' : '') + seconds + 's';

	var mostCommon = 0;
	for (var i = 1; i < 10; i++) {
		if (digitCounts[i] > digitCounts[mostCommon]) {
			mostCommon = i;
		}
	}

	var distribution = '';
	for (var i = 0; i < 10; i++) {
		var count = digitCounts[i];
		var pct = totalCloudsGenerated > 0 ? ((count / totalCloudsGenerated) * 100).toFixed(1) : '0.0';
		var bar = '';
		for (var j = 0; j < Math.round(count / 2); j++) {
			bar += '█';
		}
		distribution += '<div>' + i + ': ' + count.toString().padStart(4) + ' (' + pct.padStart(5) + '%) ' + bar + '</div>';
	}

	var pausedStr = isPaused ? '<span style="color: #ff6b6b;">▶ PAUSED</span>' : '<span style="color: #51cf66;">▶ PLAYING</span>';

	var musicStr = musicEnabled
		? '<span style="color: #4ec9ff;">♪ ' + lastNoteName + '</span>'
		: '<span style="color: #888;">♪ off</span>';

	statsDiv.innerHTML = '<strong>π Digit Statistics</strong><br/><br/>' +
		'<div>Status: ' + pausedStr + '</div>' +
		'<div>Music: ' + musicStr + '</div><br/>' +
		'<div>Position: ' + (decimal + 1) + ' (π[' + decimal + '])</div>' +
		'<div>Elapsed: ' + timeStr + '</div>' +
		'<div>Clouds: ' + totalCloudsGenerated + '</div>' +
		'<div>Speed: ' + velocityDivider.toFixed(1) + 'x</div><br/>' +
		'<div style="font-weight: bold; font-size: 12px;">Distribution</div>' +
		'<div style="font-size: 12px; margin-top: 8px;">' + distribution + '</div>';
}
