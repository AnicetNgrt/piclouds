<!DOCTYPE html>
<html>
<head>
	<title>Nuages de Pi</title>
	<link href="stylesheet.css" rel="stylesheet">
	<meta charset="utf-8"/>
	<script type="text/javascript" src="phaser.min.js"></script>
	<style>
		#predictor-overlay {
			display: none;
			position: absolute;
			top: 0; left: 0;
			width: 100%; height: 100%;
			pointer-events: none;
			z-index: 10;
		}
		#prediction-panel {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			background: rgba(0,0,0,0.75);
			border: 2px solid rgba(255,255,255,0.4);
			border-radius: 16px;
			padding: 20px 30px;
			text-align: center;
			pointer-events: all;
			min-width: 340px;
			font-family: Arial, sans-serif;
		}
		#prediction-panel h2 {
			color: #fff;
			margin: 0 0 6px 0;
			font-size: 18px;
			letter-spacing: 1px;
		}
		#prediction-prompt {
			color: #aef;
			font-size: 13px;
			margin-bottom: 14px;
		}
		#digit-buttons {
			display: flex;
			flex-wrap: wrap;
			justify-content: center;
			gap: 8px;
			margin-bottom: 14px;
		}
		.digit-btn {
			width: 50px;
			height: 50px;
			border-radius: 8px;
			border: 2px solid rgba(255,255,255,0.5);
			background: rgba(40, 100, 180, 0.7);
			color: #fff;
			font-size: 22px;
			font-weight: bold;
			cursor: pointer;
			transition: background 0.15s, transform 0.1s;
		}
		.digit-btn:hover {
			background: rgba(80, 150, 230, 0.9);
			transform: scale(1.1);
		}
		.digit-btn.correct {
			background: rgba(50, 200, 80, 0.9) !important;
			border-color: #0f0;
		}
		.digit-btn.wrong {
			background: rgba(200, 50, 50, 0.9) !important;
			border-color: #f00;
		}
		.digit-btn.reveal {
			background: rgba(255, 200, 0, 0.9) !important;
			border-color: #fd0;
		}
		#timer-bar-wrap {
			width: 100%;
			height: 6px;
			background: rgba(255,255,255,0.2);
			border-radius: 3px;
			overflow: hidden;
		}
		#timer-bar {
			height: 6px;
			background: linear-gradient(90deg, #4af, #08f);
			border-radius: 3px;
			transition: width linear;
		}
		#pred-stats {
			color: #ccc;
			font-size: 12px;
			margin-top: 10px;
		}
		#pred-stats span {
			color: #fff;
			font-weight: bold;
		}
		#result-flash {
			font-size: 26px;
			font-weight: bold;
			height: 32px;
			margin-bottom: 6px;
			transition: opacity 0.3s;
		}
		#hud-predictor {
			position: absolute;
			top: 10px;
			left: 10px;
			color: #fff;
			font-family: Arial, sans-serif;
			font-size: 14px;
			text-shadow: 1px 1px 3px #000;
			pointer-events: none;
		}
		#hud-predictor div { margin-bottom: 3px; }
		#hud-mode {
			position: absolute;
			top: 10px;
			left: 50%;
			transform: translateX(-50%);
			color: rgba(255,255,255,0.7);
			font-family: Arial, sans-serif;
			font-size: 12px;
			text-shadow: 1px 1px 2px #000;
			pointer-events: none;
			white-space: nowrap;
		}
	</style>
	<script>
var game = new Phaser.Game(1300, 700, Phaser.CANVAS, 'PIclouds', { preload: preload, create: create, update: update }, false, false);
var nuages = []; var densityDivider = 4; var velocityDivider = 0.6;
var nuages2 = []; var field; var fond; var fond2;
var nn = 0; var jj = 0; var sum = 0; var lock = 0;
var decimal = -1;

// Game mode variables
var gameMode = 'visualization'; // 'visualization', 'catcher', or 'predictor'
var score = 0;
var combo = 0;
var lives = 3;
var catchableDigits = {};
var scoreText;
var comboText;
var livesText;
var modeText;
var basePoints = 10;
var difficultyLevel = 1;

// Predictor mode variables
var predScore = 0;
var predTotal = 0;
var predCorrect = 0;
var predWaiting = false;   // true when waiting for player guess
var predGuess = -1;        // -1 = no guess yet, 0-9 = guessed digit
var predNextDigit = -1;    // the digit we're about to reveal
var predRevealTimer = 0;   // countdown after guess before spawning cloud
var predTimerStart = 0;    // timestamp when prediction prompt appeared
var PRED_TIMEOUT = 2500;   // ms player has to guess
var PRED_REVEAL_DELAY = 700; // ms to show result before spawning cloud

var pi = [3,1,4,1,5,9,2,6,5,3,5,8,9,7,9,3,2,3,8,4,6,2,6,4,3,3,8,3,2,7,9,5,0,2,8,8,4,1,9,7,1,6,9,3,9,9,3,7,5,1,0,5,8,2,0,9,7,4,9,4,4,5,9,2,3,0,7,8,1,6,4,0,6,2,8,6,2,0,8,9,9,8,6,2,8,0,3,4,8,2,5,3,4,2,1,1,7,0,6,7,9,8,2,1,4,8,0,8,6,5,1,3,2,8,2,3,0,6,6,4,7,0,9,3,8,4,4,6,0,9,5,5,0,5,8,2,2,3,1,7,2,5,3,5,9,4,0,8,1,2,8,4,8,1,1,1,7,4,5,0,2,8,4,1,0,2,7,0,1,9,3,8,5,2,1,1,0,5,5,5,9,6,4,4,6,2,2,9,4,8,9,5,4,9,3,0,3,8,1,9,6,4,4,2,8,8,1,0,9,7,5,6,6,5,9,3,3,4,4,6,1,2,8,4,7,5,6,4,8,2,3,3,7,8,6,7,8,3,1,6,5,2,7,1,2,0,1,9,0,9,1,4,5,6,4,8,5,6,6,9,2,3,4,6,0,3,4,8,6,1,0,4,5,4,3,2,6,6,4,8,2,1,3,3,9,3,6,0,7,2,6,0,2,4,9,1,4,1,2,7,3,7,2,4,5,8,7,0,0,6,6,0,6,3,1,5,5,8,8,1,7,4,8,8,1,5,2,0,9,2,0,9,6,2,8,2,9,2,5,4,0,9,1,7,1,5,3,6,4,3,6,7,8,9,2,5,9,0,3,6,0,0,1,1,3,3,0,5,3,0,5,4,8,8,2,0,4,6,6,5,2,1,3,8,4,1,4,6,9,5,1,9,4,1,5,1,1,6,0,9,4,3,3,0,5,7,2,7,0,3,6,5,7,5,9,5,9,1,9,5,3,0,9,2,1,8,6,1,1,7,3,8,1,9,3,2,6,1,1,7,9,3,1,0,5,1,1,8,5,4,8,0,7,4,4,6,2,3,7,9,9,6,2,7,4,9,5,6,7,3,5,1,8,8,5,7,5,2,7,2,4,8,9,1,2,2,7,9,3,8,1,8,3,0,1,1,9,4,9,1,2,9,8,3,3,6,7,3,3,6,2,4,4,0,6,5,6,6,4,3,0,8,6,0,2,1,3,9,4,9,4,6,3,9,5,2,2,4,7,3,7,1,9,0,7,0,2,1,7,9,8,6,0,9,4,3,7,0,2,7,7,0,5,3,9,2,1,7,1,7,6,2,9,3,1,7,6,7,5,2,3,8,4,6,7,4,8,1,8,4,6,7,6,6,9,4,0,5,1,3,2,0,0,0,5,6,8,1,2,7,1,4,5,2,6,3,5,6,0,8,2,7,7,8,5,7,7,1,3,4,2,7,5,7,7,8,9,6,0,9,1,7,3,6,3,7,1,7,8,7,2,1,4,6,8,4,4,0,9,0,1,2,2,4,9,5,3,4,3,0,1,4,6,5,4,9,5,8,5,3,7,1,0,5,0,7,9,2,2,7,9,6,8,9,2,5,8,9,2,3,5,4,2,0,1,9,9,5,6,1,1,2,1,2,9,0,2,1,9,6,0,8,6,4,0,3,4,4,1,8,1,5,9,8,1,3,6,2,9,7,7,4,7,7,1,3,0,9,9,6,0,5,1,8,7,0,7,2,1,1,3,4,9,9,9,9,9,9,8,3,7,2,9,7,8,0,4,9,9,5,1,0,5,9,7,3,1,7,3,2,8,1,6,0,9,6,3,1,8,5,9,5,0,2,4,4,5,9,4,5,5,3,4,6,9,0,8,3,0,2,6,4,2,5,2,2,3,0,8,2,5,3,3,4,4,6,8,5,0,3,5,2,6,1,9,3,1,1,8,8,1,7,1,0,1,0,0,0,3,1,3,7,8,3,8,7,5,2,8,8,6,5,8,7,5,3,3,2,0,8,3,8,1,4,2,0];

function randInt(min, max) {
	return Math.floor(Math.random() * (max - min + 1)) + min;
}

for (var i = 0; i<10000; i++) {
	pi.push(randInt(0,9));
}

var timer = 0;

// ─── Predictor UI helpers ──────────────────────────────────────────────────

function showPredictionPanel(digit) {
	predNextDigit = digit;
	predGuess = -1;
	predTimerStart = Date.now();

	var panel = document.getElementById('predictor-overlay');
	panel.style.display = 'block';

	document.getElementById('result-flash').textContent = '';
	document.getElementById('result-flash').style.color = '#fff';

	// Reset all buttons
	var btns = document.querySelectorAll('.digit-btn');
	btns.forEach(function(b) {
		b.classList.remove('correct','wrong','reveal');
		b.disabled = false;
		b.style.opacity = '1';
	});

	// Accuracy text
	updatePredStats();

	// Animate timer bar
	var bar = document.getElementById('timer-bar');
	bar.style.transition = 'none';
	bar.style.width = '100%';
	// force reflow
	bar.offsetWidth;
	bar.style.transition = 'width ' + (PRED_TIMEOUT/1000) + 's linear';
	bar.style.width = '0%';
}

function hidePredictionPanel() {
	document.getElementById('predictor-overlay').style.display = 'none';
}

function updatePredStats() {
	var accuracy = predTotal > 0 ? Math.round((predCorrect / predTotal) * 100) : 0;
	document.getElementById('pred-stats').innerHTML =
		'Score: <span>' + predScore + '</span> &nbsp;|&nbsp; ' +
		'Correct: <span>' + predCorrect + '/' + predTotal + '</span> &nbsp;|&nbsp; ' +
		'Accuracy: <span>' + accuracy + '%</span> ' +
		'(random baseline: 10%)';
}

function updateHUD() {
	var accuracy = predTotal > 0 ? Math.round((predCorrect / predTotal) * 100) : 0;
	document.getElementById('hud-score').textContent = 'Score: ' + predScore;
	document.getElementById('hud-accuracy').textContent =
		'Accuracy: ' + accuracy + '% (vs 10% random)';
	document.getElementById('hud-count').textContent =
		'Predictions: ' + predTotal;
}

function onDigitGuess(guessedDigit) {
	if (predGuess !== -1) return; // already guessed
	predGuess = guessedDigit;
	predTotal++;

	var correct = (guessedDigit === predNextDigit);
	if (correct) {
		predCorrect++;
		predScore += 100;
		document.getElementById('result-flash').textContent = '✓ Correct! +100';
		document.getElementById('result-flash').style.color = '#4f4';
	} else {
		document.getElementById('result-flash').textContent = '✗ It was ' + predNextDigit + '!';
		document.getElementById('result-flash').style.color = '#f44';
	}

	// Highlight buttons
	var btns = document.querySelectorAll('.digit-btn');
	btns.forEach(function(b) {
		var d = parseInt(b.getAttribute('data-digit'));
		b.disabled = true;
		if (d === guessedDigit && correct) {
			b.classList.add('correct');
		} else if (d === guessedDigit && !correct) {
			b.classList.add('wrong');
		} else if (d === predNextDigit) {
			b.classList.add('reveal');
		} else {
			b.style.opacity = '0.4';
		}
	});

	updatePredStats();
	updateHUD();

	// After short delay, spawn the cloud and hide panel
	predRevealTimer = Date.now();
}

// ─── Game mode toggling ───────────────────────────────────────────────────

function toggleGameMode() {
	if (gameMode === 'visualization') {
		gameMode = 'catcher';
		score = 0;
		combo = 0;
		lives = 3;
		difficultyLevel = 1;
		document.getElementById('hud-mode').textContent = 'MODE: CATCHER — click clouds to catch them | [SPACE] switch | [P] predictor';
		hidePredictionPanel();
		hidePredictorHUD();
	} else if (gameMode === 'catcher') {
		gameMode = 'visualization';
		catchableDigits = {};
		document.getElementById('hud-mode').textContent = '[SPACE] Catcher mode | [P] Predictor mode';
		hidePredictionPanel();
		hidePredictorHUD();
	}
}

function enterPredictorMode() {
	gameMode = 'predictor';
	predScore = 0;
	predTotal = 0;
	predCorrect = 0;
	predWaiting = false;
	predGuess = -1;
	catchableDigits = {};
	document.getElementById('hud-mode').textContent = 'MODE: PREDICTOR — guess the next digit of π! | [P] exit';
	showPredictorHUD();
	updateHUD();
}

function exitPredictorMode() {
	gameMode = 'visualization';
	predWaiting = false;
	hidePredictionPanel();
	hidePredictorHUD();
	document.getElementById('hud-mode').textContent = '[SPACE] Catcher mode | [P] Predictor mode';
}

function showPredictorHUD() {
	document.getElementById('hud-predictor').style.display = 'block';
}
function hidePredictorHUD() {
	document.getElementById('hud-predictor').style.display = 'none';
}

function handleClick(pointer) {
	if (gameMode !== 'catcher') return;

	var clickX = pointer.x;
	var clickY = pointer.y;
	var tolerance = 50;

	for (var i = 0; i < nuages.length; i++) {
		if (!catchableDigits[i]) continue;

		var cloud = nuages[i];
		if (!cloud || !cloud.alive) continue;
		var dist = Math.sqrt(Math.pow(clickX - cloud.x, 2) + Math.pow(clickY - cloud.y, 2));

		if (dist < tolerance) {
			catchableDigits[i] = false;
			var points = basePoints * Math.max(1, combo) * difficultyLevel;
			score += points;
			combo++;

			var tween = game.add.tween(cloud);
			tween.to({ alpha: 0, scaleX: cloud.scale.x * 1.5, scaleY: cloud.scale.y * 1.5 }, 200);
			(function(ci) {
				tween.onComplete.add(function() {
					if (nuages[ci] && nuages[ci].alive) nuages[ci].destroy();
					if (nuages2[ci] && nuages2[ci].alive) nuages2[ci].destroy();
				});
			})(i);
			tween.start();

			// Update Phaser HUD text
			scoreText.text = 'Score: ' + score;
			comboText.text = 'Combo: ' + combo + 'x';
			return;
		}
	}

	// Missed click
	combo = 0;
	comboText.text = 'Combo: 0x';
}

// ─── Cloud spawning helper ────────────────────────────────────────────────

function spawnCloud(idx) {
	nuages.push(game.add.tileSprite(-200, 400-(pi[idx]*34-15), 768, 312, 'nuage'));
	nuages[idx].anchor.x = 0.7;
	nuages[idx].anchor.y = 0.5;
	nuages[idx].scale.setTo((pi[idx])/10, (pi[idx])/10);
	nuages[idx].alpha = 0.99;

	nuages2.push(game.add.tileSprite(-200, 400+(pi[idx]*34-15), 768, 312, 'nuage2'));
	nuages2[idx].anchor.x = 0.7;
	nuages2[idx].anchor.y = 0.5;
	nuages2[idx].scale.setTo((pi[idx])/10, (pi[idx])/10);

	if (gameMode === 'catcher') {
		catchableDigits[idx] = true;
	}

	switch(pi[idx]) {
		case 0: order0.add(nuages[idx]); order0.add(nuages2[idx]); break;
		case 1: order1.add(nuages[idx]); order1.add(nuages2[idx]); break;
		case 2: order2.add(nuages[idx]); order2.add(nuages2[idx]); break;
		case 3: order3.add(nuages[idx]); order3.add(nuages2[idx]); break;
		case 4: order4.add(nuages[idx]); order4.add(nuages2[idx]); break;
		case 5: order5.add(nuages[idx]); order5.add(nuages2[idx]); break;
		case 6: order6.add(nuages[idx]); order6.add(nuages2[idx]); break;
		case 7: order7.add(nuages[idx]); order7.add(nuages2[idx]); break;
		case 8: order8.add(nuages[idx]); order8.add(nuages2[idx]); break;
		case 9: order9.add(nuages[idx]); order9.add(nuages2[idx]); break;
	}
}

function sleep(milliseconds) {
	var start = new Date().getTime();
	for (var i = 0; i < 1e7; i++) {
		if ((new Date().getTime() - start) > milliseconds) break;
	}
}

function preload() {
	game.load.image('nuage','nuage.png');
	game.load.image('nuage2','nuage2.png');
	game.load.image('field','field.png');
	game.load.image('fond','fond.png');
	game.load.image('fond2','fond2.png');
}

function create() {
	game.time.desiredFps = 30;
	game.stage.backgroundColor = "#4488AA";
	fond = game.add.tileSprite(0, 0, 1300, 400, 'fond');
	fond2 = game.add.tileSprite(0, 400, 1300, 300, 'fond2');
	order0 = game.add.group(); order1 = game.add.group();
	order2 = game.add.group(); order3 = game.add.group();
	order4 = game.add.group(); order5 = game.add.group();
	order6 = game.add.group(); order7 = game.add.group();
	order8 = game.add.group(); order9 = game.add.group();
	fond2.alpha = 0.9;

	// Catcher HUD
	var style = { font: '20px Arial', fill: '#ffffff', stroke: '#000000', strokeThickness: 3 };
	scoreText = game.add.text(10, 10, 'Score: 0', style);
	comboText = game.add.text(10, 35, 'Combo: 0x', style);
	livesText = game.add.text(1150, 10, 'Lives: 3', style);
	scoreText.fixedToCamera = true;
	comboText.fixedToCamera = true;
	livesText.fixedToCamera = true;
	scoreText.visible = false;
	comboText.visible = false;
	livesText.visible = false;

	// Input
	game.input.onDown.add(handleClick, this);
	var spaceKey = game.input.keyboard.addKey(Phaser.Keyboard.SPACEBAR);
	spaceKey.onDown.add(toggleGameMode, this);
	var pKey = game.input.keyboard.addKey(80); // 'P'
	pKey.onDown.add(function() {
		if (gameMode === 'predictor') {
			exitPredictorMode();
		} else {
			enterPredictorMode();
		}
	}, this);
}

function update() {
	timer++;

	// ── Predictor mode logic ──────────────────────────────────────────────
	if (gameMode === 'predictor') {
		scoreText.visible = false;
		comboText.visible = false;
		livesText.visible = false;

		if (predWaiting) {
			// Waiting for player to guess
			var elapsed = Date.now() - predTimerStart;
			if (elapsed >= PRED_TIMEOUT && predGuess === -1) {
				// Timeout — treat as wrong guess
				predGuess = -1;
				predTotal++;
				document.getElementById('result-flash').textContent = 'Time\'s up! It was ' + predNextDigit + '!';
				document.getElementById('result-flash').style.color = '#fa0';
				var btns = document.querySelectorAll('.digit-btn');
				btns.forEach(function(b) {
					b.disabled = true;
					var d = parseInt(b.getAttribute('data-digit'));
					if (d === predNextDigit) b.classList.add('reveal');
					else b.style.opacity = '0.4';
				});
				updatePredStats();
				updateHUD();
				predRevealTimer = Date.now();
				predGuess = -2; // mark as timed out
			}

			if (predGuess !== -1) {
				// Waiting for reveal delay
				if (Date.now() - predRevealTimer >= PRED_REVEAL_DELAY) {
					// Spawn the cloud!
					hidePredictionPanel();
					spawnCloud(decimal);
					predWaiting = false;
					timer = 0;
				}
			}
			// Don't advance timer while waiting
		} else {
			// Check if it's time for next digit
			if (timer > (pi[decimal+1]) * densityDivider) {
				decimal++;
				timer = 0;
				predWaiting = true;
				showPredictionPanel(pi[decimal]);
			}
		}
	} else {
		// ── Visualization / Catcher mode logic ─────────────────────────────
		scoreText.visible = (gameMode === 'catcher');
		comboText.visible = (gameMode === 'catcher');
		livesText.visible = (gameMode === 'catcher');

		if (gameMode === 'catcher') {
			scoreText.text = 'Score: ' + score;
			comboText.text = 'Combo: ' + combo + 'x';
			livesText.text = 'Lives: ' + lives;
			difficultyLevel = 1 + Math.floor(score / 1000);
		}

		if (timer > (pi[decimal+1]) * densityDivider) {
			decimal++;
			timer = 0;
			spawnCloud(decimal);
		}
	}

	// Move all spawned clouds
	while (jj <= decimal) {
		if (!nuages[jj] || !nuages[jj].alive) { jj++; continue; }
		if (nuages[jj].x > 1800) {
			if (gameMode === 'catcher' && catchableDigits[jj]) {
				combo = 0;
				lives--;
				livesText.text = 'Lives: ' + lives;
				if (lives <= 0) {
					gameMode = 'visualization';
					scoreText.visible = false;
					comboText.visible = false;
					livesText.visible = false;
					document.getElementById('hud-mode').textContent = 'Game Over! Score: ' + score + ' | [SPACE] try again | [P] predictor';
				}
			}
			if (nuages[jj] && nuages[jj].alive) nuages[jj].destroy();
			if (nuages2[jj] && nuages2[jj].alive) nuages2[jj].destroy();
			delete catchableDigits[jj];
		} else {
			nuages[jj].x += (pi[jj]) / Math.abs(velocityDivider);
			if (nuages2[jj] && nuages2[jj].alive)
				nuages2[jj].x += (pi[jj]) / Math.abs(velocityDivider);
		}
		jj++;
	}
	jj = 0;

	game.world.bringToTop(order0); game.world.bringToTop(order1);
