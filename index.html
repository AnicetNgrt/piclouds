// ─── Working state ─────────────────────────────────────────────────────────
var activeKey = 'pi';
var pi = CONSTS.pi.digits.slice();
for (var _i = 0; _i < 10000; _i++) pi.push(Math.floor(Math.random() * 10));

var game = new Phaser.Game(1300, 700, Phaser.CANVAS, 'PIclouds', { preload: preload, create: create, update: update }, false, false);

var nuages = [], nuages2 = [], labels = [];
var densityDivider = 4, velocityDivider = 0.6;
var decimal = -1, timer = 0;
var fond, fond2, labelGroup;
var order0, order1, order2, order3, order4, order5, order6, order7, order8, order9;

// ─── Constant switcher ─────────────────────────────────────────────────────
function switchConstant(key) {
	if (key === activeKey) return;
	activeKey = key;
	var c = CONSTS[key];

	for (var i = 0; i < nuages.length; i++) {
		if (nuages[i]  && nuages[i].alive)  nuages[i].destroy();
		if (nuages2[i] && nuages2[i].alive) nuages2[i].destroy();
		if (labels[i]  && labels[i].alive)  labels[i].destroy();
	}
	nuages = []; nuages2 = []; labels = [];
	decimal = -1; timer = 0;

	pi = c.digits.slice();
	for (var j = 0; j < 10000; j++) pi.push(Math.floor(Math.random() * 10));

	game.stage.backgroundColor = c.bg;
	document.body.style.backgroundColor = c.bodyBg;

	document.querySelectorAll('.cbtn').forEach(function(b) { b.classList.remove('active'); });
	document.getElementById('btn-' + key).classList.add('active');
	document.getElementById('clabel').textContent = c.symbol + ' = ' + c.preview;
	document.getElementById('dcounter').textContent = c.symbol + ' digit #0';
}

// ─── Phaser lifecycle ───────────────────────────────────────────────────────
function preload() {
	game.load.image('nuage',  'nuage.png');
	game.load.image('nuage2', 'nuage2.png');
	game.load.image('field',  'field.png');
	game.load.image('fond',   'fond.png');
	game.load.image('fond2',  'fond2.png');
}

function create() {
	game.time.desiredFps = 30;
	game.stage.backgroundColor = '#4488AA';
	fond  = game.add.tileSprite(0,   0, 1300, 400, 'fond');
	fond2 = game.add.tileSprite(0, 400, 1300, 300, 'fond2');
	fond2.alpha = 0.9;
	order0 = game.add.group(); order1 = game.add.group();
	order2 = game.add.group(); order3 = game.add.group();
	order4 = game.add.group(); order5 = game.add.group();
	order6 = game.add.group(); order7 = game.add.group();
	order8 = game.add.group(); order9 = game.add.group();
	labelGroup = game.add.group();
}

function update() {
	timer++;
	var c = CONSTS[activeKey];

	if (timer > pi[decimal + 1] * densityDivider) {
		decimal++;
		timer = 0;
		var digit = pi[decimal];
		var tint  = c.tints[digit];
		var yOff  = digit * 34 - 15;

		var n = game.add.tileSprite(-200, 400 - yOff, 768, 312, 'nuage');
		n.anchor.setTo(0.7, 0.5);
		n.scale.setTo(digit / 10, digit / 10);
		n.alpha = 0.9;
		n.tint  = tint;
		nuages.push(n);

		var n2 = game.add.tileSprite(-200, 400 + yOff, 768, 312, 'nuage2');
		n2.anchor.setTo(0.7, 0.5);
		n2.scale.setTo(digit / 10, digit / 10);
		n2.alpha = 0.99;
		n2.tint  = tint;
		nuages2.push(n2);

		// Floating digit label — positioned above the top cloud
		var labelY = Math.min(400 - yOff - 18, 390);
		var lbl = game.add.text(-160, labelY, String(digit), {
			font: 'bold 19px monospace',
			fill: '#ffffff',
			stroke: '#000000',
			strokeThickness: 3
		});
		lbl.anchor.setTo(0.5, 1.0);
		lbl.alpha = 0.9;
		labelGroup.add(lbl);
		labels.push(lbl);

		var groups = [order0,order1,order2,order3,order4,order5,order6,order7,order8,order9];
		groups[digit].add(n);
		groups[digit].add(n2);

		document.getElementById('dcounter').textContent = c.symbol + ' digit #' + (decimal + 1);
	}

	for (var i = 0; i <= decimal; i++) {
		var cloud = nuages[i];
		if (!cloud || !cloud.alive) continue;
		if (cloud.x > 1800) {
			cloud.destroy();
			if (nuages2[i] && nuages2[i].alive) nuages2[i].destroy();
			if (labels[i]  && labels[i].alive)  labels[i].destroy();
		} else {
			var speed = pi[i] / Math.abs(velocityDivider);
			cloud.x      += speed;
			nuages2[i].x += speed;
			labels[i].x   = cloud.x - 40;
			labels[i].alpha = 0.9 * Math.max(0, 1 - cloud.x / 1100);
		}
	}

	game.world.bringToTop(order0); game.world.bringToTop(order1);
	game.world.bringToTop(order2); game.world.bringToTop(order3);
	game.world.bringToTop(order4); game.world.bringToTop(order5);
	game.world.bringToTop(order6); game.world.bringToTop(order7);
	game.world.bringToTop(order8); game.world.bringToTop(order9);
	fond2.bringToTop();
	labelGroup.bringToTop();
}
