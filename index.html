<!DOCTYPE html>
<html>
<head>
	<title>Nuages de Pi</title>
	<meta charset="utf-8"/>
	<script type="text/javascript" src="phaser.min.js"></script>
	<script>

// ── Pi digits (first 886 known, then random extension) ────────────────────
var pi = [3,1,4,1,5,9,2,6,5,3,5,8,9,7,9,3,2,3,8,4,6,2,6,4,3,3,8,3,2,7,9,5,0,2,8,8,4,1,9,7,1,6,9,3,9,9,3,7,5,1,0,5,8,2,0,9,7,4,9,4,4,5,9,2,3,0,7,8,1,6,4,0,6,2,8,6,2,0,8,9,9,8,6,2,8,0,3,4,8,2,5,3,4,2,1,1,7,0,6,7,9,8,2,1,4,8,0,8,6,5,1,3,2,8,2,3,0,6,6,4,7,0,9,3,8,4,4,6,0,9,5,5,0,5,8,2,2,3,1,7,2,5,3,5,9,4,0,8,1,2,8,4,8,1,1,1,7,4,5,0,2,8,4,1,0,2,7,0,1,9,3,8,5,2,1,1,0,5,5,5,9,6,4,4,6,2,2,9,4,8,9,5,4,9,3,0,3,8,1,9,6,4,4,2,8,8,1,0,9,7,5,6,6,5,9,3,3,4,4,6,1,2,8,4,7,5,6,4,8,2,3,3,7,8,6,7,8,3,1,6,5,2,7,1,2,0,1,9,0,9,1,4,5,6,4,8,5,6,6,9,2,3,4,6,0,3,4,8,6,1,0,4,5,4,3,2,6,6,4,8,2,1,3,3,9,3,6,0,7,2,6,0,2,4,9,1,4,1,2,7,3,7,2,4,5,8,7,0,0,6,6,0,6,3,1,5,5,8,8,1,7,4,8,8,1,5,2,0,9,2,0,9,6,2,8,2,9,2,5,4,0,9,1,7,1,5,3,6,4,3,6,7,8,9,2,5,9,0,3,6,0,0,1,1,3,3,0,5,3,0,5,4,8,8,2,0,4,6,6,5,2,1,3,8,4,1,4,6,9,5,1,9,4,1,5,1,1,6,0,9,4,3,3,0,5,7,2,7,0,3,6,5,7,5,9,5,9,1,9,5,3,0,9,2,1,8,6,1,1,7,3,8,1,9,3,2,6,1,1,7,9,3,1,0,5,1,1,8,5,4,8,0,7,4,4,6,2,3,7,9,9,6,2,7,4,9,5,6,7,3,5,1,8,8,5,7,5,2,7,2,4,8,9,1,2,2,7,9,3,8,1,8,3,0,1,1,9,4,9,1,2,9,8,3,3,6,7,3,3,6,2,4,4,0,6,5,6,6,4,3,0,8,6,0,2,1,3,9,4,9,4,6,3,9,5,2,2,4,7,3,7,1,9,0,7,0,2,1,7,9,8,6,0,9,4,3,7,0,2,7,7,0,5,3,9,2,1,7,1,7,6,2,9,3,1,7,6,7,5,2,3,8,4,6,7,4,8,1,8,4,6,7,6,6,9,4,0,5,1,3,2,0,0,0,5,6,8,1,2,7,1,4,5,2,6,3,5,6,0,8,2,7,7,8,5,7,7,1,3,4,2,7,5,7,7,8,9,6,0,9,1,7,3,6,3,7,1,7,8,7,2,1,4,6,8,4,4,0,9,0,1,2,2,4,9,5,3,4,3,0,1,4,6,5,4,9,5,8,5,3,7,1,0,5,0,7,9,2,2,7,9,6,8,9,2,5,8,9,2,3,5,4,2,0,1,9,9,5,6,1,1,2,1,2,9,0,2,1,9,6,0,8,6,4,0,3,4,4,1,8,1,5,9,8,1,3,6,2,9,7,7,4,7,7,1,3,0,9,9,6,0,5,1,8,7,0,7,2,1,1,3,4,9,9,9,9,9,9,8,3,7,2,9,7,8,0,4,9,9,5,1,0,5,9,7,3,1,7,3,2,8,1,6,0,9,6,3,1,8,5,9,5,0,2,4,4,5,9,4,5,5,3,4,6,9,0,8,3,0,2,6,4,2,5,2,2,3,0,8,2,5,3,3,4,4,6,8,5,0,3,5,2,6,1,9,3,1,1,8,8,1,7,1,0,1,0,0,0,3,1,3,7,8,3,8,7,5,2,8,8,6,5,8,7,5,3,3,2,0,8,3,8,1,4,2,0];

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
for (var i = 0; i < 10000; i++) pi.push(randInt(0, 9));

// ── Audio ──────────────────────────────────────────────────────────────────
var audioCtx     = null;
var soundEnabled = false;
var noteFreqs    = [261.63, 293.66, 329.63, 392.00, 440.00,
                    523.25, 587.33, 659.25, 783.99, 880.00];

function initAudio() {
	if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function toggleSound() {
	initAudio();
	soundEnabled = !soundEnabled;
	var btn = document.getElementById('soundBtn');
	btn.textContent   = soundEnabled ? '\u266B' : '\u266A';
	btn.style.opacity = soundEnabled ? '1' : '0.55';
}

function playDigitNote(digit) {
	if (!soundEnabled || !audioCtx) return;
	var freq     = noteFreqs[digit];
	var volume   = 0.04 + digit * 0.018;
	var duration = 0.4  + digit * 0.07;
	var osc  = audioCtx.createOscillator();
	var gain = audioCtx.createGain();
	osc.type = 'sine';
	osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
	gain.gain.setValueAtTime(volume, audioCtx.currentTime);
	gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
	osc.connect(gain);
	gain.connect(audioCtx.destination);
	osc.start(audioCtx.currentTime);
	osc.stop(audioCtx.currentTime + duration);
}

// ── Day / Night helpers ────────────────────────────────────────────────────
var dayNightTimer = 0;
var CYCLE_FRAMES  = 3600;   // 2 minutes at 30 fps
var starsLayer, celestialLayer;

function lerp(a, b, t) { return a + (b - a) * t; }
function rgbToPhaser(r, g, b) { return (Math.round(r) << 16) | (Math.round(g) << 8) | Math.round(b); }
function rgbToCSS(r, g, b) {
	return '#' + ('0' + Math.round(r).toString(16)).slice(-2)
	           + ('0' + Math.round(g).toString(16)).slice(-2)
	           + ('0' + Math.round(b).toString(16)).slice(-2);
}

// Four colour stops: noon → dusk → midnight → dawn
var tintStops = [
	{ r: 255, g: 255, b: 255 },
	{ r: 255, g: 130, b: 50  },
	{ r: 18,  g: 22,  b: 75  },
	{ r: 255, g: 165, b: 110 },
];

function getDayNightTint(phase) {
	var sc = phase * tintStops.length;
	var i  = Math.floor(sc) % tintStops.length;
	var j  = (i + 1) % tintStops.length;
	var t  = sc - Math.floor(sc);
	return {
		r: lerp(tintStops[i].r, tintStops[j].r, t),
		g: lerp(tintStops[i].g, tintStops[j].g, t),
		b: lerp(tintStops[i].b, tintStops[j].b, t)
	};
}

// ── Per-digit cloud colours (dimmed at night) ─────────────────────────────
var DIGIT_COLORS = [
	{ r: 187, g: 143, b: 206 }, // 0 – lavender
	{ r: 126, g: 200, b: 227 }, // 1 – sky blue
	{ r:  72, g: 201, b: 176 }, // 2 – teal
	{ r:  88, g: 214, b: 141 }, // 3 – mint
	{ r: 247, g: 220, b: 111 }, // 4 – yellow
	{ r: 240, g: 165, b:   0 }, // 5 – amber
	{ r: 235, g: 116, b:  52 }, // 6 – orange
	{ r: 231, g:  76, b:  60 }, // 7 – tomato
	{ r: 175, g: 122, b: 197 }, // 8 – violet
	{ r: 241, g: 148, b: 138 }, // 9 – salmon
];

function digitTint(digit, nightFactor) {
	var dc = DIGIT_COLORS[digit];
	var f  = lerp(1.0, 0.22, nightFactor);
	return rgbToPhaser(dc.r * f, dc.g * f, dc.b * f);
}

// ── Rain & Lightning (triggered on digit 0) ────────────────────────────────
var rainDrops        = [];
var rainGraphics, lightningGraphics, flashGraphics;
var lightningTimer   = 0;
var LIGHTNING_FRAMES = 8;
var flashAlpha       = 0;
var boltPoints       = [];

function buildBolt(pidx) {
	boltPoints = [];
	var x = (pi[pidx % pi.length] * 130 + pi[(pidx + 1) % pi.length] * 13) % 1200 + 50;
	var y = 0;
	boltPoints.push({ x: x, y: y });
	var numSegs = 7 + (pi[pidx % pi.length] % 5);
	for (var s = 0; s < numSegs; s++) {
		y += Math.floor(360 / numSegs);
		x += (pi[(pidx + s + 2) % pi.length] - 4) * 22;
		x  = Math.max(20, Math.min(1280, x));
		boltPoints.push({ x: x, y: y });
	}
}

function drawBolt() {
	lightningGraphics.clear();
	if (boltPoints.length < 2) return;
	lightningGraphics.lineStyle(5, 0xFFFF99, 0.35);
	lightningGraphics.moveTo(boltPoints[0].x, boltPoints[0].y);
	for (var k = 1; k < boltPoints.length; k++) lightningGraphics.lineTo(boltPoints[k].x, boltPoints[k].y);
	lightningGraphics.lineStyle(2, 0xFFFFFF, 1.0);
	lightningGraphics.moveTo(boltPoints[0].x, boltPoints[0].y);
	for (var k = 1; k < boltPoints.length; k++) lightningGraphics.lineTo(boltPoints[k].x, boltPoints[k].y);
}

function triggerLightning(pidx) {
	buildBolt(pidx);
	drawBolt();
	lightningTimer = LIGHTNING_FRAMES;
	flashAlpha = Math.max(flashAlpha, 0.55);
}

function spawnRain() {
	var centreX = 60 + Math.random() * 1180;
	var centreY = 10 + Math.random() * 120;
	for (var d = 0; d < 28; d++) {
		var vy = 5 + Math.random() * 5;
		rainDrops.push({
			x: centreX + (Math.random() - 0.5) * 420,
			y: centreY + Math.random() * 80,
			vx: -0.6 + Math.random() * 0.4,
			vy: vy,
			alpha:   0.45 + Math.random() * 0.45,
			len:     6    + Math.random() * 10,
			life:    0,
			maxLife: Math.floor((393 - centreY) / vy) + 10
		});
	}
}

// ── Shooting stars (night only, Pi-seeded) ────────────────────────────────
var shootingStarGfx, shootingStars = [], shootingStarTimer = 0;
var shootingStarPiIdx = 200;   // independent Pi offset so stars don't share digits with clouds

function spawnShootingStar() {
	var i  = shootingStarPiIdx % (pi.length - 10);
	var px = pi[i], py = pi[i+1], pa = pi[i+2], ps = pi[i+3], pl = pi[i+4], pd = pi[i+5];
	shootingStarPiIdx += 6;
	var angle = 0.28 + pa / 30.0;
	var speed = 12   + ps * 3.0;
	var dir   = (pd >= 5) ? 1 : -1;
	return {
		x: (px * 137 + i * 11) % 1300,
		y: 15 + py * 22,
		dx: Math.cos(angle) * speed * dir,
		dy: Math.sin(angle) * speed,
		trail: [], life: 0, maxLife: 13 + (pl % 7)
	};
}

// ── Game ───────────────────────────────────────────────────────────────────
var game = new Phaser.Game(1300, 700, Phaser.CANVAS, 'PIclouds',
	{ preload: preload, create: create, update: update }, false, false);

var nuages = [], nuages2 = [], orders = [];
var decimal = -1, timer = 0, jj = 0;
var fond, fond2;
var DENSITY  = 4;   // frames-per-digit multiplier
var VELOCITY = 0.6; // cloud speed divisor

function preload() {
	game.load.image('nuage',  'nuage.png');
	game.load.image('nuage2', 'nuage2.png');
	game.load.image('fond',   'fond.png');
	game.load.image('fond2',  'fond2.png');
}

function create() {
	game.time.desiredFps = 30;
	game.stage.backgroundColor = '#4488AA';

	fond = game.add.tileSprite(0, 0, 1300, 400, 'fond');

	// Stars: drawn once from Pi, revealed only at night
	starsLayer = game.add.graphics(0, 0);
	for (var s = 0; s < 150; s++) {
		var px = s * 3;
		var sx = (pi[px] * 130 + pi[px+1] * 13 + pi[px+2] * 7) % 1300;
		var sy = (pi[px] * 33  + pi[px+1] * 4  + 5)             % 330;
		starsLayer.beginFill(0xFFFFFF, 0.35 + (pi[px+2] / 14.0));
		starsLayer.drawCircle(sx, sy, ((pi[px] % 2) + 1) * 2);
		starsLayer.endFill();
	}
	starsLayer.alpha = 0;

	shootingStarGfx = game.add.graphics(0, 0);
	celestialLayer  = game.add.graphics(0, 0);

	fond2 = game.add.tileSprite(0, 400, 1300, 300, 'fond2');
	fond2.alpha = 0.9;

	// Ten depth groups, one per digit value (0 = background, 9 = foreground)
	for (var g = 0; g < 10; g++) orders.push(game.add.group());

	game.input.onDown.add(initAudio);

	rainGraphics      = game.add.graphics(0, 0);
	lightningGraphics = game.add.graphics(0, 0);
	flashGraphics     = game.add.graphics(0, 0);
}

function update() {

	// ── Day / Night ───────────────────────────────────────────────────────
	dayNightTimer++;
	var phase = (dayNightTimer % CYCLE_FRAMES) / CYCLE_FRAMES;
	var tint  = getDayNightTint(phase);
	var tintHex = rgbToPhaser(tint.r, tint.g, tint.b);
	fond.tint  = tintHex;
	fond2.tint = tintHex;

	var nightAlpha = (phase > 0.25 && phase < 0.75)
		? Math.sin((phase - 0.25) / 0.5 * Math.PI) : 0;
	starsLayer.alpha = nightAlpha;
	game.stage.backgroundColor = rgbToCSS(
		lerp(67, 5, nightAlpha), lerp(169, 5, nightAlpha), lerp(223, 30, nightAlpha)
	);

	// ── Shooting Stars ────────────────────────────────────────────────────
	if (nightAlpha > 0.05) {
		shootingStarTimer++;
		if (shootingStarTimer >= (pi[shootingStarPiIdx % (pi.length - 10)] + 1) * 15) {
			shootingStarTimer = 0;
			shootingStars.push(spawnShootingStar());
		}
	}
	shootingStarGfx.clear();
	for (var si = shootingStars.length - 1; si >= 0; si--) {
		var star    = shootingStars[si];
		star.trail.push({ x: star.x, y: star.y });
		if (star.trail.length > 10) star.trail.shift();
		star.x += star.dx;  star.y += star.dy;  star.life++;
		var visible = Math.max(0, 1 - star.life / star.maxLife) * nightAlpha;
		if (visible > 0.02 && star.trail.length > 1) {
			for (var ti = 1; ti < star.trail.length; ti++) {
				var p = ti / star.trail.length;
				shootingStarGfx.lineStyle(4, 0xCCE0FF, p * visible * 0.35);
				shootingStarGfx.moveTo(star.trail[ti-1].x, star.trail[ti-1].y);
				shootingStarGfx.lineTo(star.trail[ti].x,   star.trail[ti].y);
				shootingStarGfx.lineStyle(1, 0xFFFFFF, p * visible * 0.95);
				shootingStarGfx.moveTo(star.trail[ti-1].x, star.trail[ti-1].y);
				shootingStarGfx.lineTo(star.trail[ti].x,   star.trail[ti].y);
			}
			shootingStarGfx.lineStyle(0);
			shootingStarGfx.beginFill(0xFFFFFF, visible);
			shootingStarGfx.drawCircle(star.x, star.y, 3);
			shootingStarGfx.endFill();
		}
		if (star.life >= star.maxLife || star.x > 1400 || star.x < -100 || star.y > 400 || star.y < -50) {
			shootingStars.splice(si, 1);
		}
	}

	// ── Sun & Moon ────────────────────────────────────────────────────────
	celestialLayer.clear();
	if (phase < 0.25 || phase > 0.75) {
		var dayNorm = phase > 0.75 ? (phase - 0.75) / 0.5 : (phase + 0.25) / 0.5;
		var sunX    = dayNorm * 1200 + 50;
		var sunY    = 370 - Math.sin(dayNorm * Math.PI) * 300;
		var sunVis  = Math.min(dayNorm / 0.12, (1 - dayNorm) / 0.12, 1);
		celestialLayer.beginFill(0xFFEE88, sunVis * 0.22);
		celestialLayer.drawCircle(sunX, sunY, 90);
		celestialLayer.endFill();
		celestialLayer.beginFill(0xFFDD44, sunVis);
		celestialLayer.drawCircle(sunX, sunY, 46);
		celestialLayer.endFill();
	} else {
		var moonNorm = (phase - 0.25) / 0.5;
		var moonX    = moonNorm * 1200 + 50;
		var moonY    = 370 - Math.sin(moonNorm * Math.PI) * 290;
		celestialLayer.beginFill(0xCCDDFF, nightAlpha * 0.18);
		celestialLayer.drawCircle(moonX, moonY, 62);
		celestialLayer.endFill();
		celestialLayer.beginFill(0xF0F5FF, nightAlpha);
		celestialLayer.drawCircle(moonX, moonY, 30);
		celestialLayer.endFill();
	}

	// ── Cloud Spawning ────────────────────────────────────────────────────
	timer++;
	if (timer > pi[decimal + 1] * DENSITY) {
		decimal++;
		timer = 0;
		var d = pi[decimal];

		nuages.push(game.add.tileSprite(-200, 400 - (d * 34 - 15), 768, 312, 'nuage'));
		nuages[decimal].anchor.setTo(0.7, 0.5);
		var scale = Math.max(d, 1) / 10;
		nuages[decimal].scale.setTo(scale, scale);
		nuages[decimal].alpha = 0.99;

		nuages2.push(game.add.tileSprite(-200, 400 + (d * 34 - 15), 768, 312, 'nuage2'));
		nuages2[decimal].anchor.setTo(0.7, 0.5);
		nuages2[decimal].scale.setTo(scale, scale);

		orders[d].add(nuages[decimal]);
		orders[d].add(nuages2[decimal]);

		playDigitNote(d);

		if (d === 0) {
			spawnRain();
			triggerLightning(decimal);
		}
	}

	// ── Cloud Movement & Tinting ──────────────────────────────────────────
	while (jj <= decimal) {
		if (nuages[jj].x > 1800) {
			nuages[jj].destroy();
			nuages2[jj].destroy();
			jj++;
			continue;
		}
		nuages[jj].x  += (pi[jj] || 1) / VELOCITY;
		nuages2[jj].x += (pi[jj] || 1) / VELOCITY;
		var ct = digitTint(pi[jj], nightAlpha);
		nuages[jj].tint  = ct;
		nuages2[jj].tint = ct;
		jj++;
	}
	jj = 0;

	// ── Z-ordering ────────────────────────────────────────────────────────
	celestialLayer.bringToTop();
	for (var g = 0; g < 10; g++) game.world.bringToTop(orders[g]);
	rainGraphics.bringToTop();
	fond2.bringToTop();

	// ── Rain ──────────────────────────────────────────────────────────────
	rainGraphics.clear();
	for (var ri = rainDrops.length - 1; ri >= 0; ri--) {
		var drop = rainDrops[ri];
		drop.x += drop.vx;  drop.y += drop.vy;  drop.life++;
		if (drop.life >= drop.maxLife || drop.y > 393) {
			rainDrops.splice(ri, 1);
			continue;
		}
		var fadeStart = drop.maxLife * 0.75;
		var dropAlpha = drop.alpha * (drop.life > fadeStart
			? 1 - (drop.life - fadeStart) / (drop.maxLife - fadeStart) : 1);
		rainGraphics.lineStyle(1.5, 0xAADDFF, dropAlpha);
		rainGraphics.moveTo(drop.x, drop.y);
		rainGraphics.lineTo(drop.x - drop.vx * drop.len * 0.4, drop.y - drop.len);
	}

	// ── Lightning & Flash ─────────────────────────────────────────────────
	if (lightningTimer > 0) {
		lightningTimer--;
		if (lightningTimer === 0) lightningGraphics.clear();
	}
	if (flashAlpha > 0) {
		flashAlpha = Math.max(0, flashAlpha - 0.055);
		flashGraphics.clear();
		flashGraphics.beginFill(0xFFFFFF, flashAlpha);
		flashGraphics.drawRect(0, 0, 1300, 700);
		flashGraphics.endFill();
	} else {
		flashGraphics.clear();
	}
	lightningGraphics.bringToTop();
	flashGraphics.bringToTop();
}

	</script>
</head>
<body style="background-color: rgb(67,169,223); cursor: none;">

	<button id="soundBtn" onclick="toggleSound()" title="Toggle Pi sonification" style="
		position: fixed; bottom: 14px; right: 14px;
		background: rgba(255,255,255,0.15);
		border: 1px solid rgba(255,255,255,0.45);
		color: #fff; font-size: 20px; cursor: pointer;
		padding: 6px 11px; border-radius: 7px;
		font-family: sans-serif; z-index: 999;
		backdrop-filter: blur(4px);
		opacity: 0.55;
		transition: opacity 0.2s, background 0.2s;">&#9834;</button>

</body>
</html>
