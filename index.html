	return Math.floor(Math.random() * (max - min + 1)) + min;
}

function sleep(milliseconds) {
	var start = new Date().getTime();
	for (var i = 0; i < 1e7; i++) {
		if ((new Date().getTime() - start) > milliseconds){
		 break;
		}
	}

	game.load.image('nuage','nuage.png');

	game.load.image('field','field.png');

	game.load.image('fond2','fond2.png');

function applyTheme(mode) {
	theme = mode === "night" ? "night" : "day";
	document.body.classList.toggle("night", theme === "night");
	if (!fond || !fond2) {
		return;
	}

	if (theme === "night") {
		game.stage.backgroundColor = "#07111f";
		fond.tint = 0x5878b8;
		fond.alpha = 0.82;
		fond2.tint = 0x1e304f;
		fond2.alpha = 0.92;
		if (nightOverlay) {
			nightOverlay.alpha = 0.42;
		}
		if (moon) {
			moon.alpha = 0.95;
		}
		for (var s = 0; s < stars.length; s++) {
			stars[s].alpha = 0.55 + (s % 3) * 0.12;
		}
	} else {
		game.stage.backgroundColor = "#4488AA";
		fond.tint = 0xFFFFFF;
		fond.alpha = 1;
		fond2.tint = 0xFFFFFF;
		fond2.alpha = 0.9;
		if (nightOverlay) {
			nightOverlay.alpha = 0;
		}
		if (moon) {
			moon.alpha = 0;
		}
		for (var t = 0; t < stars.length; t++) {
			stars[t].alpha = 0;
		}
	}

	for (var i = 0; i < nuages.length; i++) {
		if (nuages[i]) {
			nuages[i].tint = theme === "night" ? 0xAFC4F6 : 0xFFFFFF;
		}
		if (nuages2[i]) {

			nuages2[i].alpha = theme === "night" ? 0.82 : 0.99;
		}
	}
}

function setTheme(mode) {
	applyTheme(mode);
	try {
		window.localStorage.setItem("piclouds-theme", theme);
	} catch (e) {}
	var toggle = document.getElementById("theme-toggle");
	if (toggle) {
		toggle.textContent = theme === "night" ? "Day theme" : "Night theme";
		toggle.setAttribute("aria-pressed", theme === "night" ? "true" : "false");
	}
}
