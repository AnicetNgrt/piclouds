var currentTheme = localStorage.getItem('piclouds-theme') || 'dark-night';

/* Apply a theme by name */
function applyTheme(name) {
	if (!THEMES[name]) return;
	currentTheme = name;
	localStorage.setItem('piclouds-theme', name);

	var theme = THEMES[name];

	/* Body class drives CSS (background colour, canvas filter, overlays) */
	document.body.className = 'theme-' + name;

	/* Phaser stage background */
	if (game && game.stage) {
		game.stage.backgroundColor = theme.stageColor;
	}

	/* fond2 reflection opacity */
	if (fond2) {
		fond2.alpha = theme.fond2Alpha;
	}

	/* Re-tint all cloud sprites that are still alive */
	for (var i = 0; i <= decimal; i++) {
		try {
			if (nuages[i]  && nuages[i].alive)  nuages[i].tint  = theme.cloudTint;
			if (nuages2[i] && nuages2[i].alive) nuages2[i].tint = theme.cloud2Tint;
		} catch(e) {}
	}

	/* Highlight active button */
	var btns = document.querySelectorAll('.theme-btn');
	btns.forEach(function(btn) {
		btn.classList.toggle('active', btn.getAttribute('data-theme') === name);
	});
}

/* Generate twinkling stars for the Dark Night overlay */
function initNightAccents() {
	var starsEl = document.getElementById('stars-overlay');
	if (!starsEl) return;

	var layers = [
		{ cls: 'star-layer star-layer-1', count: 170, maxX: 1280, maxY: 370, pad: 10 },
		{ cls: 'star-layer star-layer-2', count: 75,  maxX: 1270, maxY: 340, pad: 15 },
		{ cls: 'star-layer star-layer-3', count: 28,  maxX: 1260, maxY: 290, pad: 20 }
	];

	layers.forEach(function(layer) {
		var div = document.createElement('div');
		div.className = layer.cls;
		var shadows = [];
		for (var i = 0; i < layer.count; i++) {
			var x = Math.floor(Math.random() * layer.maxX + layer.pad);
			var y = Math.floor(Math.random() * layer.maxY + layer.pad);
			var base   = Math.floor(Math.random() * 55 + 200);
			var blue   = Math.min(255, base + Math.floor(Math.random() * 30));
			var spread = (Math.random() > 0.80) ? '1px' : '0px';
			shadows.push(x + 'px ' + y + 'px ' + spread + ' rgba(' + base + ',' + base + ',' + blue + ',0.92)');
		}
		div.style.boxShadow = shadows.join(',');
		starsEl.appendChild(div);
	});
}
