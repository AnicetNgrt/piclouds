/* ═══════════════════════════════════════════════════════════════════════════

   programmatically before Phaser initialises, so game.load.image() can

var fondDataURL, fond2DataURL, nuageDataURL, nuage2DataURL;

(function generateCherryBlossomAssets() {

    /* ── deterministic LCG – same seed ⇒ same petal layout for nuage/nuage2 */
    var S;
    function rng() {
        S = (S * 1664525 + 1013904223) & 0xffffffff;
        return (S >>> 0) / 4294967296;
    }

    /* ── draw one petal: rotated ellipse + soft inner highlight ── */
    function petal(ctx, x, y, sz, ang, fill, hi) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(ang);
        ctx.beginPath();
        ctx.ellipse(0, 0, sz * 0.38, sz * 0.58, 0, 0, Math.PI * 2);
        ctx.fillStyle = fill;
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(sz * 0.04, -sz * 0.12, sz * 0.16, sz * 0.25, -0.4, 0, Math.PI * 2);
        ctx.fillStyle = hi;
        ctx.fill();
        ctx.restore();
    }

    /* ── fill canvas with a scattered petal cluster ── */
    function blossomCluster(ctx, W, H, cols, hi) {
        S = 1234567;                          // fixed seed → reproducible layout
        var cx = W / 2, cy = H / 2;
        var sx = W * 0.42, sy = H * 0.38;    // elliptical spread matching canvas ratio
        for (var i = 0; i < 95; i++) {
            var t = rng() * 6.2832;
            var r = Math.sqrt(rng());         // uniform area distribution
            petal(ctx,
                  cx + Math.cos(t) * r * sx,
                  cy + Math.sin(t) * r * sy,
                  14 + rng() * 26,            // size 14–40 px
                  rng() * 6.2832,             // random rotation
                  cols[Math.floor(rng() * cols.length)],
                  hi);
        }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       fond  – Japanese spring sky + misty mountains  (1300 × 400)
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    !function() {
        var c = document.createElement('canvas');
        c.width = 1300; c.height = 400;
        var g = c.getContext('2d');

        /* sky gradient – deep rose-pink at top → soft peachy cream at horizon */
        var sky = g.createLinearGradient(0, 0, 0, 400);
        sky.addColorStop(0,    '#efb8d8');
        sky.addColorStop(0.45, '#f8d8ed');
        sky.addColorStop(0.85, '#fce9f6');
        sky.addColorStop(1,    '#fdf0f9');
        g.fillStyle = sky; g.fillRect(0, 0, 1300, 400);

        /* warm glow near horizon */
        var glow = g.createRadialGradient(650, 395, 5, 650, 395, 340);
        glow.addColorStop(0, 'rgba(255,228,210,0.52)');
        glow.addColorStop(1, 'rgba(255,228,210,0)');
        g.fillStyle = glow; g.fillRect(0, 60, 1300, 340);

        /* helper – draw a mountain silhouette ridge */
        function ridge(pts, col) {
            g.beginPath(); g.moveTo(0, 400);
            for (var i = 0; i < pts.length; i += 2) {
                if (i === 0) {
                    g.lineTo(pts[0], pts[1]);
                } else {
                    g.quadraticCurveTo(
                        (pts[i-2] + pts[i]) / 2,
                        Math.min(pts[i-1], pts[i+1]) - 14,
                        pts[i], pts[i+1]);
                }
            }
            g.lineTo(1300, 400);
            g.closePath();
            g.fillStyle = col;
            g.fill();
        }

        /* three mountain layers – palest/farthest → most saturated/nearest */
        ridge([0,310, 170,228, 330,278, 490,208, 650,258, 810,203, 970,253, 1130,213, 1300,248],
              'rgba(230,185,215,0.50)');
        ridge([0,338, 135,268, 265,308, 405,248, 545,293, 695,252, 845,288, 1005,258, 1155,293, 1300,274],
              'rgba(215,160,198,0.62)');
        ridge([0,363, 102,309, 232,344, 362,282, 502,334, 662,298, 802,339, 952,302, 1102,338, 1300,318],
              'rgba(195,135,178,0.74)');

        /* horizon mist */
        var hm = g.createLinearGradient(0, 356, 0, 400);
        hm.addColorStop(0, 'rgba(252,226,246,0)');
        hm.addColorStop(1, 'rgba(252,226,246,0.72)');
        g.fillStyle = hm; g.fillRect(0, 356, 1300, 44);

        /* cherry blossom tree silhouettes along the horizon */
        function blossomTree(x, trunkH, crownR) {
            var tw = Math.max(4, crownR * 0.10);
            g.fillStyle = 'rgba(98,60,78,0.55)';
            g.fillRect(x - tw / 2, 400 - trunkH, tw, trunkH);
            var layers = [
                [0,       -crownR*0.58, crownR*0.92, crownR*0.66, 'rgba(240,178,210,0.43)'],
                [-crownR*0.38, -crownR*0.22, crownR*0.62, crownR*0.48, 'rgba(255,196,222,0.40)'],
                [ crownR*0.34, -crownR*0.28, crownR*0.58, crownR*0.46, 'rgba(248,185,218,0.40)'],
                [0,        crownR*0.06, crownR*0.74, crownR*0.52, 'rgba(255,210,232,0.33)'],
            ];
            layers.forEach(function(e) {
                g.beginPath();
                g.ellipse(x + e[0], 400 - trunkH + e[1], e[2], e[3], 0, 0, Math.PI * 2);
                g.fillStyle = e[4]; g.fill();
            });
        }

        blossomTree( 78, 74, 47); blossomTree(212, 59, 37); blossomTree(422, 84, 54);
        blossomTree(642, 67, 42); blossomTree(872, 77, 50); blossomTree(1062,62, 40);
        blossomTree(1237,69, 44);

        fondDataURL = c.toDataURL('image/png');
    }();

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       fond2 – spring pond / water reflection          (1300 × 300)
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    !function() {
        var c = document.createElement('canvas');
        c.width = 1300; c.height = 300;
        var g = c.getContext('2d');

        /* water base gradient */
        var bg = g.createLinearGradient(0, 0, 0, 300);
        bg.addColorStop(0,   '#f3dbed');
        bg.addColorStop(0.5, '#e6cae0');
        bg.addColorStop(1,   '#d4b4d3');
        g.fillStyle = bg; g.fillRect(0, 0, 1300, 300);

        /* inverted mountain reflections at the top edge */
        function reflRidge(pts, col) {
            g.beginPath(); g.moveTo(0, 0);
            for (var i = 0; i < pts.length; i += 2) {
                if (i === 0) {
                    g.lineTo(pts[0], pts[1]);
                } else {
                    g.quadraticCurveTo(
                        (pts[i-2] + pts[i]) / 2,
                        Math.max(pts[i-1], pts[i+1]) + 10,
                        pts[i], pts[i+1]);
                }
            }
            g.lineTo(1300, 0);
            g.closePath();
            g.fillStyle = col;
            g.fill();
        }
        reflRidge([0,40, 135,102, 265,60, 405,122, 545,70, 695,107, 845,65, 1005,93, 1155,60, 1300,76],
                  'rgba(205,150,193,0.52)');
        reflRidge([0,22, 102,60, 232,34, 362,82, 502,42, 662,68, 802,38, 952,62, 1102,36, 1300,54],
                  'rgba(220,172,210,0.46)');

        /* water ripple lines */
        g.lineWidth = 0.8;
        for (var ry = 10; ry < 300; ry += 7) {
            g.strokeStyle = 'rgba(255,220,242,' + (0.10 + (ry / 300) * 0.12) + ')';
            g.beginPath();
            for (var rx = 0; rx <= 1300; rx += 4) {
                var wy = ry + Math.sin(rx * 0.015 + ry * 0.05) * 1.6;
                rx === 0 ? g.moveTo(rx, wy) : g.lineTo(rx, wy);
            }
            g.stroke();
        }

        /* mist veil at the very top (seam between sky and water) */
        var ms = g.createLinearGradient(0, 0, 0, 68);
        ms.addColorStop(0, 'rgba(243,216,238,0.80)');
        ms.addColorStop(1, 'rgba(243,216,238,0)');
        g.fillStyle = ms; g.fillRect(0, 0, 1300, 68);

        fond2DataURL = c.toDataURL('image/png');
    }();

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       nuage  – cherry blossom petal cluster, pink / white  (768 × 312)
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    !function() {
        var c = document.createElement('canvas');
        c.width = 768; c.height = 312;
        /* transparent background by default */
        blossomCluster(c.getContext('2d'), 768, 312,
            ['rgba(255,182,196,0.82)',
             'rgba(255,210,224,0.78)',
             'rgba(255,240,248,0.80)',
             'rgba(250,160,186,0.80)',
             'rgba(255,224,237,0.75)'],
            'rgba(255,248,252,0.36)');
        nuageDataURL = c.toDataURL('image/png');
    }();

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       nuage2 – reflected / shadow petal cluster, mauve   (768 × 312)
       ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    !function() {
        var c = document.createElement('canvas');
        c.width = 768; c.height = 312;
        blossomCluster(c.getContext('2d'), 768, 312,
            ['rgba(190,115,155,0.75)',
             'rgba(212,140,180,0.72)',
             'rgba(170,93,140,0.78)',
             'rgba(226,155,196,0.70)',
             'rgba(200,125,166,0.74)'],
            'rgba(240,206,230,0.30)');
        nuage2DataURL = c.toDataURL('image/png');
    }();

})();
/* ═══════════════════════════════════════════════════════════════ end theme ══ */

var pi = [3,1,4,1,5,9,2,6,5,3,5,8,9,7,9,3,2,3,8,4,6,2,6,4,3,3,8,3,2,7,9,5,0,2,8,8,4,1,9,7,1,6,9,3,9,9,3,7,5,1,0,5,8,2,0,9,7,4,9,4,4,5,9,2,3,0,7,8,1,6,4,0,6,2,8,6,2,0,8,9,9,8,6,2,8,0,3,4,8,2,5,3,4,2,1,1,7,0,6,7,9,8,2,1,4,8,0,8,6,5,1,3,2,8,2,3,0,6,6,4,7,0,9,3,8,4,4,6,0,9,5,5,0,5,8,2,2,3,1,7,2,5,3,5,9,4,0,8,1,2,8,4,8,1,1,1,7,4,5,0,2,8,4,1,0,2,7,0,1,9,3,8,5,2,1,1,0,5,5,5,9,6,4,4,6,2,2,9,4,8,9,5,4,9,3,0,3,8,1,9,6,4,4,2,8,8,1,0,9,7,5,6,6,5,9,3,3,4,4,6,1,2,8,4,7,5,6,4,8,2,3,3,7,8,6,7,8,3,1,6,5,2,7,1,2,0,1,9,0,9,1,4,5,6,4,8,5,6,6,9,2,3,4,6,0,3,4,8,6,1,0,4,5,4,3,2,6,6,4,8,2,1,3,3,9,3,6,0,7,2,6,0,2,4,9,1,4,1,2,7,3,7,2,4,5,8,7,0,0,6,6,0,6,3,1,5,5,8,8,1,7,4,8,8,1,5,2,0,9,2,0,9,6,2,8,2,9,2,5,4,0,9,1,7,1,5,3,6,4,3,6,7,8,9,2,5,9,0,3,6,0,0,1,1,3,3,0,5,3,0,5,4,8,8,2,0,4,6,6,5,2,1,3,8,4,1,4,6,9,5,1,9,4,1,5,1,1,6,0,9,4,3,3,0,5,7,2,7,0,3,6,5,7,5,9,5,9,1,9,5,3,0,9,2,1,8,6,1,1,7,3,8,1,9,3,2,6,1,1,7,9,3,1,0,5,1,1,8,5,4,8,0,7,4,4,6,2,3,7,9,9,6,2,7,4,9,5,6,7,3,5,1,8,8,5,7,5,2,7,2,4,8,9,1,2,2,7,9,3,8,1,8,3,0,1,1,9,4,9,1,2,9,8,3,3,6,7,3,3,6,2,4,4,0,6,5,6,6,4,3,0,8,6,0,2,1,3,9,4,9,4,6,3,9,5,2,2,4,7,3,7,1,9,0,7,0,2,1,7,9,8,6,0,9,4,3,7,0,2,7,7,0,5,3,9,2,1,7,1,7,6,2,9,3,1,7,6,7,5,2,3,8,4,6,7,4,8,1,8,4,6,7,6,6,9,4,0,5,1,3,2,0,0,0,5,6,8,1,2,7,1,4,5,2,6,3,5,6,0,8,2,7,7,8,5,7,7,1,3,4,2,7,5,7,7,8,9,6,0,9,1,7,3,6,3,7,1,7,8,7,2,1,4,6,8,4,4,0,9,0,1,2,2,4,9,5,3,4,3,0,1,4,6,5,4,9,5,8,5,3,7,1,0,5,0,7,9,2,2,7,9,6,8,9,2,5,8,9,2,3,5,4,2,0,1,9,9,5,6,1,1,2,1,2,9,0,2,1,9,6,0,8,6,4,0,3,4,4,1,8,1,5,9,8,1,3,6,2,9,7,7,4,7,7,1,3,0,9,9,6,0,5,1,8,7,0,7,2,1,1,3,4,9,9,9,9,9,9,8,3,7,2,9,7,8,0,4,9,9,5,1,0,5,9,7,3,1,7,3,2,8,1,6,0,9,6,3,1,8,5,9,5,0,2,4,4,5,9,4,5,5,3,4,6,9,0,8,3,0,2,6,4,2,5,2,2,3,0,8,2,5,3,3,4,4,6,8,5,0,3,5,2,6,1,9,3,1,1,8,8,1,7,1,0,1,0,0,0,3,1,3,7,8,3,8,7,5,2,8,8,6,5,8,7,5,3,3,2,0,8,3,8,1,4,2,0];
