function buildSunsetSky() {
	// Vertical gradient painted into a BitmapData, then added as a sprite
	// covering the sky area (0..400). Mirrors the warm dusk palette.
	var bmd = game.add.bitmapData(1300, 400);
	var ctx = bmd.context;
	var grd = ctx.createLinearGradient(0, 0, 0, 400);
	grd.addColorStop(0.00, '#3a1e55');   // deep violet up high
	grd.addColorStop(0.25, '#9b3560');   // magenta band
	grd.addColorStop(0.55, '#e85a48');   // hot coral
	grd.addColorStop(0.80, '#ffa463');   // warm orange
	grd.addColorStop(1.00, '#ffd27a');   // pale gold near horizon
	ctx.fillStyle = grd;
	ctx.fillRect(0, 0, 1300, 400);
	bmd.dirty = true;
	return game.add.sprite(0, 0, bmd);
}

function bakeTintedCloud(srcKey, tintCss) {
	// Pre-bake a warm-tinted copy of a cloud texture so the CANVAS renderer
	// (which does not reliably tint TileSprites in Phaser 2.x) can display
	// it directly. 'multiply' preserves the cloud's internal shading while
	// shifting the overall colour; 'destination-in' then re-applies the
	// original image's alpha so the transparent areas stay transparent.
	// Returns the BitmapData — tileSprite accepts it directly as a texture.
	var src = game.cache.getImage(srcKey);
	if (!src) { return null; }
	var bmd = game.make.bitmapData(src.width, src.height);
	var ctx = bmd.context;
	ctx.drawImage(src, 0, 0);
	ctx.globalCompositeOperation = 'multiply';
	ctx.fillStyle = tintCss;
	ctx.fillRect(0, 0, src.width, src.height);
	ctx.globalCompositeOperation = 'destination-in';
	ctx.drawImage(src, 0, 0);
	ctx.globalCompositeOperation = 'source-over';
	bmd.dirty = true;
	return bmd;
}

function buildSunsetField() {
	// Warm dusk-lit ground: brighter near the horizon, deeper shadow below.
	// Done as a BitmapData so we don't have to fight the cyan-only fond2.png
	// with multiplicative tint.
	var bmd = game.add.bitmapData(1300, 300);
	var ctx = bmd.context;
	var grd = ctx.createLinearGradient(0, 0, 0, 300);
	grd.addColorStop(0.00, '#c46843');   // warm sunlit band at horizon
	grd.addColorStop(0.25, '#8a3e3a');   // rusty dusk
	grd.addColorStop(0.70, '#4a1f34');   // deep plum shadow
	grd.addColorStop(1.00, '#2a1228');   // near-black foreground
	ctx.fillStyle = grd;
	ctx.fillRect(0, 0, 1300, 300);
	bmd.dirty = true;
	return game.add.sprite(0, 400, bmd);
}

function buildSunsetSun() {
	// Soft-edged sun: radial-gradient disc in a BitmapData, anchored on the
	// horizon so only a half-dome shows above the field.
	var size = 240;
	var bmd = game.add.bitmapData(size, size);
	var ctx = bmd.context;
	var cx = size / 2, cy = size / 2;
	// Outer halo
	var halo = ctx.createRadialGradient(cx, cy, size * 0.18, cx, cy, size * 0.5);
	halo.addColorStop(0.00, 'rgba(255, 240, 200, 1.0)');
	halo.addColorStop(0.35, 'rgba(255, 190, 120, 0.55)');
	halo.addColorStop(0.70, 'rgba(255, 120,  90, 0.18)');
	halo.addColorStop(1.00, 'rgba(255, 120,  90, 0.00)');
	ctx.fillStyle = halo;
	ctx.fillRect(0, 0, size, size);
	// Bright core
	var core = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.22);
	core.addColorStop(0.00, 'rgba(255, 255, 230, 1.0)');
	core.addColorStop(1.00, 'rgba(255, 220, 160, 0.0)');
	ctx.fillStyle = core;
	ctx.fillRect(0, 0, size, size);
	bmd.dirty = true;
	var sun = game.add.sprite(1300 * 0.68, 400, bmd);
	sun.anchor.setTo(0.5, 0.5);
	return sun;
}

function create() {
	game.time.desiredFps = 30;

	if (THEME === 'sunset') {
		// Warm stage color peeks through anywhere the gradient sprite doesn't cover.
		game.stage.backgroundColor = "#e85a48";
		// Gradient sky (replaces the 'fond' tileSprite visually for this theme).
		buildSunsetSky();
		// Glowing sun, low on the horizon, behind the clouds.
		buildSunsetSun();
		// Dusk-lit ground — a warm gradient replaces the cyan fond2 image
		// for this theme. We still assign fond2 so the bringToTop call at
		// the bottom of update() keeps the field on top of the clouds.
		fond2 = buildSunsetField();
		// Pre-bake warm-tinted cloud textures for this theme so clouds pick up
		// the low sun without relying on runtime TileSprite.tint (flaky on
		// Phaser 2.x CANVAS renderer). Spawned clouds pass these BitmapData
		// objects directly as their texture source.
		sunsetCloud1 = bakeTintedCloud('nuage',  '#ffb680');  // sunlit peach
		sunsetCloud2 = bakeTintedCloud('nuage2', '#8a5a7a');  // mauve shadow
	} else {
		game.stage.backgroundColor = "#4488AA";
		fond = game.add.tileSprite(0, 0, 1300, 400, 'fond');
		fond2 = game.add.tileSprite(0, 400, 1300, 300, 'fond2');

}
function update() {

	timer++;

		var cloudKey  = (THEME === 'sunset' && sunsetCloud1) ? sunsetCloud1 : 'nuage';

			var a = document.createElement('a');
			a.id = 'theme-picker';
			a.href = (next === 'day') ? '?' : ('?theme=' + next);
