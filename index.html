	return Math.floor(Math.random() * (max - min + 1)) + min;
}

function sleep(milliseconds) {
	var start = new Date().getTime();
	for (var i = 0; i < 1e7; i++) {
		if ((new Date().getTime() - start) > milliseconds){
		 break;
		}
	}

	game.load.image('nuage','nuage.png');

	game.load.image('field','field.png');

	legendBg.drawRoundedRect(0, 0, 146, 252, 7);
	legendBg.endFill();
	legendGroup.add(legendBg);

	var panelTitle = game.add.text(1223, 10, '\u03C0 digit hues', titleStyle);
	panelTitle.anchor.setTo(0.5, 0);
	legendGroup.add(panelTitle);

	// One row per digit: colored swatch · "digit N" label · live ×count
	var labelStyle = { font: '11px monospace', fill: '#e8e8ff', stroke: '#001133', strokeThickness: 1 };
	var countStyle = { font: 'bold 11px monospace', fill: '#ffff88', stroke: '#001133', strokeThickness: 1 };

	for (var d = 0; d <= 9; d++) {
		var gy = 30 + d * 22;

		var swatch = game.add.graphics(1158, gy);
		swatch.beginFill(digitColors[d], 1.0);
		swatch.lineStyle(1, 0x222222, 0.7);
		swatch.drawRect(0, 0, 16, 16);
		swatch.endFill();
		legendGroup.add(swatch);

		var lbl = game.add.text(1181, gy + 1, 'digit ' + d, labelStyle);
		legendGroup.add(lbl);

function update() {

	timer++;

	if (timer > (pi[decimal+1])*densityDivider) {

		decimal++;
		timer = 0;
		nuages.push(game.add.tileSprite(-200, 400-(pi[decimal]*34-15)/*+(((pi[decimal]-pi[decimal+pi[decimal]])*pi[decimal]))/2)*/, 768, 312, 'nuage'));
		nuages[decimal].anchor.x = 0.7;
		nuages[decimal].anchor.y = 0.5;
		nuages[decimal].scale.setTo((pi[decimal])/10/*+Math.abs(((pi[decimal]-pi[decimal+1])/9))*/, (pi[decimal])/10);
		nuages[decimal].alpha = 0.9;
		//sum += pi[decimal];

		nuages2[decimal].anchor.y = 0.5;
		nuages2[decimal].scale.setTo((pi[decimal])/10/*+Math.abs(((pi[decimal]-pi[decimal+1])/9))*/, (pi[decimal])/10);
		nuages[decimal].alpha = 0.99;

		// Apply digit-specific colour tint to both cloud halves
		nuages[decimal].tint  = digitColors[pi[decimal]];
		nuages2[decimal].tint = digitColors[pi[decimal]];

		digitCounts[pi[decimal]]++;
		digitCountTexts[pi[decimal]].text = '\u00d7' + digitCounts[pi[decimal]];

			order0.add(nuages2[decimal]);

		case 1:
			order1.add(nuages[decimal]);

			break;
		case 2:

		case 8:

			break;
		case 9:

			order9.add(nuages2[decimal]);
			break;
		}
	}

		if (nuages[jj].x > 1800) {
			nuages[jj].destroy();
		}
		nuages[jj].x += (pi[jj])/Math.abs(velocityDivider);
		nuages2[jj].x += (pi[jj])/Math.abs(velocityDivider);
		//nuages[jj].angle += (1/(pi[jj]))*3;
		jj++;
		//if (nuages[jj].x > 1300) {
