function randInt(min, max) {
	return Math.floor(Math.random() * (max - min + 1)) + min;
}

function getSelectedThemeName() {
	var queryTheme = new URLSearchParams(window.location.search).get("theme");
	if (queryTheme && THEMES[queryTheme]) {
		return queryTheme;
	}

	var storedTheme = window.localStorage.getItem(THEME_STORAGE_KEY);
	if (storedTheme && THEMES[storedTheme]) {
		return storedTheme;
	}

	return "classic-sky";
}

function setSelectedThemeName(themeName) {
	window.localStorage.setItem(THEME_STORAGE_KEY, themeName);
	var url = new URL(window.location.href);
	url.searchParams.set("theme", themeName);
	window.history.replaceState({}, "", url.toString());
}

function createGradientTexture(key, width, height, stops, starConfig) {
	var bmd = game.add.bitmapData(width, height, key, true);
	var gradient = bmd.context.createLinearGradient(0, 0, 0, height);
	var i;

	for (i = 0; i < stops.length; i++) {
		gradient.addColorStop(stops[i].stop, stops[i].color);
	}

	bmd.context.fillStyle = gradient;
	bmd.context.fillRect(0, 0, width, height);

	if (starConfig) {
		for (i = 0; i < starConfig.count; i++) {
			var size = Math.random() * starConfig.size + 0.6;
			var x = Math.random() * width;
			var y = Math.random() * starConfig.maxY;
			bmd.context.fillStyle = "rgba(255,255,255," + (0.2 + Math.random() * 0.55) + ")";
			bmd.context.beginPath();
			bmd.context.arc(x, y, size, 0, Math.PI * 2);
			bmd.context.fill();
		}
	}

	bmd.dirty = true;
	return bmd;
}

function createAuroraTexture(key, config) {
	var width = 1600;
	var height = config.height;
	var bmd = game.add.bitmapData(width, height, key, true);
	var ctx = bmd.context;
	var gradient = ctx.createLinearGradient(0, 0, 0, height);
	var i;

	for (i = 0; i < config.colorStops.length; i++) {
		gradient.addColorStop(config.colorStops[i].stop, config.colorStops[i].color);
	}

	ctx.fillStyle = "rgba(0, 0, 0, 0)";
	ctx.clearRect(0, 0, width, height);
	ctx.fillStyle = gradient;
	ctx.beginPath();
	ctx.moveTo(0, height);

	for (i = 0; i <= width; i += 28) {
		var wave = Math.sin(i / config.wavelength) * config.amplitude;
		var drift = Math.cos(i / (config.wavelength * 0.57)) * (config.amplitude * 0.35);
		ctx.lineTo(i, height * 0.5 + wave + drift);
	}

	ctx.lineTo(width, height);
	ctx.closePath();
	ctx.fill();
	bmd.dirty = true;
	return bmd;
}

function buildThemeAssets() {
	if (!game.cache.checkBitmapDataKey("sky-" + activeThemeName)) {
		createGradientTexture("sky-" + activeThemeName, GAME_WIDTH, SKY_HEIGHT, activeTheme.skyStops, activeThemeName === "arctic-aurora" ? { count: 90, size: 1.7, maxY: 250 } : null);
	}

	if (!game.cache.checkBitmapDataKey("ground-" + activeThemeName)) {
		createGradientTexture("ground-" + activeThemeName, GAME_WIDTH, GAME_HEIGHT - SKY_HEIGHT, activeTheme.groundStops);
	}

	if (activeThemeName === "arctic-aurora") {
		for (var i = 0; i < activeTheme.bands.length; i++) {
			var auroraKey = "aurora-" + activeThemeName + "-" + i;
			if (!game.cache.checkBitmapDataKey(auroraKey)) {
				createAuroraTexture(auroraKey, activeTheme.bands[i]);
			}
		}
	}
}

function clearClouds() {
	for (var i = 0; i < nuages.length; i++) {
		if (nuages[i]) {
			nuages[i].destroy();
		}
		if (nuages2[i]) {
			nuages2[i].destroy();
		}
	}

	nuages = [];
	nuages2 = [];
	decimal = -1;
	jj = 0;
	timer = 0;
}

function applyThemeVisuals() {
	var i;

	buildThemeAssets();
	document.body.style.backgroundColor = activeTheme.bodyColor;
	game.stage.backgroundColor = activeTheme.stageColor;
	fond.loadTexture(game.cache.getBitmapData("sky-" + activeThemeName));
	fond2.loadTexture(game.cache.getBitmapData("ground-" + activeThemeName));
	horizonGlow.alpha = activeTheme.horizonAlpha;

	for (i = 0; i < auroraBands.length; i++) {
		auroraBands[i].destroy();
	}
	auroraBands = [];

	for (i = 0; i < activeTheme.bands.length; i++) {
		var band = activeTheme.bands[i];
		var sprite = game.add.tileSprite(-120, band.y, 1600, band.height, game.cache.getBitmapData("aurora-" + activeThemeName + "-" + i));
		sprite.alpha = band.alpha;
		sprite.blendMode = Phaser.blendModes.SCREEN;
		sprite.speed = band.speed;
		sprite.fixedToCamera = false;
		auroraBands.push(sprite);
	}

	clearClouds();
	updateThemeMeta();
}

function selectTheme(themeName, persist) {
	if (!THEMES[themeName]) {
		return;
	}

	activeThemeName = themeName;
	activeTheme = THEMES[themeName];

	if (persist) {
		setSelectedThemeName(themeName);
	}

	if (game) {
		applyThemeVisuals();
	}
}

function updateThemeMeta() {
	var title = document.getElementById("theme-title");
	var desc = document.getElementById("theme-description");
	var select = document.getElementById("theme-select");

	title.textContent = activeTheme.label;
	desc.textContent = activeTheme.description;
	select.value = activeThemeName;
}

function preload() {
	game.load.image("nuage", "nuage.png");
	game.load.image("nuage2", "nuage2.png");
}

function create() {
	var i;

	game.time.desiredFps = 30;
	buildThemeAssets();
	fond = game.add.tileSprite(0, 0, GAME_WIDTH, SKY_HEIGHT, game.cache.getBitmapData("sky-" + activeThemeName));
	fond2 = game.add.tileSprite(0, SKY_HEIGHT, GAME_WIDTH, GAME_HEIGHT - SKY_HEIGHT, game.cache.getBitmapData("ground-" + activeThemeName));
	horizonGlow = game.add.graphics(0, SKY_HEIGHT - 46);
	horizonGlow.beginFill(0xC8FFF6, 1);
	horizonGlow.drawRect(0, 0, GAME_WIDTH, 92);
	horizonGlow.endFill();
	horizonGlow.alpha = activeTheme.horizonAlpha;

	for (i = 0; i < 10; i++) {
		orderGroups[i] = game.add.group();
	}

	applyThemeVisuals();
}

function spawnCloud(key, y, digit, tint, alpha, group) {
	var cloud = game.add.tileSprite(-200, y, CLOUD_WIDTH, CLOUD_HEIGHT, key);
	cloud.anchor.x = 0.7;
	cloud.anchor.y = 0.5;
	cloud.scale.setTo(digit / 10, digit / 10);
	cloud.alpha = alpha;
	cloud.tint = tint;
	group.add(cloud);
	return cloud;
}

function update() {
	timer++;

	if (timer > pi[decimal + 1] * activeTheme.densityDivider) {
		var nextIndex = decimal + 1;
		var digit = pi[nextIndex];
		var topY = SKY_HEIGHT - (digit * 34 - 15);
		var bottomY = SKY_HEIGHT + (digit * 34 - 15);
		var group = orderGroups[digit];

		decimal = nextIndex;
		timer = 0;
		nuages.push(spawnCloud("nuage", topY, digit, parseInt(activeTheme.cloudTints[0], 16), activeTheme.cloudAlpha[0], group));
		nuages2.push(spawnCloud("nuage2", bottomY, digit, parseInt(activeTheme.cloudTints[1], 16), activeTheme.cloudAlpha[1], group));
	}

	while (jj <= decimal) {
		if (nuages[jj] && nuages[jj].x > 1800) {
			nuages[jj].destroy();
			nuages2[jj].destroy();
			nuages[jj] = null;
			nuages2[jj] = null;
		} else if (nuages[jj]) {
			var velocity = pi[jj] / Math.abs(activeTheme.velocityDivider);
			nuages[jj].x += velocity;
			nuages2[jj].x += velocity;
		}
		jj++;
	}
	jj = 0;

	for (var i = 0; i < orderGroups.length; i++) {
		game.world.bringToTop(orderGroups[i]);
	}

	for (i = 0; i < auroraBands.length; i++) {
		auroraBands[i].tilePosition.x += activeTheme.bands[i].speed;
		game.world.bringToTop(auroraBands[i]);
	}

	game.world.bringToTop(horizonGlow);
	game.world.bringToTop(fond2);
}

function boot() {
	for (var i = 0; i < 10000; i++) {
		pi.push(randInt(0, 9));
	}

	activeThemeName = getSelectedThemeName();
	activeTheme = THEMES[activeThemeName];
	updateThemeMeta();
	game = new Phaser.Game(GAME_WIDTH, GAME_HEIGHT, Phaser.CANVAS, "game", { preload: preload, create: create, update: update }, false, false);
}

document.addEventListener("DOMContentLoaded", function () {
	var select = document.getElementById("theme-select");
	var options = Object.keys(THEMES);

	for (var i = 0; i < options.length; i++) {
		var option = document.createElement("option");
		option.value = options[i];
		option.textContent = THEMES[options[i]].label;
		select.appendChild(option);
	}

	select.addEventListener("change", function (event) {
		selectTheme(event.target.value, true);
	});

	boot();
});
