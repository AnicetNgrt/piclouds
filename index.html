<!DOCTYPE html>
<html>
<head>
	<title>Nuages de Pi</title>
	<link href="stylesheet.css" rel="stylesheet">
	<meta charset="utf-8"/>
	<script type="text/javascript" src="phaser.min.js"></script>
	<script>
var game = new Phaser.Game(1300, 700, Phaser.CANVAS, 'PIclouds', { preload: preload, create: create, update: update }, false, false);
var nuages = []; var densityDivider = 4; var velocityDivider = 0.6;
var nuages2 = []; var field; var fond; var fond2;
var shootingStars = []; var starsGraphics;
var nn = 0; var jj = 0; var sum = 0; var lock = 0;
var decimal = -1;
var order0, order1, order2, order3, order4, order5, order6, order7, order8, order9;

// Digit-driven colour palette: cold stormy blue (0) → warm golden (9).
// Tint is multiplied against the sprite texture, so 0xFFFFFF = no change.
var digitTints = [
	0x7799CC, // 0  stormy slate-blue
	0x99AADD, // 1  cool grey-blue
	0xAABBEE, // 2  periwinkle
	0xBBCCFF, // 3  lavender blue
	0xDDDDFF, // 4  pale violet
	0xFFFFFF, // 5  pure white (no tint)
	0xFFFFCC, // 6  warm white
	0xFFEEAA, // 7  pale gold
	0xFFDD88, // 8  amber
	0xFFBB55  // 9  deep gold
];

// Rain curtains spawned on every digit-0 event.
// Each entry: { gfx, x, drops: [{xOff, yOff, speed}] }
var rainSystems = [];
var RAIN_DROPS = 24;        // drops per curtain
var RAIN_WIDTH = 340;       // horizontal spread of each curtain (px)
var RAIN_DRIFT = 2.2;       // curtain rightward drift speed (px/frame)
var RAIN_HEIGHT = 680;      // vertical cycling range (px)

var pi = [3,1,4,1,5,9,2,6,5,3,5,8,9,7,9,3,2,3,8,4,6,2,6,4,3,3,8,3,2,7,9,5,0,2,8,8,4,1,9,7,1,6,9,3,9,9,3,7,5,1,0,5,8,2,0,9,7,4,9,4,4,5,9,2,3,0,7,8,1,6,4,0,6,2,8,6,2,0,8,9,9,8,6,2,8,0,3,4,8,2,5,3,4,2,1,1,7,0,6,7,9,8,2,1,4,8,0,8,6,5,1,3,2,8,2,3,0,6,6,4,7,0,9,3,8,4,4,6,0,9,5,5,0,5,8,2,2,3,1,7,2,5,3,5,9,4,0,8,1,2,8,4,8,1,1,1,7,4,5,0,2,8,4,1,0,2,7,0,1,9,3,8,5,2,1,1,0,5,5,5,9,6,4,4,6,2,2,9,4,8,9,5,4,9,3,0,3,8,1,9,6,4,4,2,8,8,1,0,9,7,5,6,6,5,9,3,3,4,4,6,1,2,8,4,7,5,6,4,8,2,3,3,7,8,6,7,8,3,1,6,5,2,7,1,2,0,1,9,0,9,1,4,5,6,4,8,5,6,6,9,2,3,4,6,0,3,4,8,6,1,0,4,5,4,3,2,6,6,4,8,2,1,3,3,9,3,6,0,7,2,6,0,2,4,9,1,4,1,2,7,3,7,2,4,5,8,7,0,0,6,6,0,6,3,1,5,5,8,8,1,7,4,8,8,1,5,2,0,9,2,0,9,6,2,8,2,9,2,5,4,0,9,1,7,1,5,3,6,4,3,6,7,8,9,2,5,9,0,3,6,0,0,1,1,3,3,0,5,3,0,5,4,8,8,2,0,4,6,6,5,2,1,3,8,4,1,4,6,9,5,1,9,4,1,5,1,1,6,0,9,4,3,3,0,5,7,2,7,0,3,6,5,7,5,9,5,9,1,9,5,3,0,9,2,1,8,6,1,1,7,3,8,1,9,3,2,6,1,1,7,9,3,1,0,5,1,1,8,5,4,8,0,7,4,4,6,2,3,7,9,9,6,2,7,4,9,5,6,7,3,5,1,8,8,5,7,5,2,7,2,4,8,9,1,2,2,7,9,3,8,1,8,3,0,1,1,9,4,9,1,2,9,8,3,3,6,7,3,3,6,2,4,4,0,6,5,6,6,4,3,0,8,6,0,2,1,3,9,4,9,4,6,3,9,5,2,2,4,7,3,7,1,9,0,7,0,2,1,7,9,8,6,0,9,4,3,7,0,2,7,7,0,5,3,9,2,1,7,1,7,6,2,9,3,1,7,6,7,5,2,3,8,4,6,7,4,8,1,8,4,6,7,6,6,9,4,0,5,1,3,2,0,0,0,5,6,8,1,2,7,1,4,5,2,6,3,5,6,0,8,2,7,7,8,5,7,7,1,3,4,2,7,5,7,7,8,9,6,0,9,1,7,3,6,3,7,1,7,8,7,2,1,4,6,8,4,4,0,9,0,1,2,2,4,9,5,3,4,3,0,1,4,6,5,4,9,5,8,5,3,7,1,0,5,0,7,9,2,2,7,9,6,8,9,2,5,8,9,2,3,5,4,2,0,1,9,9,5,6,1,1,2,1,2,9,0,2,1,9,6,0,8,6,4,0,3,4,4,1,8,1,5,9,8,1,3,6,2,9,7,7,4,7,7,1,3,0,9,9,6,0,5,1,8,7,0,7,2,1,1,3,4,9,9,9,9,9,9,8,3,7,2,9,7,8,0,4,9,9,5,1,0,5,9,7,3,1,7,3,2,8,1,6,0,9,6,3,1,8,5,9,5,0,2,4,4,5,9,4,5,5,3,4,6,9,0,8,3,0,2,6,4,2,5,2,2,3,0,8,2,5,3,3,4,4,6,8,5,0,3,5,2,6,1,9,3,1,1,8,8,1,7,1,0,1,0,0,0,3,1,3,7,8,3,8,7,5,2,8,8,6,5,8,7,5,3,3,2,0,8,3,8,1,4,2,0];

function randInt(min, max) {
	return Math.floor(Math.random() * (max - min + 1)) + min;
}

for (var i = 0; i < 10000; i++) {
	pi.push(randInt(0, 9));
}

var timer = 0;
var frameCount = 0;

// --- Day/Night Cycle ---
var dayAngle = 180;          // degrees: 0=midnight, 90=dawn, 180=noon, 270=dusk
var DAY_CYCLE_SPEED = 0.05;  // base degrees per frame (~4 min per full cycle at 30 fps)
var nightGraphic;
var starData = [];
var NUM_STARS = 100;

function lerpVal(a, b, t) { return a + (b - a) * t; }
function lerpColor(c1, c2, t) {
	return {
		r: Math.round(lerpVal(c1.r, c2.r, t)),
		g: Math.round(lerpVal(c1.g, c2.g, t)),
		b: Math.round(lerpVal(c1.b, c2.b, t))
	};
}
function toHex(c) { return (c.r << 16) | (c.g << 8) | c.b; }

function getSkyColor(angle) {
	var a = ((angle % 360) + 360) % 360;
	var NIGHT = {r:4,   g:7,   b:30};
	var DAWN  = {r:210, g:95,  b:25};
	var DAY   = {r:68,  g:136, b:170};
	var DUSK  = {r:170, g:55,  b:85};
	var c1, c2, t;
	if      (a < 90)  { c1=NIGHT; c2=DAWN;  t=a/90; }
	else if (a < 180) { c1=DAWN;  c2=DAY;   t=(a-90)/90; }
	else if (a < 270) { c1=DAY;   c2=DUSK;  t=(a-180)/90; }
	else              { c1=DUSK;  c2=NIGHT; t=(a-270)/90; }
	return lerpColor(c1, c2, t);
}

function getNightness(angle) {
	var a = ((angle % 360) + 360) % 360;
	return (1 + Math.cos(a * Math.PI / 180)) / 2;
}

function initStars() {
	for (var i = 0; i < NUM_STARS; i++) {
		starData.push({
			x:      Math.floor(Math.random() * 1300),
			y:      Math.floor(Math.random() * 390),
			r:      0.8 + Math.random() * 1.5,
			phase:  Math.random() * Math.PI * 2,
			bright: 0.5 + Math.random() * 0.5
		});
	}
}
// --- End Day/Night Cycle Declarations ---

function sleep(milliseconds) {
	var start = new Date().getTime();
	for (var i = 0; i < 1e7; i++) {
		if ((new Date().getTime() - start) > milliseconds){
		 break;
		}
	}
}

function spawnRainSystem() {
	var gfx = game.add.graphics(0, 0);
	var drops = [];
	for (var d = 0; d < RAIN_DROPS; d++) {
		drops.push({
			xOff:  Math.random() * RAIN_WIDTH,
			yOff:  Math.random() * RAIN_HEIGHT,
			speed: 4 + Math.random() * 4
		});
	}
	rainSystems.push({ gfx: gfx, x: -RAIN_WIDTH, drops: drops });
}

function preload() {
	game.load.image('nuage','nuage.png');
	game.load.image('nuage2','nuage2.png');
	game.load.image('field','field.png');
	game.load.image('fond','fond.png');
	game.load.image('fond2','fond2.png');
}

function create() {
	game.time.desiredFps = 30;
	game.stage.backgroundColor = "#4488AA";
	fond = game.add.tileSprite(0, 0, 1300, 400, 'fond');
	fond2 = game.add.tileSprite(0, 400, 1300, 300, 'fond2');
	// Night sky layer — sits above background images, below cloud groups
	nightGraphic = game.add.graphics(0, 0);
	initStars();
	order0 = game.add.group();
	order1 = game.add.group();
	order2 = game.add.group();
	order3 = game.add.group();
	order4 = game.add.group();
	order5 = game.add.group();
	order6 = game.add.group();
	order7 = game.add.group();
	order8 = game.add.group();
	order9 = game.add.group();
	starsGraphics = game.add.graphics(0, 0);
	fond2.alpha = 0.9;
}

function update() {
	frameCount++;
	timer++;

	// --- Day/Night Cycle Update ---
	var curDigit = (decimal >= 0) ? pi[decimal] : 5;
	// Pi digit 0-9 scales speed: 0 → 0.3x, 9 → 2.0x
	var digitFactor = 0.3 + (curDigit / 9) * 1.7;
	dayAngle = (dayAngle + DAY_CYCLE_SPEED * digitFactor) % 360;

	var nightness  = getNightness(dayAngle);
	var skyColor   = getSkyColor(dayAngle);
	var skyHex     = toHex(skyColor);
	var hexStr     = ('000000' + skyHex.toString(16)).slice(-6);
	game.stage.backgroundColor = '#' + hexStr;

	nightGraphic.clear();
	if (nightness > 0.01) {
		// Sky area overlay (top half)
		nightGraphic.beginFill(skyHex, nightness * 0.75);
		nightGraphic.drawRect(0, 0, 1300, 400);
		nightGraphic.endFill();
		// Ground area subtle darkening (bottom half)
		nightGraphic.beginFill(0x050820, nightness * 0.42);
		nightGraphic.drawRect(0, 400, 1300, 300);
		nightGraphic.endFill();
		// Twinkling stars
		for (var si = 0; si < NUM_STARS; si++) {
			var s = starData[si];
			var twinkle   = (1 + Math.sin(frameCount * 0.07 + s.phase)) / 2;
			var starAlpha = nightness * s.bright * (0.4 + twinkle * 0.6);
			nightGraphic.beginFill(0xFFFFFF, starAlpha);
			nightGraphic.drawCircle(s.x, s.y, s.r * 2);
			nightGraphic.endFill();
		}
		// Moon: arcs across sky — rises right at dusk, peaks centre at midnight, sets left at dawn
		if (nightness > 0.3) {
			var moonArc   = dayAngle * Math.PI / 180;
			var moonX     = 650 - Math.sin(moonArc) * 450;
			var moonY     = 200 - Math.cos(moonArc) * 120;
			var moonAlpha = Math.min(1, (nightness - 0.3) / 0.7);
			if (moonX > -40 && moonX < 1340 && moonY > 0 && moonY < 390) {
				nightGraphic.beginFill(0xFFFF88, moonAlpha * 0.13);
				nightGraphic.drawCircle(moonX, moonY, 90);   // soft glow halo
				nightGraphic.endFill();
				nightGraphic.beginFill(0xFFF7CC, moonAlpha * 0.93);
				nightGraphic.drawCircle(moonX, moonY, 38);   // moon disc
				nightGraphic.endFill();
			}
		}
	}
	// --- End Day/Night Cycle Update ---

	if (timer > (pi[decimal+1])*densityDivider) {

		decimal++;
		timer = 0;

		var digit = pi[decimal];

		nuages.push(game.add.tileSprite(-200, 400-(pi[decimal]*34-15), 768, 312, 'nuage'));
		nuages[decimal].anchor.x = 0.7;
		nuages[decimal].anchor.y = 0.5;
		nuages[decimal].scale.setTo((pi[decimal])/10, (pi[decimal])/10);
		nuages[decimal].alpha = 0.9;
		nuages[decimal].tint = digitTints[digit];

		nuages2.push(game.add.tileSprite(-200, 400+(pi[decimal]*34-15), 768, 312, 'nuage2'));
		nuages2[decimal].anchor.x = 0.7;
		nuages2[decimal].anchor.y = 0.5;
		nuages2[decimal].scale.setTo((pi[decimal])/10, (pi[decimal])/10);
		nuages[decimal].alpha = 0.99;
		nuages2[decimal].tint = digitTints[digit];

		// Every zero in Pi triggers a rain curtain drifting across the sky.
		if (digit === 0) {
			spawnRainSystem();
		}

		switch(pi[decimal]) {
		case 0:
			order0.add(nuages[decimal]);
			order0.add(nuages2[decimal]);
			break;
		case 1:
			order1.add(nuages[decimal]);
			order1.add(nuages2[decimal]);
			break;
		case 2:
			order2.add(nuages[decimal]);
			order2.add(nuages2[decimal]);
			break;
		case 3:
			order3.add(nuages[decimal]);
			order3.add(nuages2[decimal]);
			break;
		case 4:
			order4.add(nuages[decimal]);
			order4.add(nuages2[decimal]);
			break;
		case 5:
			order5.add(nuages[decimal]);
			order5.add(nuages2[decimal]);
			break;
		case 6:
			order6.add(nuages[decimal]);
			order6.add(nuages2[decimal]);
			break;
		case 7:
			order7.add(nuages[decimal]);
			order7.add(nuages2[decimal]);
			break;
		case 8:
			order8.add(nuages[decimal]);
			order8.add(nuages2[decimal]);
			break;
		case 9:
			order9.add(nuages[decimal]);
			order9.add(nuages2[decimal]);
			break;
		}

		// Digit 9 fires a shooting star across the sky
		if (pi[decimal] === 9) {
			var nextD = (pi[decimal + 1] !== undefined ? pi[decimal + 1] : 5);
			var prevD = (decimal > 0 && pi[decimal - 1] !== undefined ? pi[decimal - 1] : 5);
			shootingStars.push({
				x: 50 + Math.random() * 1100,
				y: 10 + Math.random() * 200,
				vx: 10 + nextD * 1.4,
				vy: 2 + prevD * 0.7,
				alpha: 1.0
			});
		}
	}

	// Animate rain curtains.
	for (var rs = rainSystems.length - 1; rs >= 0; rs--) {
		var sys = rainSystems[rs];
		sys.x += RAIN_DRIFT;

		if (sys.x > 1500) {
			sys.gfx.destroy();
			rainSystems.splice(rs, 1);
			continue;
		}

		sys.gfx.clear();
		sys.gfx.beginFill(0x99BBFF, 0.55);
		for (var d = 0; d < sys.drops.length; d++) {
			sys.drops[d].yOff += sys.drops[d].speed;
			if (sys.drops[d].yOff > RAIN_HEIGHT) {
				sys.drops[d].yOff = -Math.random() * 80;
			}
			sys.gfx.drawRect(sys.x + sys.drops[d].xOff, sys.drops[d].yOff, 2, 9);
		}
		sys.gfx.endFill();
	}

	while (jj <= decimal ) {
		if (nuages[jj].x > 1800) {
			nuages[jj].destroy();
		}
		nuages[jj].x += (pi[jj])/Math.abs(velocityDivider);
		nuages2[jj].x += (pi[jj])/Math.abs(velocityDivider);
		jj++;
	}
	jj = 0;

	// Update and draw shooting stars (triggered when Pi digit equals 9)
	starsGraphics.clear();
	for (var si = shootingStars.length - 1; si >= 0; si--) {
		var s = shootingStars[si];
		// Fading trail behind the star
		starsGraphics.lineStyle(2, 0xFFFFFF, s.alpha * 0.55);
		starsGraphics.moveTo(s.x - s.vx * 10, s.y - s.vy * 10);
		starsGraphics.lineTo(s.x, s.y);
		// Bright glowing head
		starsGraphics.beginFill(0xFFFFFF, s.alpha);
		starsGraphics.drawCircle(s.x, s.y, 4);
		starsGraphics.endFill();
		// Subtle outer glow
		starsGraphics.beginFill(0xCCEEFF, s.alpha * 0.3);
		starsGraphics.drawCircle(s.x, s.y, 9);
		starsGraphics.endFill();
		s.x += s.vx;
		s.y += s.vy;
		s.alpha -= 0.022;
		if (s.alpha <= 0 || s.x > 1400 || s.y > 420 || s.x < -50) {
			shootingStars.splice(si, 1);
		}
	}

	// Z-order: night sky → clouds → shooting stars → foreground → rain
	game.world.bringToTop(nightGraphic); // night sky behind clouds, above background
	game.world.bringToTop(order0);
	game.world.bringToTop(order1);
	game.world.bringToTop(order2);
	game.world.bringToTop(order3);
	game.world.bringToTop(order4);
	game.world.bringToTop(order5);
	game.world.bringToTop(order6);
	game.world.bringToTop(order7);
	game.world.bringToTop(order8);
	game.world.bringToTop(order9);
	game.world.bringToTop(starsGraphics);
	fond2.bringToTop();

	// Rain curtains render above everything, including the ground overlay.
	for (var rs = 0; rs < rainSystems.length; rs++) {
		rainSystems[rs].gfx.bringToTop();
	}
}
	</script>
</head>
<body style="background-color: rgb(67,169,223);">
	<div id="game" style="
		cursor: none;
		position: absolute;
		TOP: 0px;
		LEFT: 0px;


		image-rendering: optimizeSpeed;
		image-rendering: -moz-crisp-edges;
		image-rendering: -o-crisp-edges;
		image-rendering: -webkit-optimize-contrast;
		image-rendering: optimize-contrast;
		-ms-interpolation-mode: nearest-neighbor;
		image-rendering : pixelated;">
	</div>
