<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<title>Pi Island</title>
	<style>
		html, body {
			margin: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background:
				radial-gradient(circle at 50% 18%, rgba(255, 248, 191, 0.95) 0, rgba(255, 248, 191, 0.38) 110px, transparent 190px),
				linear-gradient(to bottom, #74d8ff 0%, #8ae0ff 34%, #47c7f0 52%, #1488cf 76%, #0a4c83 100%);
			font-family: "Trebuchet MS", "Gill Sans", "Segoe UI", sans-serif;
		}

		#PIclouds {
			position: absolute;
			inset: 0;
			cursor: none;
			image-rendering: pixelated;
			image-rendering: crisp-edges;
		}
	</style>
	<script type="text/javascript" src="phaser.min.js"></script>
	<script>
var game = new Phaser.Game(1300, 700, Phaser.CANVAS, 'PIclouds', { preload: preload, create: create, update: update }, false, false);

var piDigits = [
	3,1,4,1,5,9,2,6,5,3,5,8,9,7,9,3,2,3,8,4,
	6,2,6,4,3,3,8,3,2,7,9,5,0,2,8,8,4,1,9,7,
	1,6,9,3,9,9,3,7,5,1,0,5,8,2,0,9,7,4,9,4,
	4,5,9,2,3,0,7,8,1,6,4,0,6,2,8,6,2,0,8,9,
	9,8,6,2,8,0,3,4,8,2,5,3,4,2,1,1,7,0,6,7,
	9,8,2,1,4,8,0,8,6,5,1,3,2,8,2,3,0,6,6,4
];

var skyLayer;
var oceanLayer;
var islandLayer;
var waveLayer;
var uiText;
var coconuts = [];
var palms = [];
var spawnTimer = 0;
var piIndex = 0;
var tide = 0;
var seaLight = 0;
var coconutTexture;
var leafTexture;
var trunkTexture;

function preload() {}

function create() {
	game.time.desiredFps = 30;
	game.stage.backgroundColor = '#8ae0ff';

	coconutTexture = createCoconutTexture();
	leafTexture = createLeafTexture();
	trunkTexture = createTrunkTexture();

	skyLayer = game.add.graphics(0, 0);
	drawSky();

	oceanLayer = game.add.graphics(0, 0);
	drawOcean();

	waveLayer = game.add.graphics(0, 0);

	islandLayer = game.add.graphics(0, 0);
	drawIsland();

	createPalms();

	uiText = game.add.text(28, 22, 'Pi Island  coconut coast', {
		font: 'bold 20px "Trebuchet MS", "Gill Sans", sans-serif',
		fill: '#f8f2d3',
		stroke: '#14425d',
		strokeThickness: 4
	});
	uiText.fixedToCamera = true;
	uiText.alpha = 0.92;
}

function update() {
	tide += 1;
	seaLight += 0.004;
	spawnTimer += 1;

	updatePalms();
	updateWaves();
	spawnCoconuts();
	updateCoconuts();
}

function createBitmap(width, height, drawFn) {
	var bmp = game.add.bitmapData(width, height);
	drawFn(bmp.context);
	bmp.dirty = true;
	return bmp;
}

function createCoconutTexture() {
	return createBitmap(72, 54, function(ctx) {
		ctx.clearRect(0, 0, 72, 54);

		ctx.save();
		ctx.translate(36, 28);
		ctx.rotate(-0.15);
		ctx.fillStyle = '#6f4522';
		ctx.beginPath();
		ctx.ellipse(0, 0, 22, 16, 0, 0, Math.PI * 2);
		ctx.fill();

		ctx.fillStyle = '#8a5a2a';
		ctx.beginPath();
		ctx.ellipse(-4, -3, 18, 13, 0.15, 0, Math.PI * 2);
		ctx.fill();

		ctx.strokeStyle = '#3f250f';
		ctx.lineWidth = 2;
		ctx.beginPath();
		ctx.ellipse(0, 0, 22, 16, 0, 0, Math.PI * 2);
		ctx.stroke();

		ctx.strokeStyle = 'rgba(255, 241, 202, 0.8)';
		ctx.lineWidth = 3;
		ctx.beginPath();
		ctx.moveTo(-8, -6);
		ctx.lineTo(-2, -10);
		ctx.stroke();

		ctx.fillStyle = '#2da45b';
		ctx.beginPath();
		ctx.moveTo(13, -14);
		ctx.quadraticCurveTo(26, -28, 32, -34);
		ctx.quadraticCurveTo(18, -24, 7, -19);
		ctx.closePath();
		ctx.fill();

		ctx.beginPath();
		ctx.moveTo(18, -10);
		ctx.quadraticCurveTo(30, -13, 36, -20);
		ctx.quadraticCurveTo(24, -18, 13, -15);
		ctx.closePath();
		ctx.fill();

		ctx.restore();
	});
}

function createLeafTexture() {
	return createBitmap(168, 74, function(ctx) {
		ctx.clearRect(0, 0, 168, 74);
		ctx.save();
		ctx.translate(10, 37);
		ctx.fillStyle = '#2d9c4d';
		ctx.strokeStyle = '#1a6d34';
		ctx.lineWidth = 3;

		ctx.beginPath();
		ctx.moveTo(0, 0);
		ctx.quadraticCurveTo(60, -24, 150, -8);
		ctx.quadraticCurveTo(88, 8, 0, 0);
		ctx.closePath();
		ctx.fill();
		ctx.stroke();

		ctx.strokeStyle = 'rgba(255, 255, 255, 0.22)';
		ctx.lineWidth = 2;
		ctx.beginPath();
		ctx.moveTo(8, -1);
		ctx.lineTo(142, -7);
		ctx.stroke();

		ctx.restore();
	});
}

function createTrunkTexture() {
	return createBitmap(120, 260, function(ctx) {
		ctx.clearRect(0, 0, 120, 260);
		ctx.save();
		ctx.translate(30, 248);
		ctx.rotate(-0.18);
		ctx.strokeStyle = '#70431b';
		ctx.lineWidth = 18;
		ctx.lineCap = 'round';
		ctx.beginPath();
		ctx.moveTo(0, 0);
		ctx.quadraticCurveTo(18, -70, 20, -134);
		ctx.quadraticCurveTo(21, -196, 36, -236);
		ctx.stroke();

		ctx.strokeStyle = '#9b6a37';
		ctx.lineWidth = 8;
		ctx.beginPath();
		ctx.moveTo(3, -6);
		ctx.quadraticCurveTo(18, -70, 21, -138);
		ctx.quadraticCurveTo(21, -194, 34, -234);
		ctx.stroke();

		ctx.strokeStyle = 'rgba(52, 25, 11, 0.36)';
		ctx.lineWidth = 2;
		for (var i = 0; i < 10; i++) {
			ctx.beginPath();
			ctx.moveTo(5 + i * 2, -18 - i * 20);
			ctx.lineTo(23 + i * 2, -8 - i * 20);
			ctx.stroke();
		}

		ctx.restore();
	});
}

function drawSky() {
	skyLayer.clear();
	drawBands(skyLayer, 0, 0, 1300, 380, [
		[0x60ccff, 1],
		[0x71d6ff, 1],
		[0x87e2ff, 1],
		[0xa8eeff, 1]
	]);

	skyLayer.beginFill(0xfff2b1, 0.28);
	skyLayer.drawCircle(1040, 110, 190);
	skyLayer.endFill();

	skyLayer.beginFill(0xfff8d9, 0.72);
	skyLayer.drawCircle(1040, 110, 82);
	skyLayer.endFill();

	skyLayer.beginFill(0xfffbe9, 0.1);
	skyLayer.drawCircle(980, 165, 360);
	skyLayer.endFill();

	drawBird(skyLayer, 920, 170, 1);
	drawBird(skyLayer, 968, 134, 0.85);
	drawBird(skyLayer, 1080, 188, 0.72);
}

function drawOcean() {
	oceanLayer.clear();
	drawBands(oceanLayer, 0, 380, 1300, 320, [
		[0x35b9e6, 1],
		[0x25a6d6, 1],
		[0x178ec6, 1],
		[0x116fa8, 1],
		[0x0c5489, 1]
	]);

	oceanLayer.beginFill(0xffffff, 0.06);
	oceanLayer.drawRect(0, 378, 1300, 10);
	oceanLayer.endFill();
}

function drawIsland() {
	islandLayer.clear();

	islandLayer.beginFill(0x133f39, 0.2);
	islandLayer.drawEllipse(654, 560, 500, 160);
	islandLayer.endFill();

	islandLayer.beginFill(0xefd39a, 1);
	islandLayer.lineStyle(4, 0xfff0c8, 0.62);
	islandLayer.drawEllipse(650, 564, 500, 152);
	islandLayer.endFill();

	islandLayer.beginFill(0xd3a85f, 0.82);
	islandLayer.drawEllipse(650, 570, 440, 122);
	islandLayer.endFill();

	islandLayer.beginFill(0x3ea556, 1);
	islandLayer.drawEllipse(650, 522, 360, 100);
	islandLayer.endFill();

	islandLayer.beginFill(0x2d8a45, 0.76);
	islandLayer.drawEllipse(640, 512, 250, 54);
	islandLayer.endFill();

	islandLayer.beginFill(0xfff6db, 0.95);
	for (var i = 0; i < 20; i++) {
		var angle = (i / 20) * Math.PI * 2;
		var rx = 650 + Math.cos(angle) * 230;
		var ry = 562 + Math.sin(angle) * 68;
		islandLayer.drawCircle(rx, ry, 18 + (i % 4));
	}
	islandLayer.endFill();

	islandLayer.beginFill(0xe7b867, 0.8);
	islandLayer.drawCircle(460, 606, 28);
	islandLayer.drawCircle(515, 622, 18);
	islandLayer.drawCircle(850, 610, 25);
	islandLayer.drawCircle(905, 628, 17);
	islandLayer.endFill();
}

function createPalms() {
	createPalmTree(460, 541, -1, 1.06);
	createPalmTree(835, 546, 1, 1.12);
	createPalmTree(675, 530, 0.25, 0.82);
}

function createPalmTree(rootX, rootY, lean, scale) {
	var trunk = game.add.sprite(rootX, rootY, trunkTexture);
	trunk.anchor.set(0.26, 0.98);
	trunk.scale.setTo(scale, scale);
	trunk.angle = lean * 14;

	var crownX = rootX + lean * 34 * scale;
	var crownY = rootY - 188 * scale;
	var leafSpecs = [-120, -86, -46, -8, 30, 70, 112];
	var leaves = [];

	for (var i = 0; i < leafSpecs.length; i++) {
		var leaf = game.add.sprite(crownX, crownY, leafTexture);
		leaf.anchor.set(0.08, 0.52);
		leaf.scale.setTo(scale * (0.86 + i * 0.02), scale * (0.82 + i * 0.01));
		leaf.rotation = Phaser.Math.degToRad(leafSpecs[i] + lean * 10);
		leaf.tint = i % 2 === 0 ? 0x39be61 : 0x2f9f54;
		leaves.push({
			spr: leaf,
			base: leafSpecs[i],
			sway: 6 + i,
			phase: i * 0.77 + scale
		});
	}

	var coconuts = [];
	for (var c = 0; c < 3; c++) {
		var nut = game.add.sprite(crownX + (c - 1) * 12, crownY + 10 + (c % 2) * 5, coconutTexture);
		nut.anchor.set(0.5);
		nut.scale.setTo(scale * 0.42, scale * 0.42);
		nut.rotation = (c - 1) * 0.18;
		coconuts.push({
			spr: nut,
			ox: (c - 1) * 12,
			oy: 10 + (c % 2) * 5
		});
	}

	var tree = {
		trunk: trunk,
		leaves: leaves,
		coconuts: coconuts,
		crownX: crownX,
		crownY: crownY,
		lean: lean,
		scale: scale,
		phase: scale * 2.4
	};

	palms.push(tree);
	return tree;
}

function updatePalms() {
	for (var i = 0; i < palms.length; i++) {
		var tree = palms[i];
		if (!tree.leaves) {
			continue;
		}

		var sway = Math.sin(tide * 0.018 + tree.phase) * 5.5 * tree.scale;
		var trunkSway = Math.sin(tide * 0.012 + tree.phase) * 2.2 * tree.scale;
		tree.trunk.angle = tree.lean * 14 + trunkSway;

		for (var j = 0; j < tree.leaves.length; j++) {
			var leaf = tree.leaves[j];
			leaf.spr.rotation = Phaser.Math.degToRad(leaf.base + sway + Math.sin(tide * 0.025 + leaf.phase) * leaf.sway);
		}

		for (var k = 0; k < tree.coconuts.length; k++) {
			var nut = tree.coconuts[k];
			nut.spr.x = tree.crownX + nut.ox + Math.sin(tide * 0.02 + k + tree.phase) * 2;
			nut.spr.y = tree.crownY + nut.oy + Math.cos(tide * 0.02 + k + tree.phase) * 2;
			nut.spr.rotation += 0.0025;
		}
	}
}

function updateWaves() {
	waveLayer.clear();

	for (var row = 0; row < 12; row++) {
		var y = 396 + row * 22;
		var alpha = 0.12 - row * 0.008;
		var amplitude = 3 + row * 0.25;
		var speed = 0.015 + row * 0.002;

		waveLayer.lineStyle(1, 0xeefcff, Math.max(0.02, alpha));
		waveLayer.moveTo(0, y);
		for (var x = 0; x <= 1300; x += 26) {
			var waveY = y + Math.sin(x * speed + tide * 0.045 + row * 0.8) * amplitude;
			waveLayer.lineTo(x, waveY);
		}
	}

	waveLayer.lineStyle(2, 0xfff0cf, 0.48);
	waveLayer.moveTo(220, 560);
	for (var x2 = 0; x2 <= 1300; x2 += 18) {
		var foamY = 560 + Math.sin(x2 * 0.03 + tide * 0.08) * 5 + Math.cos(x2 * 0.011 + seaLight) * 1.8;
		waveLayer.lineTo(x2, foamY);
	}

	waveLayer.lineStyle(1, 0xffffff, 0.12);
	for (var ring = 0; ring < 4; ring++) {
		waveLayer.drawEllipse(650, 560, 240 + ring * 35, 56 + ring * 10);
	}
}

function spawnCoconuts() {
	var digit = piDigits[piIndex % piDigits.length];
	var interval = 12 + digit * 4;

	if (spawnTimer < interval) {
		return;
	}

	spawnTimer = 0;
	piIndex = (piIndex + 1) % piDigits.length;

	var sourcePalm = palms[piIndex % palms.length];
	var fromLeft = digit % 2 === 0;
	var spawnX = sourcePalm.crownX + (fromLeft ? -12 : 12);
	var spawnY = sourcePalm.crownY + 12;
	var coconut = game.add.sprite(spawnX, spawnY, coconutTexture);
	coconut.anchor.set(0.5);
	var scale = 0.42 + digit * 0.035;
	coconut.scale.setTo(scale, scale);
	coconut.rotation = (fromLeft ? -0.7 : 0.7) + digit * 0.03;
	coconut.tint = digit < 3 ? 0x75441f : 0x845028;

	coconuts.push({
		sprite: coconut,
		vx: fromLeft ? -1.2 - digit * 0.06 : 1.0 + digit * 0.07,
		vy: -1.9 - digit * 0.03,
		gravity: 0.045 + digit * 0.003,
		bob: 8 + digit,
		phase: tide * 0.05 + digit,
		spin: fromLeft ? -0.025 : 0.025,
		life: 0,
		landingY: 520 + digit * 4
	});
}

function updateCoconuts() {
	for (var i = coconuts.length - 1; i >= 0; i--) {
		var nut = coconuts[i];
		nut.life += 1;
		nut.vy += nut.gravity;
		nut.sprite.x += nut.vx;
		nut.sprite.y += nut.vy;
		nut.sprite.rotation += nut.spin;

		if (nut.sprite.y >= nut.landingY) {
			nut.sprite.y = nut.landingY;
			nut.vy *= -0.18;
			nut.vx *= 0.992;
			nut.spin *= 0.98;
		}

		nut.sprite.y += Math.sin(nut.life * 0.09 + nut.phase) * 0.35;
		nut.sprite.x += Math.cos(nut.life * 0.06 + nut.phase) * 0.08;

		if (nut.sprite.x > 1410 || nut.sprite.x < -110 || nut.sprite.y > 760) {
			nut.sprite.destroy();
			coconuts.splice(i, 1);
		}
	}
}

function drawBands(layer, x, y, width, height, colors) {
	var bandHeight = height / colors.length;
	for (var i = 0; i < colors.length; i++) {
		layer.beginFill(colors[i][0], colors[i][1]);
		layer.drawRect(x, y + i * bandHeight, width, bandHeight + 1);
		layer.endFill();
	}
}

function drawBird(layer, x, y, scale) {
	layer.lineStyle(4, 0x1e4b64, 0.35);
	layer.moveTo(x - 14 * scale, y);
	layer.lineTo(x - 2 * scale, y - 8 * scale);
	layer.lineTo(x + 12 * scale, y);
	layer.moveTo(x + 12 * scale, y);
	layer.lineTo(x + 26 * scale, y - 8 * scale);
	layer.lineTo(x + 38 * scale, y);
}
	</script>
</head>
<body>
	<div id="PIclouds"></div>
</body>
</html>
