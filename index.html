<!DOCTYPE html>
<html>
<head>
	<title>Nuages de Pi</title>
	<link href="stylesheet.css" rel="stylesheet">
	<meta charset="utf-8"/>
	<script type="text/javascript" src="phaser.min.js"></script>
	<style>
		#theme-switcher {
			position: fixed;
			bottom: 24px;
			right: 24px;
			z-index: 100;
			display: flex;
			flex-direction: column;
			gap: 8px;
			align-items: flex-end;
		}
		#theme-panel {
			display: flex;
			gap: 10px;
			background: rgba(0,0,0,0.25);
			border-radius: 14px;
			padding: 10px 14px;
			backdrop-filter: blur(6px);
			border: 1px solid rgba(255,255,255,0.15);
		}
		.theme-btn {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 5px;
			cursor: pointer;
			user-select: none;
		}
		.theme-swatch {
			width: 36px;
			height: 36px;
			border-radius: 50%;
			border: 2.5px solid rgba(255,255,255,0.3);
			transition: all 0.2s ease;
			box-shadow: 0 2px 8px rgba(0,0,0,0.3);
		}
		.theme-btn:hover .theme-swatch {
			border-color: rgba(255,255,255,0.8);
			transform: scale(1.1);
		}
		.theme-btn.active .theme-swatch {
			border-color: #fff;
			border-width: 3px;
			transform: scale(1.12);
			box-shadow: 0 2px 14px rgba(255,255,255,0.4);
		}
		.theme-label {
			font-family: 'Helvetica Neue', Arial, sans-serif;
			font-size: 9px;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 1.2px;
			color: rgba(255,255,255,0.7);
			transition: color 0.2s ease;
		}
		.theme-btn.active .theme-label {
			color: #fff;
		}
		#theme-hint {
			font-family: 'Helvetica Neue', Arial, sans-serif;
			font-size: 9px;
			color: rgba(255,255,255,0.35);
			text-align: right;
			letter-spacing: 0.5px;
			padding-right: 4px;
		}
		#theme-toast {
			position: fixed;
			top: 24px;
			left: 50%;
			transform: translateX(-50%) translateY(-40px);
			background: rgba(0,0,0,0.5);
			color: rgba(255,255,255,0.9);
			font-family: 'Helvetica Neue', Arial, sans-serif;
			font-size: 12px;
			font-weight: 600;
			letter-spacing: 2px;
			text-transform: uppercase;
			padding: 8px 20px;
			border-radius: 20px;
			backdrop-filter: blur(6px);
			border: 1px solid rgba(255,255,255,0.2);
			transition: transform 0.3s ease, opacity 0.3s ease;
			opacity: 0;
			pointer-events: none;
			z-index: 101;
		}
		#theme-toast.show {
			transform: translateX(-50%) translateY(0);
			opacity: 1;
		}
	</style>
	<script>
// ─── Theme Definitions ───────────────────────────────────────────────────────
//
// PIXI tint is a multiplicative blend: finalColor = srcColor × tintColor / 255
// Source images are sky-blue gradients, so tinting with dark/warm/grey colors
// shifts the whole palette convincingly.
//
var themes = {
	day: {
		name: "Day",
		key: "1",
		stageColor: "#4488AA",
		bodyColor: "rgb(67,169,223)",
		fondTint:   0xFFFFFF,   // no shift — original bright sky
		fond2Tint:  0xDDEEFF,   // very slight cool tint for reflection
		cloudTint:  0xFFFFFF,   // pure white clouds
		fond2Alpha: 0.90,
		swatch:     "#4488AA"
	},
	dusk: {
		name: "Dusk",
		key: "2",
		stageColor: "#553355",
		bodyColor:  "rgb(140,70,130)",
		fondTint:   0xFF99CC,   // pink: blue sky → purple-pink gradient
		fond2Tint:  0xCC5599,   // deeper pink for the water reflection
		cloudTint:  0xFFDDEE,   // pale blush clouds
		fond2Alpha: 0.85,
		swatch:     "linear-gradient(135deg, #FF99CC, #CC5599)"
	},
	night: {
		name: "Night",
		key: "3",
		stageColor: "#050A18",
		bodyColor:  "rgb(8,15,35)",
		fondTint:   0x1A2B55,   // near-black deep blue — darkens sky dramatically
		fond2Tint:  0x0D1A33,   // even deeper for the abyss-like reflection
		cloudTint:  0x5566AA,   // muted indigo clouds lit by moonlight
		fond2Alpha: 0.97,
		swatch:     "linear-gradient(135deg, #1A2B55, #050A18)"
	},
	storm: {
		name: "Storm",
		key: "4",
		stageColor: "#1E2530",
		bodyColor:  "rgb(38,48,65)",
		fondTint:   0x778899,   // cool blue-grey desaturates the sky
		fond2Tint:  0x445566,   // darker grey-blue reflection
		cloudTint:  0xAABBCC,   // heavy, grey cloud mass
		fond2Alpha: 0.97,
		swatch:     "linear-gradient(135deg, #778899, #1E2530)"
	}
};

var currentThemeName = 'day';

function applyTheme(themeName) {
	currentThemeName = themeName;
	var theme = themes[themeName];

	// Stage background
	if (typeof game !== 'undefined' && game.stage) {
		game.stage.backgroundColor = theme.stageColor;
	}
	// Body fallback background
	document.body.style.backgroundColor = theme.bodyColor;

	// Background tile sprites
	if (typeof fond !== 'undefined' && fond) {
		fond.tint = theme.fondTint;
	}
	if (typeof fond2 !== 'undefined' && fond2) {
		fond2.tint  = theme.fond2Tint;
		fond2.alpha = theme.fond2Alpha;
	}

	// Existing cloud sprites
	for (var i = 0; i < nuages.length; i++) {
		if (nuages[i] && nuages[i].game) nuages[i].tint = theme.cloudTint;
	}
	for (var i = 0; i < nuages2.length; i++) {
		if (nuages2[i] && nuages2[i].game) nuages2[i].tint = theme.cloudTint;
	}

	// Sync UI buttons
	document.querySelectorAll('.theme-btn').forEach(function(btn) {
		btn.classList.toggle('active', btn.dataset.theme === themeName);
	});

	// Brief toast notification
	showToast(theme.name);
}

function showToast(name) {
	var toast = document.getElementById('theme-toast');
	if (!toast) return;
	toast.textContent = name;
	toast.classList.add('show');
	clearTimeout(toast._timer);
	toast._timer = setTimeout(function() { toast.classList.remove('show'); }, 1400);
}

// Keyboard shortcuts 1–4
document.addEventListener('keydown', function(e) {
	if (e.key === '1') applyTheme('day');
	else if (e.key === '2') applyTheme('dusk');
	else if (e.key === '3') applyTheme('night');
	else if (e.key === '4') applyTheme('storm');
});

// ─── Game ─────────────────────────────────────────────────────────────────────
var game = new Phaser.Game(1300, 700, Phaser.CANVAS, 'PIclouds', { preload: preload, create: create, update: update }, false, false);
var nuages = []; var densityDivider = 4; var velocityDivider = 0.6;
var nuages2 = []; var field; var fond; var fond2;
var nn = 0; var jj = 0; var sum = 0; var lock = 0;
var decimal = -1;
var pi = [3,1,4,1,5,9,2,6,5,3,5,8,9,7,9,3,2,3,8,4,6,2,6,4,3,3,8,3,2,7,9,5,0,2,8,8,4,1,9,7,1,6,9,3,9,9,3,7,5,1,0,5,8,2,0,9,7,4,9,4,4,5,9,2,3,0,7,8,1,6,4,0,6,2,8,6,2,0,8,9,9,8,6,2,8,0,3,4,8,2,5,3,4,2,1,1,7,0,6,7,9,8,2,1,4,8,0,8,6,5,1,3,2,8,2,3,0,6,6,4,7,0,9,3,8,4,4,6,0,9,5,5,0,5,8,2,2,3,1,7,2,5,3,5,9,4,0,8,1,2,8,4,8,1,1,1,7,4,5,0,2,8,4,1,0,2,7,0,1,9,3,8,5,2,1,1,0,5,5,5,9,6,4,4,6,2,2,9,4,8,9,5,4,9,3,0,3,8,1,9,6,4,4,2,8,8,1,0,9,7,5,6,6,5,9,3,3,4,4,6,1,2,8,4,7,5,6,4,8,2,3,3,7,8,6,7,8,3,1,6,5,2,7,1,2,0,1,9,0,9,1,4,5,6,4,8,5,6,6,9,2,3,4,6,0,3,4,8,6,1,0,4,5,4,3,2,6,6,4,8,2,1,3,3,9,3,6,0,7,2,6,0,2,4,9,1,4,1,2,7,3,7,2,4,5,8,7,0,0,6,6,0,6,3,1,5,5,8,8,1,7,4,8,8,1,5,2,0,9,2,0,9,6,2,8,2,9,2,5,4,0,9,1,7,1,5,3,6,4,3,6,7,8,9,2,5,9,0,3,6,0,0,1,1,3,3,0,5,3,0,5,4,8,8,2,0,4,6,6,5,2,1,3,8,4,1,4,6,9,5,1,9,4,1,5,1,1,6,0,9,4,3,3,0,5,7,2,7,0,3,6,5,7,5,9,5,9,1,9,5,3,0,9,2,1,8,6,1,1,7,3,8,1,9,3,2,6,1,1,7,9,3,1,0,5,1,1,8,5,4,8,0,7,4,4,6,2,3,7,9,9,6,2,7,4,9,5,6,7,3,5,1,8,8,5,7,5,2,7,2,4,8,9,1,2,2,7,9,3,8,1,8,3,0,1,1,9,4,9,1,2,9,8,3,3,6,7,3,3,6,2,4,4,0,6,5,6,6,4,3,0,8,6,0,2,1,3,9,4,9,4,6,3,9,5,2,2,4,7,3,7,1,9,0,7,0,2,1,7,9,8,6,0,9,4,3,7,0,2,7,7,0,5,3,9,2,1,7,1,7,6,2,9,3,1,7,6,7,5,2,3,8,4,6,7,4,8,1,8,4,6,7,6,6,9,4,0,5,1,3,2,0,0,0,5,6,8,1,2,7,1,4,5,2,6,3,5,6,0,8,2,7,7,8,5,7,7,1,3,4,2,7,5,7,7,8,9,6,0,9,1,7,3,6,3,7,1,7,8,7,2,1,4,6,8,4,4,0,9,0,1,2,2,4,9,5,3,4,3,0,1,4,6,5,4,9,5,8,5,3,7,1,0,5,0,7,9,2,2,7,9,6,8,9,2,5,8,9,2,3,5,4,2,0,1,9,9,5,6,1,1,2,1,2,9,0,2,1,9,6,0,8,6,4,0,3,4,4,1,8,1,5,9,8,1,3,6,2,9,7,7,4,7,7,1,3,0,9,9,6,0,5,1,8,7,0,7,2,1,1,3,4,9,9,9,9,9,9,8,3,7,2,9,7,8,0,4,9,9,5,1,0,5,9,7,3,1,7,3,2,8,1,6,0,9,6,3,1,8,5,9,5,0,2,4,4,5,9,4,5,5,3,4,6,9,0,8,3,0,2,6,4,2,5,2,2,3,0,8,2,5,3,3,4,4,6,8,5,0,3,5,2,6,1,9,3,1,1,8,8,1,7,1,0,1,0,0,0,3,1,3,7,8,3,8,7,5,2,8,8,6,5,8,7,5,3,3,2,0,8,3,8,1,4,2,0];

function randInt(min, max) {
	return Math.floor(Math.random() * (max - min + 1)) + min;
}

for (var i = 0; i<10000; i++) {
	pi.push(randInt(0,9));
}

var timer = 0;

function sleep(milliseconds) {
	var start = new Date().getTime();
	for (var i = 0; i < 1e7; i++) {
		if ((new Date().getTime() - start) > milliseconds){
		 break;
		}
	}
}
function preload() {
	game.load.image('nuage','nuage.png');
	game.load.image('nuage2','nuage2.png');
	game.load.image('field','field.png');
	game.load.image('fond','fond.png');
	game.load.image('fond2','fond2.png');
}
function create() {
	game.time.desiredFps = 30;

	var t = themes[currentThemeName];
	game.stage.backgroundColor = t.stageColor;

	fond = game.add.tileSprite(0, 0, 1300, 400, 'fond');
	fond.tint = t.fondTint;

	fond2 = game.add.tileSprite(0, 400, 1300, 300, 'fond2');
	fond2.tint  = t.fond2Tint;
	fond2.alpha = t.fond2Alpha;

	order0 = game.add.group();
	order1 = game.add.group();
	order2 = game.add.group();
	order3 = game.add.group();
	order4 = game.add.group();
	order5 = game.add.group();
	order6 = game.add.group();
	order7 = game.add.group();
	order8 = game.add.group();
	order9 = game.add.group();
}
function update() {

	timer++;

	if (timer > (pi[decimal+1])*densityDivider) {

		decimal++;
		timer = 0;

		var t = themes[currentThemeName];

		nuages.push(game.add.tileSprite(-200, 400-(pi[decimal]*34-15), 768, 312, 'nuage'));
		nuages[decimal].anchor.x = 0.7;
		nuages[decimal].anchor.y = 0.5;
		nuages[decimal].scale.setTo((pi[decimal])/10, (pi[decimal])/10);
		nuages[decimal].alpha = 0.99;
		nuages[decimal].tint  = t.cloudTint;

		nuages2.push(game.add.tileSprite(-200, 400+(pi[decimal]*34-15), 768, 312, 'nuage2'));
		nuages2[decimal].anchor.x = 0.7;
		nuages2[decimal].anchor.y = 0.5;
		nuages2[decimal].scale.setTo((pi[decimal])/10, (pi[decimal])/10);
		nuages2[decimal].tint  = t.cloudTint;

		switch(pi[decimal]) {
		case 0:
			order0.add(nuages[decimal]);
			order0.add(nuages2[decimal]);
			break;
		case 1:
			order1.add(nuages[decimal]);
			order1.add(nuages2[decimal]);
			break;
		case 2:
			order2.add(nuages[decimal]);
			order2.add(nuages2[decimal]);
			break;
		case 3:
			order3.add(nuages[decimal]);
			order3.add(nuages2[decimal]);
			break;
		case 4:
			order4.add(nuages[decimal]);
			order4.add(nuages2[decimal]);
			break;
		case 5:
			order5.add(nuages[decimal]);
			order5.add(nuages2[decimal]);
			break;
		case 6:
			order6.add(nuages[decimal]);
			order6.add(nuages2[decimal]);
			break;
		case 7:
			order7.add(nuages[decimal]);
			order7.add(nuages2[decimal]);
			break;
		case 8:
			order8.add(nuages[decimal]);
			order8.add(nuages2[decimal]);
			break;
		case 9:
			order9.add(nuages[decimal]);
			order9.add(nuages2[decimal]);
			break;
		}
	}

	while (jj <= decimal ) {
		if (nuages[jj].x > 1800) {
			nuages[jj].destroy();
		}
		nuages[jj].x += (pi[jj])/Math.abs(velocityDivider);
		nuages2[jj].x += (pi[jj])/Math.abs(velocityDivider);
		jj++;
	}
	jj = 0;

	game.world.bringToTop(order0);
	game.world.bringToTop(order1);
	game.world.bringToTop(order2);
	game.world.bringToTop(order3);
	game.world.bringToTop(order4);
	game.world.bringToTop(order5);
	game.world.bringToTop(order6);
	game.world.bringToTop(order7);
	game.world.bringToTop(order8);
	game.world.bringToTop(order9);
	fond2.bringToTop();
}
  </script>
</head>
<body style="background-color: rgb(67,169,223);">
	<div id="game" style="
		cursor: none;
		position: absolute;
		TOP: 0px;
		LEFT: 0px;
		image-rendering: optimizeSpeed;
		image-rendering: -moz-crisp-edges;
		image-rendering: -o-crisp-edges;
		image-rendering: -webkit-optimize-contrast;
		image-rendering: optimize-contrast;
		-ms-interpolation-mode: nearest-neighbor;
		image-rendering : pixelated;">
	</div>

	<!-- Theme toast notification -->
	<div id="theme-toast"></div>

	<!-- Theme switcher overlay -->
	<div id="theme-switcher">
		<div id="theme-panel">

			<div class="theme-btn active" data-theme="day" onclick="applyTheme('day')" title="Day — press 1">
				<div class="theme-swatch" style="background: #4488AA;"></div>
				<span class="theme-label">Day</span>
			</div>

			<div class="theme-btn" data-theme="dusk" onclick="applyTheme('dusk')" title="Dusk — press 2">
				<div class="theme-swatch" style="background: linear-gradient(135deg, #FF99CC, #CC5599);"></div>
				<span class="theme-label">Dusk</span>
			</div>

			<div class="theme-btn" data-theme="night" onclick="applyTheme('night')" title="Night — press 3">
				<div class="theme-swatch" style="background: linear-gradient(135deg, #1A2B55, #050A18);"></div>
				<span class="theme-label">Night</span>
			</div>

			<div class="theme-btn" data-theme="storm" onclick="applyTheme('storm')" title="Storm — press 4">
				<div class="theme-swatch" style="background: linear-gradient(135deg, #778899, #1E2530);"></div>
				<span class="theme-label">Storm</span>
			</div>

		</div>
		<div id="theme-hint">keys 1 – 4</div>
	</div>
</body>
</html>
