// Pentatonic scale spanning 2 octaves — digit 0 → C4, digit 9 → A5
var noteFreqs = [261.63, 293.66, 329.63, 392.00, 440.00,
                 523.25, 587.33, 659.25, 783.99, 880.00];

function initAudio() {
    if (audioCtx) return;
    try {
        audioCtx     = new (window.AudioContext || window.webkitAudioContext)();
        audioEnabled = true;
        audioHint.text = '\u266a sound on';
        game.add.tween(audioHint).to({ alpha: 0 }, 1200,
            Phaser.Easing.Linear.None, true, 700);
    } catch (e) {
        if (audioHint) audioHint.text = 'audio n/a';
    }
}

function playDigitNote(digit) {
    if (!audioEnabled || !audioCtx) return;
    if (digit < 0 || digit > 9) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();

    var t    = audioCtx.currentTime;
    var freq = noteFreqs[digit];
    // Louder for higher digits (bigger, faster clouds)
    var vol  = 0.04 + digit * 0.022;

    // Fundamental sine — long, airy decay
    var o1 = audioCtx.createOscillator();
    var g1 = audioCtx.createGain();
    o1.type = 'sine';
    o1.frequency.setValueAtTime(freq, t);
    g1.gain.setValueAtTime(0, t);
    g1.gain.linearRampToValueAtTime(vol, t + 0.06);
    g1.gain.exponentialRampToValueAtTime(0.001, t + 2.0);
    o1.connect(g1);
    g1.connect(audioCtx.destination);
    o1.start(t);
    o1.stop(t + 2.0);

    // Octave harmonic for warmth
    var o2 = audioCtx.createOscillator();
    var g2 = audioCtx.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(freq * 2, t);
    g2.gain.setValueAtTime(0, t);
    g2.gain.linearRampToValueAtTime(vol * 0.18, t + 0.04);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
    o2.connect(g2);
    g2.connect(audioCtx.destination);
    o2.start(t);
    o2.stop(t + 0.9);

    // Light up the matching key
    activeKeyTimer[digit] = KEY_LIT_FRAMES;
}

function drawKeyboard() {
    keyGfx.clear();

    // Subtle separator line above the strip
    keyGfx.lineStyle(1, 0x00FFCC, 0.18);
    keyGfx.moveTo(KX0 - 8, KY - 8);
    keyGfx.lineTo(KX0 + 10 * (KW + KGAP) - KGAP + 8, KY - 8);

    for (var i = 0; i < 10; i++) {
        var x   = KX0 + i * (KW + KGAP);
        var lit = activeKeyTimer[i] > 0;

        // Glow halo behind lit key – bioluminescent cyan pulse
        if (lit) {
            keyGfx.lineStyle(0);
            keyGfx.beginFill(0x00FFCC, 0.28);
            keyGfx.drawRoundedRect(x - 5, KY - 5, KW + 10, KH + 10, 9);
            keyGfx.endFill();
        }

        // Key body
        keyGfx.lineStyle(1, 0x003355, 0.55);
        if (lit) {
            keyGfx.beginFill(0x00DDCC, 0.97);
        } else if (i % 2 === 1) {
            keyGfx.beginFill(0x003044, 0.72);   // alternate dark shade
        } else {
            keyGfx.beginFill(0x004055, 0.72);
        }
        keyGfx.drawRoundedRect(x, KY, KW, KH, 5);
        keyGfx.endFill();

        // Update label colour to match key state
        keyLabels[i].fill = lit ? '#001122' : '#00AACC';
        if (activeKeyTimer[i] > 0) activeKeyTimer[i]--;
    }
}

function playDigitNote(digit) {
	if (!soundEnabled || !audioCtx) return;

	var freq     = noteFreqs[digit];
	var volume   = 0.04 + digit * 0.018;   // 0.04–0.202
	var duration = 0.4  + digit * 0.07;    // 0.4–1.03 s

	var osc  = audioCtx.createOscillator();
	var gain = audioCtx.createGain();

	osc.type = 'sine';
	osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

	gain.gain.setValueAtTime(volume, audioCtx.currentTime);
	gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

	osc.connect(gain);
	gain.connect(audioCtx.destination);

	osc.start(audioCtx.currentTime);
	osc.stop(audioCtx.currentTime + duration);
}

function getDayNightTint(phase) {
	var n  = tintStops.length;
	var sc = phase * n;
	var i  = Math.floor(sc) % n;
	var j  = (i + 1) % n;
	var t  = sc - Math.floor(sc);
	return {
		r: Math.floor(lerp(tintStops[i].r, tintStops[j].r, t)),
		g: Math.floor(lerp(tintStops[i].g, tintStops[j].g, t)),
		b: Math.floor(lerp(tintStops[i].b, tintStops[j].b, t))
	};
}

	var maxCount = 1;
	for (var i = 0; i < 10; i++) {

	// Dashed reference line at the "expected" equal-share height

		histGfx.lineStyle(1, 0x00FFCC, 0.38);

	histGfx.lineStyle(0);
	for (var d = 0; d < 10; d++) {

// Returns a new shooting-star object by consuming 6 Pi digits
function spawnShootingStar() {
	var i  = shootingStarPiIdx % (pi.length - 10);
	var px = pi[i];      // x-seed
	var py = pi[i + 1];  // y-seed
	var pa = pi[i + 2];  // angle   (0–9)
	var ps = pi[i + 3];  // speed   (0–9)
	var pl = pi[i + 4];  // life    (0–9)
	var pd = pi[i + 5];  // direction: 0–4 left, 5–9 right
	shootingStarPiIdx += 6;

	var startX = (px * 137 + i * 11) % 1300;
	var startY = 15 + py * 22;              // 15–213 px from top of sky
	var angle  = 0.28 + pa / 30.0;         // ~16° – ~46° below horizontal
	var speed  = 12 + ps * 3.0;            // 12–39 px/frame
	var dir    = (pd >= 5) ? 1 : -1;       // rightward or leftward
	return {
		x: startX, y: startY,
		dx: Math.cos(angle) * speed * dir,
		dy: Math.sin(angle) * speed,        // positive = downward in canvas
		trail: [],
		life: 0,
		maxLife: 13 + (pl % 7)             // 13–19 frames ≈ 0.4–0.6 s at 30 fps
	};
}

function buildBolt(pidx) {
	boltPoints = [];
	var startX = (pi[pidx % pi.length] * 130 + pi[(pidx + 1) % pi.length] * 13) % 1200 + 50;
	var x = startX, y = 0;
	boltPoints.push({ x: x, y: y });
	var numSegs = 7 + (pi[pidx % pi.length] % 5);   // 7–11 segments
	for (var s = 0; s < numSegs; s++) {
		y += Math.floor(360 / numSegs);
		x += (pi[(pidx + s + 2) % pi.length] - 4) * 22;   // zigzag ±88 px
		x = Math.max(20, Math.min(1280, x));                // clamp to canvas
		boltPoints.push({ x: x, y: y });
	}
}

function drawBolt() {
	lightningGraphics.clear();
	if (boltPoints.length < 2) { return; }
	// Electric eel glow — thick soft cyan halo
	lightningGraphics.lineStyle(5, 0x00EEFF, 0.35);
	lightningGraphics.moveTo(boltPoints[0].x, boltPoints[0].y);
	for (var k = 1; k < boltPoints.length; k++) {
		lightningGraphics.lineTo(boltPoints[k].x, boltPoints[k].y);
	}
	// Core pass — thin bright cyan-white
	lightningGraphics.lineStyle(2, 0xCCFFFF, 1.0);
	lightningGraphics.moveTo(boltPoints[0].x, boltPoints[0].y);
	for (var k = 1; k < boltPoints.length; k++) {
		lightningGraphics.lineTo(boltPoints[k].x, boltPoints[k].y);
	}
}

function triggerLightning(pidx) {
	buildBolt(pidx);
	drawBolt();
	lightningTimer = LIGHTNING_FRAMES;
	flashAlpha = Math.max(flashAlpha, 0.55);
}
// ──────────────────────────────────────────────────────────────────────────

function spawnRain() {  // bioluminescent plankton bloom triggered by digit 0
	var NUM_DROPS = 28;
	var centreX   = 60 + Math.random() * 1180;
	var centreY   = 280 + Math.random() * 100;   // start mid-lower, drift upward
	var BLOOM_COLORS = [0x00FFD4, 0x00CCFF, 0x80FFE0, 0xCC88FF, 0x00FFAA];
	for (var d = 0; d < NUM_DROPS; d++) {
		var vy = -(0.4 + Math.random() * 1.2);   // upward drift
		rainDrops.push({
			x:       centreX + (Math.random() - 0.5) * 380,
			y:       centreY + Math.random() * 60,
			vx:      -0.4 + Math.random() * 0.8,
			vy:      vy,
			alpha:   0.55 + Math.random() * 0.45,
			len:     2 + Math.random() * 3,       // small glowing dot size
			life:    0,
			maxLife: Math.floor(350 / Math.abs(vy)) + 20,
			color:   BLOOM_COLORS[Math.floor(Math.random() * BLOOM_COLORS.length)]
		});
	}
}
// =====================================================================

function preload() {
	game.load.image('nuage','nuage.png');
	game.load.image('nuage2','nuage2.png');
	game.load.image('field','field.png');
	game.load.image('fond','fond.png');
	game.load.image('fond2','fond2.png');
}

function create() {
	game.time.desiredFps = 30;
	game.stage.backgroundColor = "#040B1E";
	fond = game.add.tileSprite(0, 0, 1300, 400, 'fond');

	// Bioluminescent plankton layer – drawn once, always glowing in deep ocean
	starsLayer = game.add.graphics(0, 0);
	var PLANKTON_COLORS = [0x00FFD4, 0x00CCFF, 0x80FFE0, 0xCC88FF, 0x00FFAA, 0x40E8FF];
	for (var s = 0; s < 150; s++) {
		var px       = s * 3;
		var sx       = (pi[px] * 130 + pi[px+1] * 13 + pi[px+2] * 7) % 1300;
		var sy       = (pi[px] * 33  + pi[px+1] * 4  + 5)             % 330;
		var starSize = (pi[px] % 2) + 1;           // radius 1 or 2 px
		var starAlpha = 0.35 + (pi[px+2] / 14.0); // 0.35 – 0.99
		var pColor = PLANKTON_COLORS[pi[px+1] % PLANKTON_COLORS.length];
		starsLayer.beginFill(pColor, starAlpha * 0.4);   // soft halo
		starsLayer.drawCircle(sx, sy, (starSize + 1) * 2);
		starsLayer.endFill();
		starsLayer.beginFill(pColor, starAlpha);          // bright core
		starsLayer.drawCircle(sx, sy, starSize);
		starsLayer.endFill();
	}
	starsLayer.alpha = 0.85; // bioluminescent plankton always visible

	// Shooting star trails sit above the star-dot layer
	shootingStarGfx = game.add.graphics(0, 0);

	// Celestial layer: sun during day, moon during night (behind clouds)
	celestialLayer = game.add.graphics(0, 0);

	fond2 = game.add.tileSprite(0, 400, 1300, 300, 'fond2');
	fond2.alpha = 0.9;

	order0 = game.add.group();
	order1 = game.add.group();
	order2 = game.add.group();
	order3 = game.add.group();
	order4 = game.add.group();
	order5 = game.add.group();
	order6 = game.add.group();
	order7 = game.add.group();
	order8 = game.add.group();
	order9 = game.add.group();

	// ── Keyboard HUD ──────────────────────────────────────────
	uiGroup = game.add.group();
	keyGfx  = game.add.graphics(0, 0, uiGroup);

	for (var ki = 0; ki < 10; ki++) {
		var kx  = KX0 + ki * (KW + KGAP) + Math.floor(KW / 2);
		var lbl = game.add.text(kx, KY + 9, ki + '\n' + noteNames[ki], {
			font:  'bold 10px monospace',
			fill:  '#335577',
			align: 'center'
		}, uiGroup);
		lbl.anchor.setTo(0.5, 0);
		keyLabels.push(lbl);
	}

	audioHint = game.add.text(1285, 10, '\u266a click for sound', {
		font:  '13px monospace',
		fill:  '#FFFFFF'
	}, uiGroup);
	audioHint.anchor.setTo(1, 0);

	// Pi digit counter – top-left, shows current index and value in real time
	piCounterText = game.add.text(8, 10, '\u03C0[0] = 3', {
		font:            'bold 14px monospace',
		fill:            '#ffffff',
		stroke:          '#001133',
		strokeThickness: 3
	}, uiGroup);

	game.input.onDown.add(initAudio);
	drawKeyboard();
	rainGraphics      = game.add.graphics(0, 0);
	lightningGraphics = game.add.graphics(0, 0);
	flashGraphics     = game.add.graphics(0, 0);

	// ── Histogram panel + digit labels ────────────────────────────────────
	histGfx = game.add.graphics(0, 0);
	for (var hd = 0; hd < 10; hd++) {
		var hlabel = game.add.text(
			HX + 7 + hd * (HBARW + HBARGAP) + Math.floor(HBARW / 2),
			HBARBASE + 2,
			'' + hd,
			{ font: 'bold 8px monospace', fill: DIGIT_CSS_COLORS[hd],
			  stroke: '#000000', strokeThickness: 1 }
		);
		hlabel.anchor.setTo(0.5, 0);
		histLabels.push(hlabel);
	}
	// ──────────────────────────────────────────────────────────────────────

	// Dark band at the very top behind the ticker
	tickerBgGfx = game.add.graphics(0, 0);
	tickerBgGfx.beginFill(0x000000, 0.42);
	tickerBgGfx.drawRect(0, 0, 1300, 28);
	tickerBgGfx.endFill();

	// Group for scrolling digit badges
	tickerGroup = game.add.group();

	// HUD: top-left Pi counter (inside the ticker band)
	hudText = game.add.text(8, TICKER_Y, '\u03C0[0] = 3', {
		font: 'bold 13px monospace',
		fill: '#FFFFFF',
		stroke: '#000000',
		strokeThickness: 2
	});
	hudText.anchor.setTo(0, 0.5);
	hudText.alpha = 0.85;
	// ──────────────────────────────────────────────────────────
}

function update() {

	// ── Day / Night Cycle ───────────────────────────────────────────────
	dayNightTimer++;
	var phase = (dayNightTimer % CYCLE_FRAMES) / CYCLE_FRAMES;
	var tint  = getDayNightTint(phase);
	currentTintHex = rgbToPhaser(tint.r, tint.g, tint.b);

	// Tint the sky and water backgrounds
	fond.tint  = currentTintHex;
	fond2.tint = currentTintHex;

	// Deep ocean: bioluminescence always active, gently pulsing with depth
	var nightAlpha = 0.35 + 0.25 * Math.sin(phase * Math.PI * 2);
	// Plankton layer pulses independently for a living-ocean feel
	starsLayer.alpha = 0.6 + 0.35 * Math.sin(phase * Math.PI * 4 + 0.8);

	// Stage background: always abyssal deep blue, slight variation
	var bgR = Math.floor(lerp(6,  3, nightAlpha));
	var bgG = Math.floor(lerp(14, 7, nightAlpha));
	var bgB = Math.floor(lerp(45, 25, nightAlpha));
	game.stage.backgroundColor = rgbToCSS(bgR, bgG, bgB);
	// ────────────────────────────────────────────────────────────────────

	// ── Shooting Stars (bioluminescent creatures — always active in deep ocean) ──
	shootingStarTimer++;
	var spawnInterval = (pi[shootingStarPiIdx % (pi.length - 10)] + 1) * 15;
	if (shootingStarTimer >= spawnInterval) {
		shootingStarTimer = 0;
		shootingStars.push(spawnShootingStar());
	}

	// Advance and draw every active shooting star
	shootingStarGfx.clear();
	for (var si = shootingStars.length - 1; si >= 0; si--) {
		var star = shootingStars[si];
		star.trail.push({ x: star.x, y: star.y });
		if (star.trail.length > 10) { star.trail.shift(); }
		star.x  += star.dx;
		star.y  += star.dy;
		star.life++;

		var fadeOut = Math.max(0, 1 - star.life / star.maxLife);
		var visible = fadeOut * nightAlpha;

		if (visible > 0.02 && star.trail.length > 1) {
			for (var ti = 1; ti < star.trail.length; ti++) {
				var progress = ti / star.trail.length;
				// Bioluminescent creature streak – soft cyan glow
				shootingStarGfx.lineStyle(4, 0x00EEDD, progress * visible * 0.35);
				shootingStarGfx.moveTo(star.trail[ti - 1].x, star.trail[ti - 1].y);
				shootingStarGfx.lineTo(star.trail[ti].x,     star.trail[ti].y);
				// Bright cyan-white core
				shootingStarGfx.lineStyle(1, 0x80FFF0, progress * visible * 0.95);
				shootingStarGfx.moveTo(star.trail[ti - 1].x, star.trail[ti - 1].y);
				shootingStarGfx.lineTo(star.trail[ti].x,     star.trail[ti].y);
			}
			// Bright head dot (no stroke)
			shootingStarGfx.lineStyle(0);
			shootingStarGfx.beginFill(0x00FFEE, visible);
			shootingStarGfx.drawCircle(star.x, star.y, 3);
			shootingStarGfx.endFill();
		}

		if (star.life >= star.maxLife ||
			star.x > 1400 || star.x < -100 ||
			star.y > 400  || star.y < -50) {
			shootingStars.splice(si, 1);
		}
	}
	// ─────────────────────────────────────────────────────────────────────────

	// ── Surface Light Shimmer ────────────────────────────────────────────────
	// Deep ocean: no sun or moon. A diffuse shimmer at the top simulates
	// sunlight filtering down through deep water above.
	celestialLayer.clear();

	// Broad ambient glow across the top — like the ocean surface above
	var shimmerBase = 0.06 + 0.04 * Math.sin(phase * Math.PI * 6);
	celestialLayer.beginFill(0x60D8F8, shimmerBase);
	celestialLayer.drawRect(0, 0, 1300, 90);
	celestialLayer.endFill();
	// Stronger luminous band right at the top edge
	celestialLayer.beginFill(0x90EEFF, shimmerBase * 0.9);
	celestialLayer.drawRect(0, 0, 1300, 28);
	celestialLayer.endFill();
	// Animated caustic light shafts drifting across
	var numShafts = 6;
	for (var ci = 0; ci < numShafts; ci++) {
		var shaftX = ((ci * 217 + phase * 500) % 1350) - 50;
		var shaftW = 40 + (pi[(ci * 7 + 80) % pi.length] % 5) * 18;
		var shaftA = shimmerBase * (0.5 + 0.5 * Math.sin(phase * Math.PI * 10 + ci * 2.1));
		celestialLayer.beginFill(0xBBF4FF, shaftA);
		celestialLayer.drawRect(shaftX, 0, shaftW, 55);
		celestialLayer.endFill();
	}
	// ─────────────────────────────────────────────────────────────────────────

	timer++;

	if (timer > (pi[decimal+1])*densityDivider) {

		decimal++;
		timer = 0;
		digitCounts[pi[decimal]]++;   // feed the frequency histogram
		nuages.push(game.add.tileSprite(-200, 400-(pi[decimal]*34-15), 768, 312, 'nuage'));
		nuages[decimal].anchor.x = 0.7;
		nuages[decimal].anchor.y = 0.5;
		nuages[decimal].scale.setTo((pi[decimal])/10, (pi[decimal])/10);
		nuages[decimal].alpha = 0.9;
		nuages2.push(game.add.tileSprite(-200, 400+(pi[decimal]*34-15), 768, 312, 'nuage2'));
		nuages2[decimal].anchor.x = 0.7;
		nuages2[decimal].anchor.y = 0.5;
		nuages2[decimal].scale.setTo((pi[decimal])/10, (pi[decimal])/10);
		nuages[decimal].alpha = 0.99;

		// Enable click-to-reveal on this cloud
		nuages[decimal].inputEnabled = true;
		nuages[decimal].piDigit     = pi[decimal];
		nuages[decimal].piIndex     = decimal;
		nuages[decimal].events.onInputDown.add(function(sprite) {
			showDigitPopup(sprite.x, sprite.y - 60, sprite.piDigit, sprite.piIndex);
		});

		// Push this digit onto the top ticker strip
		addTickerItem(pi[decimal]);

		// Play the note for this digit
		playDigitNote(pi[decimal]);

		// Update live Pi digit counter
		piCounterText.setText('\u03C0[' + decimal + '] = ' + pi[decimal]);

		switch(pi[decimal]) {
		case 0:
			order0.add(nuages[decimal]);
			order0.add(nuages2[decimal]);
			spawnRain();              // digit 0 → rain shower
			triggerLightning(decimal); // + Pi-seeded lightning bolt + flash
			break;
		case 1:
			order1.add(nuages[decimal]);
			order1.add(nuages2[decimal]);
			break;
		case 2:
			order2.add(nuages[decimal]);
			order2.add(nuages2[decimal]);
			break;
		case 3:
			order3.add(nuages[decimal]);
			order3.add(nuages2[decimal]);
			break;
		case 4:
			order4.add(nuages[decimal]);
			order4.add(nuages2[decimal]);
			break;
		case 5:
			order5.add(nuages[decimal]);
			order5.add(nuages2[decimal]);
			break;
		case 6:
			order6.add(nuages[decimal]);
			order6.add(nuages2[decimal]);
			break;
		case 7:
			order7.add(nuages[decimal]);
			order7.add(nuages2[decimal]);
			break;
		case 8:
			order8.add(nuages[decimal]);
			order8.add(nuages2[decimal]);
			break;
		case 9:
			order9.add(nuages[decimal]);
			order9.add(nuages2[decimal]);
			break;
		}
	}

	while (jj <= decimal ) {
		if (nuages[jj].x > 1800) {
			nuages[jj].destroy();
		}
		nuages[jj].x  += (pi[jj])/Math.abs(velocityDivider);
		nuages2[jj].x += (pi[jj])/Math.abs(velocityDivider);
		// Bioluminescent tint: each digit's hue at near-full vivid glow
		var ct = digitTint(pi[jj], Math.max(0, nightAlpha - 0.4));
		nuages[jj].tint  = ct;
		nuages2[jj].tint = ct;
		jj++;
	}
	jj = 0;

	// Place celestial layer above stars but below all cloud groups
	celestialLayer.bringToTop();

	// Scroll ticker items leftward; remove those that exit the canvas
	for (var ti = tickerItems.length - 1; ti >= 0; ti--) {
		tickerItems[ti].x -= 1.5;
		if (tickerItems[ti].x < -20) {
			tickerItems[ti].destroy();
			tickerItems.splice(ti, 1);
		}
	}

	// Refresh the Pi index counter in the HUD
	if (decimal >= 0) {
		hudText.setText('\u03C0[' + decimal + ']=' + pi[decimal]);
	}

	game.world.bringToTop(order0);
	game.world.bringToTop(order1);
	game.world.bringToTop(order2);
	game.world.bringToTop(order3);
	game.world.bringToTop(order4);
	game.world.bringToTop(order5);
	game.world.bringToTop(order6);
	game.world.bringToTop(order7);
	game.world.bringToTop(order8);
	game.world.bringToTop(order9);
	rainGraphics.bringToTop();   // rain in front of clouds
	fond2.bringToTop();          // ground always on top of rain

	// ── Ambient bioluminescent plankton (continuous gentle drift upward) ──
	if (Math.random() < 0.35) {
		var AMBIENT_COLORS = [0x00FFD4, 0x00CCFF, 0x80FFE0, 0xCC88FF, 0x00FFAA];
		var avy = -(0.3 + Math.random() * 0.8);
		rainDrops.push({
			x:       Math.random() * 1300,
			y:       380 + Math.random() * 15,
			vx:      -0.3 + Math.random() * 0.6,
			vy:      avy,
			alpha:   0.35 + Math.random() * 0.45,
			len:     1.2 + Math.random() * 2,
			life:    0,
			maxLife: Math.floor(420 / Math.abs(avy)) + 30,
			color:   AMBIENT_COLORS[Math.floor(Math.random() * AMBIENT_COLORS.length)]
		});
	}

	// ── Bioluminescent plankton rendering (upward drift, glowing dots) ────
	rainGraphics.clear();
	for (var ri = rainDrops.length - 1; ri >= 0; ri--) {
		var drop = rainDrops[ri];
		drop.x  += drop.vx;
		drop.y  += drop.vy;
		drop.life++;
		if (drop.life >= drop.maxLife || drop.y < -10) {
			rainDrops.splice(ri, 1);
			continue;
		}
		var fadeStart = drop.maxLife * 0.75;
		var dropAlpha = drop.alpha;
		if (drop.life > fadeStart) {
			dropAlpha *= 1 - (drop.life - fadeStart) / (drop.maxLife - fadeStart);
		}
		var pCol = drop.color || 0x00FFD4;
		// Soft outer halo
		rainGraphics.lineStyle(0);
		rainGraphics.beginFill(pCol, dropAlpha * 0.25);
		rainGraphics.drawCircle(drop.x, drop.y, drop.len + 2.5);
		rainGraphics.endFill();
		// Bright core dot
		rainGraphics.beginFill(pCol, dropAlpha);
		rainGraphics.drawCircle(drop.x, drop.y, drop.len * 0.6);
		rainGraphics.endFill();
	}
	// ─────────────────────────────────────────────────────────────────────
	// Ticker band sits above the water layer
	tickerBgGfx.bringToTop();
	tickerGroup.bringToTop();

	// Redraw keyboard and keep it on top of everything
	drawKeyboard();
	uiGroup.bringToTop();
	// HUD on the very top so it's always readable
	hudText.bringToTop();

	// ── Histogram: redraw and raise above everything ───────────────────────
	drawHistogram();
	histGfx.bringToTop();
	for (var hl = 0; hl < histLabels.length; hl++) {
		histLabels[hl].bringToTop();
	}
	// ──────────────────────────────────────────────────────────────────────

	// ── Lightning & Flash update ───────────────────────────────────────────
	if (lightningTimer > 0) {
		lightningTimer--;
		if (lightningTimer === 0) {
			lightningGraphics.clear();
		}
	}
	if (flashAlpha > 0) {
		flashAlpha = Math.max(0, flashAlpha - 0.055);
		flashGraphics.clear();
		flashGraphics.beginFill(0x80FFFF, flashAlpha * 0.6);  // pale cyan electric eel discharge
		flashGraphics.drawRect(0, 0, 1300, 700);
		flashGraphics.endFill();
	} else {
		flashGraphics.clear();
	}
	lightningGraphics.bringToTop();
	flashGraphics.bringToTop();
	// ──────────────────────────────────────────────────────────────────────
}


  </script>
