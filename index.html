function randInt(min, max) {
	return Math.floor(Math.random() * (max - min + 1)) + min;
}
		
for (var i = 0; i<10000; i++) {
	pi.push(randInt(0,9));
	console.log(pi[886+i]);
}

var timer = 0;

function toggleGameMode() {
	if (gameMode === 'visualization') {
		gameMode = 'catcher';
		score = 0;
		combo = 1;
		lives = 3;
		difficultyLevel = 1;
		modeText.text = 'MODE: CATCHER - Catch the digits!';
	} else {
		gameMode = 'visualization';
		// Clear all catchable digits
		catchableDigits = {};
		modeText.text = 'Press SPACE to toggle mode';
	}
}

function handleClick(pointer) {
	if (gameMode !== 'catcher') return;

	var clickX = pointer.x;
	var clickY = pointer.y;
	var tolerance = 50;

	for (var i = 0; i < nuages.length; i++) {
		if (!catchableDigits[i]) continue;

		var cloud = nuages[i];
		var dist = Math.sqrt(Math.pow(clickX - cloud.x, 2) + Math.pow(clickY - cloud.y, 2));

		if (dist < tolerance) {
			// Hit!
			catchableDigits[i] = false;
			var points = basePoints * combo * difficultyLevel;
			score += points;
			combo++;

			// Visual feedback - scale up then destroy
			var tween = game.add.tween(cloud);
			tween.to({ alpha: 0, scaleX: cloud.scaleX * 1.5, scaleY: cloud.scaleY * 1.5 }, 200);
			tween.onComplete.add(function() { if (cloud.alive) cloud.destroy(); if (nuages2[i] && nuages2[i].alive) nuages2[i].destroy(); });
			tween.start();
			return;
		}
	}

	// Missed
	combo = 1;
	lives--;
	if (lives <= 0) {
		gameMode = 'visualization';
		modeText.text = 'Game Over! Score: ' + score + ' | Press SPACE to try again';
	}
}

function sleep(milliseconds) {
	var start = new Date().getTime();
	for (var i = 0; i < 1e7; i++) {
		if ((new Date().getTime() - start) > milliseconds){
		 break;
		}
	}
}
function preload() {
	game.load.image('nuage','nuage.png');
	game.load.image('nuage2','nuage2.png');
	game.load.image('field','field.png');
	game.load.image('fond','fond.png');
	game.load.image('fond2','fond2.png');
}
function create() {
	game.time.desiredFps = 30;
	game.stage.backgroundColor = "#4488AA";
	fond = game.add.tileSprite(0, 0, 1300, 400, 'fond');
	fond2 = game.add.tileSprite(0, 400, 1300, 300, 'fond2');
	order0 = game.add.group();
	order1 = game.add.group();
	order2 = game.add.group();
	order3 = game.add.group();
	order4 = game.add.group();
	order5 = game.add.group();
	order6 = game.add.group();
	order7 = game.add.group();
	order8 = game.add.group();
	order9 = game.add.group();
	//fond2.angle = 180;
	fond2.alpha = 0.9;
	//field = game.add.tileSprite(0, 465, 1300, 300, 'field');
	//field.alpha = 0.2;

	// Setup HUD text for catcher mode
	var style = { font: '20px Arial', fill: '#ffffff', stroke: '#000000', strokeThickness: 3 };
	scoreText = game.add.text(10, 10, 'Score: 0', style);
	comboText = game.add.text(10, 35, 'Combo: 0x', style);
	livesText = game.add.text(1150, 10, 'Lives: 3', style);
	modeText = game.add.text(600, 10, 'Press SPACE to toggle mode', { font: '14px Arial', fill: '#cccccc' });
	scoreText.fixedToCamera = true;
	comboText.fixedToCamera = true;
	livesText.fixedToCamera = true;
	modeText.fixedToCamera = true;

	// Input handling
	game.input.onDown.add(handleClick, this);
	var spaceKey = game.input.keyboard.addKey(Phaser.Keyboard.SPACEBAR);
	spaceKey.onDown.add(toggleGameMode, this);
}
function update() {

	timer++;

	// Update HUD
	scoreText.text = 'Score: ' + score;
	comboText.text = 'Combo: ' + combo + 'x';
	livesText.text = 'Lives: ' + lives;

	// Increase difficulty over time in catcher mode
	if (gameMode === 'catcher') {
		difficultyLevel = 1 + Math.floor(score / 1000);
	}

	if (timer > (pi[decimal+1])*densityDivider) {

		decimal++;
		timer = 0;
		nuages.push(game.add.tileSprite(-200, 400-(pi[decimal]*34-15)/*+(((pi[decimal]-pi[decimal+pi[decimal]])*pi[decimal]))/2)*/, 768, 312, 'nuage'));
		nuages[decimal].anchor.x = 0.7;
		nuages[decimal].anchor.y = 0.5;
		nuages[decimal].scale.setTo((pi[decimal])/10/*+Math.abs(((pi[decimal]-pi[decimal+1])/9))*/, (pi[decimal])/10);
		nuages[decimal].alpha = 0.9;
		//sum += pi[decimal];
		nuages2.push(game.add.tileSprite(-200, 400+(pi[decimal]*34-15)/*+(((pi[decimal]-pi[decimal+pi[decimal]])*pi[decimal]))/2)*/, 768, 312, 'nuage2'));
		nuages2[decimal].anchor.x = 0.7;
		nuages2[decimal].anchor.y = 0.5;
		nuages2[decimal].scale.setTo((pi[decimal])/10/*+Math.abs(((pi[decimal]-pi[decimal+1])/9))*/, (pi[decimal])/10);
		nuages[decimal].alpha = 0.99;

		// In catcher mode, mark clouds as catchable (skip digit 0: invisible/zero-scale)
		if (gameMode === 'catcher' && pi[decimal] !== 0) {
			catchableDigits[decimal] = true;
		}

		switch(pi[decimal]) {
		case 0:
			order0.add(nuages[decimal]);
			order0.add(nuages2[decimal]);
			break;
		case 1:
			order1.add(nuages[decimal]);
			order1.add(nuages2[decimal]);
			break;
		case 2:
			order2.add(nuages[decimal]);
			order2.add(nuages2[decimal]);
			break;
		case 3:
			order3.add(nuages[decimal]);
			order3.add(nuages2[decimal]);
			break;
		case 4:
			order4.add(nuages[decimal]);
			order4.add(nuages2[decimal]);
			break;
		case 5:
			order5.add(nuages[decimal]);
			order5.add(nuages2[decimal]);
			break;
		case 6:
			order6.add(nuages[decimal]);
			order6.add(nuages2[decimal]);
			break;
		case 7:
			order7.add(nuages[decimal]);
			order7.add(nuages2[decimal]);
			break;
		case 8:
			order8.add(nuages[decimal]);
			order8.add(nuages2[decimal]);
			break;
		case 9:
			order9.add(nuages[decimal]);
			order9.add(nuages2[decimal]);
			break;
		}
	}

	while (jj <= decimal ) {
		if (nuages[jj].x > 1800) {
			// In catcher mode, if cloud wasn't caught, lose a life
			if (gameMode === 'catcher' && catchableDigits[jj]) {
				combo = 0;
				lives--;
				if (lives <= 0) {
					gameMode = 'visualization';
					modeText.text = 'Game Over! Score: ' + score + ' | Press SPACE to try again';
				}
			}
			if (nuages[jj].alive) nuages[jj].destroy();
			if (nuages2[jj] && nuages2[jj].alive) nuages2[jj].destroy();
			delete catchableDigits[jj];
		}
		nuages[jj].x += (pi[jj])/Math.abs(velocityDivider);
		nuages2[jj].x += (pi[jj])/Math.abs(velocityDivider);
		//nuages[jj].angle += (1/(pi[jj]))*3;
		jj++;
		//if (nuages[jj].x > 1300) {
		//}
	}
	jj = 0;

	game.world.bringToTop(order0);
	game.world.bringToTop(order1);
	game.world.bringToTop(order2);
	game.world.bringToTop(order3);
	game.world.bringToTop(order4);
	game.world.bringToTop(order5);
	game.world.bringToTop(order6);
	game.world.bringToTop(order7);
	game.world.bringToTop(order8);
	game.world.bringToTop(order9);
	fond2.bringToTop();
}
