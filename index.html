function buildGradientTexture(key, palette, withNoise) {
	var bmd = game.add.bitmapData(GAME_WIDTH, GAME_HEIGHT);
	var gradient = bmd.ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
	for (var i = 0; i < palette.length; i++) {
		gradient.addColorStop(palette[i].stop, palette[i].color);
	}
	bmd.ctx.fillStyle = gradient;
	bmd.ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

	if (withNoise) {
		for (var n = 0; n < 220; n++) {
			var x = Math.random() * GAME_WIDTH;
			var y = Math.random() * (GAME_HEIGHT * 0.62);
			var size = (Math.random() * 2.4) + 0.4;
			var alpha = (Math.random() * 0.35) + 0.12;
			bmd.ctx.fillStyle = "rgba(255,230,244," + alpha + ")";
			bmd.ctx.beginPath();
			bmd.ctx.arc(x, y, size, 0, Math.PI * 2);
			bmd.ctx.fill();
		}
	}

	bmd.dirty = true;
	game.cache.addBitmapData(key, bmd);
	return bmd;
}

function create() {
	game.time.desiredFps = 30;
	game.stage.backgroundColor = theme.background;
	createOccultBackdrop();

	for (var groupIndex = 0; groupIndex < 10; groupIndex++) {
		orderGroups[groupIndex] = game.add.group();
	}

	createHud();
	decimal = 0;
	spawnCloudPair(pi[decimal]);
	updateHud();
}

function spawnCloudPair(value) {
	var x = -60;
	var upperY = SKYLINE_Y - (value * 34 - 15);
	var lowerY = SKYLINE_Y + (value * 34 - 15);
	var scale = Math.max(0.22, value / 10);
	var tint = theme.cloudTints[value];

	var upper = game.add.tileSprite(x, upperY, 768, 312, "nuage");
	upper.anchor.setTo(0.7, 0.5);
	upper.scale.setTo(scale, scale);
	upper.alpha = 0.98;
	upper.tint = tint;

	var lower = game.add.tileSprite(x, lowerY, 768, 312, "nuage2");
	lower.anchor.setTo(0.7, 0.5);
	lower.scale.setTo(scale, scale);
	lower.alpha = 0.98;
	lower.tint = tint;

	nuages.push(upper);
	nuages2.push(lower);
	orderGroups[value].add(upper);
	orderGroups[value].add(lower);

	var halo = game.add.graphics(upper.x + 30, (upperY + lowerY) / 2);
	halo.beginFill(0xd08ca3, 0.12);
	halo.drawEllipse(0, 0, 460 * scale, 88 + (value * 4));
	halo.endFill();
	orderGroups[value].add(halo);
	halos.push(halo);
}

function updateHud() {
	var nextValue = pi[Math.max(decimal, 0)];
	hudDigit.setText("Digit " + nextValue);
	hudCount.setText("Clouds conjured: " + (decimal + 1));
}

function update() {
	timer++;
	ritualPulse += 0.018;

	if (parallaxMist) {
		parallaxMist.tilePosition.x -= 0.18;
		parallaxMist.tilePosition.y = Math.sin(ritualPulse) * 2;
	}
	if (emberMist) {
		emberMist.tilePosition.x -= 0.3;
		emberMist.tilePosition.y += 0.08;
	}

	if (timer > (pi[decimal + 1]) * densityDivider) {
		decimal++;
		timer = 0;
		spawnCloudPair(pi[decimal]);
		updateHud();
	}

	while (jj <= decimal) {
		if (nuages[jj].x > 1800) {
			nuages[jj].destroy();
			nuages2[jj].destroy();
			if (halos[jj]) {
				halos[jj].destroy();
			}
		} else {
			nuages[jj].x += pi[jj] / Math.abs(velocityDivider);
			nuages2[jj].x += pi[jj] / Math.abs(velocityDivider);
			if (halos[jj]) {
				halos[jj].x = nuages[jj].x + 30;
			}
		}
		jj++;
	}
	jj = 0;

	for (var groupIndex = 0; groupIndex < orderGroups.length; groupIndex++) {
		game.world.bringToTop(orderGroups[groupIndex]);
	}
	if (hudDigit) {
		hudDigit.bringToTop();
		hudCount.bringToTop();
	}
}
