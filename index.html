// Active constant
var activeConstantKey = 'pi';
var digits = CONSTANTS.pi.digits.slice();

function randInt(min, max) {
	return Math.floor(Math.random() * (max - min + 1)) + min;
}

// Extend each constant's digits with random noise beyond the stored sequence
function extendDigits(arr) {
	while (arr.length < 11000) {
		arr.push(randInt(0, 9));
	}
	return arr;
}

for (var k in CONSTANTS) {
	extendDigits(CONSTANTS[k].digits);
}

// Keep a reference to the original pi array for star positioning
var pi = CONSTANTS.pi.digits;

var timer = 0;

// ── Day / Night Cycle ──────────────────────────────────────────────────────
var dayNightTimer = 0;
var CYCLE_FRAMES  = 3600;
var starsLayer;
var currentTintHex = 0xFFFFFF;

function lerp(a, b, t) { return a + (b - a) * t; }

function rgbToPhaser(r, g, b) { return (r << 16) | (g << 8) | b; }

function rgbToCSS(r, g, b) {
	return '#' +
		('0' + r.toString(16)).slice(-2) +
		('0' + g.toString(16)).slice(-2) +
		('0' + b.toString(16)).slice(-2);
}

var tintStops = [
	{ r: 255, g: 255, b: 255 },
	{ r: 255, g: 130, b: 50  },
	{ r: 18,  g: 22,  b: 75  },
	{ r: 255, g: 165, b: 110 },
];

function getDayNightTint(phase) {
	var n  = tintStops.length;
	var sc = phase * n;
	var i  = Math.floor(sc) % n;
	var j  = (i + 1) % n;
	var t  = sc - Math.floor(sc);
	return {
		r: Math.floor(lerp(tintStops[i].r, tintStops[j].r, t)),
		g: Math.floor(lerp(tintStops[i].g, tintStops[j].g, t)),
		b: Math.floor(lerp(tintStops[i].b, tintStops[j].b, t))
	};
}

// ── Constant label (Phaser text object) ───────────────────────────────────
var constantLabel;

// ── Switch constant ────────────────────────────────────────────────────────
function switchConstant(key) {
	if (key === activeConstantKey) return;
	activeConstantKey = key;
	digits = CONSTANTS[key].digits;

	// Reset cloud animation state
	decimal = -1;
	timer = 0;
	jj = 0;

	// Destroy all live clouds
	for (var i = 0; i < nuages.length; i++) {
		if (nuages[i] && nuages[i].alive) { nuages[i].destroy(); }
		if (nuages2[i] && nuages2[i].alive) { nuages2[i].destroy(); }
	}
	nuages  = [];
	nuages2 = [];

	// Update DOM buttons
	var buttons = document.querySelectorAll('.const-btn');
	for (var b = 0; b < buttons.length; b++) {
		if (buttons[b].getAttribute('data-key') === key) {
			buttons[b].className = 'const-btn active';
		} else {
			buttons[b].className = 'const-btn';
		}
	}

	// Update Phaser label
	if (constantLabel) {
		var c = CONSTANTS[key];
		constantLabel.text = c.symbol + '  ' + c.name;
	}
}

function preload() {
	game.load.image('nuage','nuage.png');

}

function create() {
	game.time.desiredFps = 30;
	game.stage.backgroundColor = "#4488AA";
	fond = game.add.tileSprite(0, 0, 1300, 400, 'fond');

	// Stars layer – positioned using pi digits, revealed at night
	starsLayer = game.add.graphics(0, 0);
	for (var s = 0; s < 150; s++) {
		var px       = s * 3;
		var sx       = (pi[px] * 130 + pi[px+1] * 13 + pi[px+2] * 7) % 1300;
		var sy       = (pi[px] * 33  + pi[px+1] * 4  + 5)             % 330;
		var starSize = (pi[px] % 2) + 1;
		var starAlpha = 0.35 + (pi[px+2] / 14.0);
		starsLayer.beginFill(0xFFFFFF, starAlpha);
		starsLayer.drawCircle(sx, sy, starSize * 2);
		starsLayer.endFill();
	}
	starsLayer.alpha = 0;

	fond2 = game.add.tileSprite(0, 400, 1300, 300, 'fond2');
	order0 = game.add.group();
	order1 = game.add.group();
	order2 = game.add.group();
	order3 = game.add.group();
	order4 = game.add.group();
	order5 = game.add.group();
	order6 = game.add.group();
	order7 = game.add.group();
	order8 = game.add.group();
	order9 = game.add.group();
	fond2.alpha = 0.9;

	// Constant label: top-right corner
	constantLabel = game.add.text(
		1285, 12,
		CONSTANTS[activeConstantKey].symbol + '  ' + CONSTANTS[activeConstantKey].name,
		{
			font: 'bold 18px Courier New',
			fill: '#ffffff',
			stroke: '#003366',
			strokeThickness: 3,
			align: 'right'
		}
	);
	constantLabel.anchor.setTo(1, 0);
	constantLabel.alpha = 0.85;
}

function update() {

	// ── Day / Night Cycle ───────────────────────────────────────────────
	dayNightTimer++;
	var phase = (dayNightTimer % CYCLE_FRAMES) / CYCLE_FRAMES;
	var tint  = getDayNightTint(phase);
	currentTintHex = rgbToPhaser(tint.r, tint.g, tint.b);

	fond.tint  = currentTintHex;
	fond2.tint = currentTintHex;

	var nightAlpha = 0;
	if (phase > 0.25 && phase < 0.75) {
		nightAlpha = Math.sin((phase - 0.25) / 0.5 * Math.PI);
	}
	starsLayer.alpha = nightAlpha;

	var bgR = Math.floor(lerp(67,  5,  nightAlpha));
	var bgG = Math.floor(lerp(169, 5,  nightAlpha));
	var bgB = Math.floor(lerp(223, 30, nightAlpha));
	game.stage.backgroundColor = rgbToCSS(bgR, bgG, bgB);
	// ────────────────────────────────────────────────────────────────────

	timer++;

	if (timer > (digits[decimal+1]) * densityDivider) {

		decimal++;
		timer = 0;
		nuages.push(game.add.tileSprite(-200, 400-(digits[decimal]*34-15), 768, 312, 'nuage'));
		nuages[decimal].anchor.x = 0.7;
		nuages[decimal].anchor.y = 0.5;
		nuages[decimal].scale.setTo((digits[decimal])/10, (digits[decimal])/10);
		nuages[decimal].alpha = 0.9;
		nuages2.push(game.add.tileSprite(-200, 400+(digits[decimal]*34-15), 768, 312, 'nuage2'));
		nuages2[decimal].anchor.x = 0.7;
		nuages2[decimal].anchor.y = 0.5;
		nuages2[decimal].scale.setTo((digits[decimal])/10, (digits[decimal])/10);
		nuages[decimal].alpha = 0.99;

		switch(digits[decimal]) {
		case 0:
			order0.add(nuages[decimal]);
			order0.add(nuages2[decimal]);
			break;
		case 1:
			order1.add(nuages[decimal]);
			order1.add(nuages2[decimal]);
			break;
		case 2:
			order2.add(nuages[decimal]);
			order2.add(nuages2[decimal]);
			break;
		case 3:
			order3.add(nuages[decimal]);
			order3.add(nuages2[decimal]);
			break;
		case 4:
			order4.add(nuages[decimal]);
			order4.add(nuages2[decimal]);
			break;
		case 5:
			order5.add(nuages[decimal]);
			order5.add(nuages2[decimal]);
			break;
		case 6:
			order6.add(nuages[decimal]);
			order6.add(nuages2[decimal]);
			break;
		case 7:
			order7.add(nuages[decimal]);
			order7.add(nuages2[decimal]);
			break;
		case 8:
			order8.add(nuages[decimal]);
			order8.add(nuages2[decimal]);
			break;
		case 9:
			order9.add(nuages[decimal]);
			order9.add(nuages2[decimal]);
			break;
		}
	}

	while (jj <= decimal) {
		if (nuages[jj].x > 1800) {
			nuages[jj].destroy();
		}
		nuages[jj].x  += (digits[jj]) / Math.abs(velocityDivider);
		nuages2[jj].x += (digits[jj]) / Math.abs(velocityDivider);
		nuages[jj].tint  = currentTintHex;
		nuages2[jj].tint = currentTintHex;
		jj++;
	}
	jj = 0;

	game.world.bringToTop(order0);
	game.world.bringToTop(order1);
	game.world.bringToTop(order2);
	game.world.bringToTop(order3);
	game.world.bringToTop(order4);
	game.world.bringToTop(order5);
	game.world.bringToTop(order6);
	game.world.bringToTop(order7);
	game.world.bringToTop(order8);
	game.world.bringToTop(order9);
	fond2.bringToTop();

	// Keep the constant label readable on top
	game.world.bringToTop(constantLabel);
}
	</script>
