function sleep(milliseconds) {
	var start = new Date().getTime();
	for (var i = 0; i < 1e7; i++) {

function normalizeThemeKey(themeKey) {
	if (themes[themeKey]) {
		return themeKey;
	}
	return 'classic';
}

function getStoredThemeKey() {
	try {
		var storedTheme = window.localStorage.getItem(THEME_STORAGE_KEY);
		return normalizeThemeKey(storedTheme);
	} catch (error) {
		return 'classic';
	}
}

function setStoredThemeKey(themeKey) {
	try {
		window.localStorage.setItem(THEME_STORAGE_KEY, normalizeThemeKey(themeKey));
	} catch (error) {
	}
}

function applyBodyThemeColor(themeKey) {
	var theme = themes[normalizeThemeKey(themeKey)];
	if (document.body) {
		document.body.style.backgroundColor = theme.bodyBackground;
	}
}

function syncThemeSelector() {
	var selector = document.getElementById('theme-select');
	if (selector) {
		selector.value = activeThemeKey;
	}
}

function initializeThemeSelector() {
	var selector = document.getElementById('theme-select');
	if (!selector) {
		return;
	}
	selector.value = getStoredThemeKey();
	selector.onchange = function() {
		var selectedTheme = normalizeThemeKey(selector.value);
		setStoredThemeKey(selectedTheme);
		if (selectedTheme !== activeThemeKey && game && game.stage) {
			applyThemeToScene(selectedTheme);
		} else {
			activeThemeKey = selectedTheme;
			applyBodyThemeColor(activeThemeKey);
		}
		syncThemeSelector();
	};
}

	nuages2 = [];
	timer = 0;
	decimal = -1;
	jj = 0;

	}

		if (orderGroups[i]) {

		}

	orderGroups = [];
	resetSimulationState();

function randomRange(min, max) {
	return min + Math.random() * (max - min);
}

function drawCollageSky(ctx, width, height) {
	ctx.fillStyle = '#F3ECDB';
	ctx.fillRect(0, 0, width, height);

	for (var speck = 0; speck < 2800; speck++) {
		var shade = 205 + randInt(0, 35);
		ctx.fillStyle = 'rgba(' + shade + ',' + (shade - 8) + ',' + (shade - 28) + ',0.12)';
		ctx.fillRect(randInt(0, width), randInt(0, height), 2, 2);
	}

	var layers = [
		{ baseY: 335, amp: 10, color: '#CDB38C' },
		{ baseY: 305, amp: 14, color: '#D8C29A' },
		{ baseY: 275, amp: 16, color: '#E6D2AF' },
		{ baseY: 235, amp: 20, color: '#F0DFBF' }
	];

	for (var layer = 0; layer < layers.length; layer++) {
		var config = layers[layer];
		var phase = randomRange(0, Math.PI * 2);
		ctx.fillStyle = config.color;
		ctx.beginPath();
		ctx.moveTo(0, height);
		for (var x = 0; x <= width; x += 24) {
			var y = config.baseY + Math.sin((x * 0.012) + phase) * config.amp + randInt(-6, 6);
			ctx.lineTo(x, y);
		}
		ctx.lineTo(width, height);
		ctx.closePath();
		ctx.fill();
	}

	ctx.strokeStyle = 'rgba(92, 72, 51, 0.28)';
	ctx.lineWidth = 2;
	ctx.setLineDash([8, 6]);
	for (var guide = 0; guide < 5; guide++) {
		var yLine = 55 + guide * 48 + randInt(-3, 3);
		ctx.beginPath();
		ctx.moveTo(30, yLine);
		ctx.lineTo(width - 30, yLine);
		ctx.stroke();
	}
	ctx.setLineDash([]);
}

function drawCollageGround(ctx, width, height) {
	ctx.fillStyle = '#D1B68F';
	ctx.fillRect(0, 0, width, height);

	for (var strip = 0; strip < 40; strip++) {
		var bandX = strip * 36 + randInt(-8, 8);
		var bandWidth = randInt(20, 46);
		var tint = 170 + randInt(0, 35);
		ctx.fillStyle = 'rgba(' + tint + ',' + (tint - 18) + ',' + (tint - 40) + ',0.22)';
		ctx.fillRect(bandX, 0, bandWidth, height);
	}

	ctx.strokeStyle = 'rgba(89, 65, 43, 0.34)';
	ctx.lineWidth = 1.5;
	for (var hatch = 0; hatch < 22; hatch++) {
		var hatchY = hatch * 14 + randInt(-2, 2);
		ctx.beginPath();
		ctx.moveTo(0, hatchY);
		ctx.lineTo(width, hatchY + randInt(-8, 8));
		ctx.stroke();
	}
}

function drawCollageCloud(ctx, width, height, fillColors, mirrored) {
	ctx.clearRect(0, 0, width, height);
	ctx.save();
	if (mirrored) {
		ctx.translate(width, height);
		ctx.scale(-1, -1);
	}

	for (var piece = 0; piece < 7; piece++) {
		var centerX = 68 + piece * 94 + randInt(-14, 14);
		var centerY = 130 + (piece % 2) * 22 + randInt(-8, 8);
		var pieceWidth = 120 + randInt(-18, 20);
		var pieceHeight = 72 + randInt(-12, 18);
		ctx.fillStyle = fillColors[piece % fillColors.length];
		ctx.beginPath();
		ctx.moveTo(centerX - pieceWidth * 0.48, centerY + pieceHeight * 0.2);
		ctx.lineTo(centerX - pieceWidth * 0.14, centerY - pieceHeight * 0.44);
		ctx.lineTo(centerX + pieceWidth * 0.28, centerY - pieceHeight * 0.28);
		ctx.lineTo(centerX + pieceWidth * 0.52, centerY + pieceHeight * 0.05);
		ctx.lineTo(centerX + pieceWidth * 0.16, centerY + pieceHeight * 0.5);
		ctx.closePath();
		ctx.fill();

		ctx.strokeStyle = 'rgba(82, 58, 39, 0.38)';
		ctx.lineWidth = 2;
		ctx.stroke();
	}

	ctx.strokeStyle = 'rgba(120, 90, 62, 0.3)';
	ctx.lineWidth = 1.4;
	ctx.setLineDash([7, 5]);
	for (var seam = 0; seam < 6; seam++) {
		var seamY = 88 + seam * 24 + randInt(-2, 2);
		ctx.beginPath();
		ctx.moveTo(24, seamY);
		ctx.lineTo(width - 24, seamY + randInt(-8, 8));
		ctx.stroke();
	}
	ctx.setLineDash([]);
	ctx.restore();
}

function makeCollageAssets() {
	if (collageAssets) {
		return collageAssets;
	}

	var topBackground = game.add.bitmapData(1300, 400);
	drawCollageSky(topBackground.ctx, 1300, 400);
	topBackground.dirty = true;

	var bottomBackground = game.add.bitmapData(1300, 300);
	drawCollageGround(bottomBackground.ctx, 1300, 300);
	bottomBackground.dirty = true;

	var topCloud = game.add.bitmapData(768, 312);
	drawCollageCloud(topCloud.ctx, 768, 312, ['#EFD9B7', '#DDBA8E', '#C79C6A'], false);
	topCloud.dirty = true;

	var bottomCloud = game.add.bitmapData(768, 312);
	drawCollageCloud(bottomCloud.ctx, 768, 312, ['#F5E8D1', '#E7CB9F', '#D3A975'], true);
	bottomCloud.dirty = true;

	collageAssets = {
		topBackground: topBackground,
		bottomBackground: bottomBackground,
		cloudTop: topCloud,
		cloudBottom: bottomCloud,
		bottomAlpha: 0.93,
		cloudTopAlpha: 0.94,
		cloudBottomAlpha: 0.92
	};

	return collageAssets;
}

function applyThemeToScene(themeKey) {
	activeThemeKey = normalizeThemeKey(themeKey);
	activeTheme = themes[activeThemeKey];
	activeThemeAssets = activeTheme.makeAssets();
	densityDivider = activeTheme.densityDivider;
	velocityDivider = activeTheme.velocityDivider;

	applyBodyThemeColor(activeThemeKey);
	game.stage.backgroundColor = activeTheme.stageBackground;
	clearScene();

	fond = game.add.tileSprite(0, 0, 1300, 400, activeThemeAssets.topBackground);
	fond2 = game.add.tileSprite(0, 400, 1300, 300, activeThemeAssets.bottomBackground);
	fond2.alpha = activeThemeAssets.bottomAlpha;
	createOrderGroups();
}

	game.load.image('field','field.png');
	game.load.image('fond','fond.png');
	game.load.image('fond2','fond2.png');

function create() {
	game.time.desiredFps = 30;
	activeThemeKey = getStoredThemeKey();
	applyThemeToScene(activeThemeKey);
	syncThemeSelector();
}
function update() {
	if (!activeThemeAssets || orderGroups.length !== 10) {
		return;
	}

	timer++;

	if (timer > (pi[decimal+1])*densityDivider) {

		decimal++;
		timer = 0;
		var currentDigit = pi[decimal];
		nuages.push(game.add.tileSprite(-200, 400-(currentDigit*34-15)/*+(((pi[decimal]-pi[decimal+pi[decimal]])*pi[decimal]))/2)*/, 768, 312, activeThemeAssets.cloudTop));
		nuages[decimal].anchor.x = 0.7;
		nuages[decimal].anchor.y = 0.5;
		nuages[decimal].scale.setTo((currentDigit)/10/*+Math.abs(((pi[decimal]-pi[decimal+1])/9))*/, (currentDigit)/10);
		nuages[decimal].alpha = activeThemeAssets.cloudTopAlpha;
		//sum += pi[decimal];
		nuages2.push(game.add.tileSprite(-200, 400+(currentDigit*34-15)/*+(((pi[decimal]-pi[decimal+pi[decimal]])*pi[decimal]))/2)*/, 768, 312, activeThemeAssets.cloudBottom));
		nuages2[decimal].anchor.x = 0.7;
		nuages2[decimal].anchor.y = 0.5;
		nuages2[decimal].scale.setTo((currentDigit)/10/*+Math.abs(((pi[decimal]-pi[decimal+1])/9))*/, (currentDigit)/10);
		nuages2[decimal].alpha = activeThemeAssets.cloudBottomAlpha;

		orderGroups[currentDigit].add(nuages[decimal]);
		orderGroups[currentDigit].add(nuages2[decimal]);
	}

	while (jj <= decimal ) {
		if (!nuages[jj] || !nuages2[jj]) {
			jj++;
			continue;
		}
		if (nuages[jj].x > 1800) {
			nuages[jj].destroy();
			nuages2[jj].destroy();
		}
		if (nuages[jj].exists) {
			nuages[jj].x += (pi[jj])/Math.abs(velocityDivider);
		}
		if (nuages2[jj].exists) {
			nuages2[jj].x += (pi[jj])/Math.abs(velocityDivider);
		}
		//nuages[jj].angle += (1/(pi[jj]))*3;
		jj++;
		//if (nuages[jj].x > 1300) {
		//}
	}
	jj = 0;

	for (var orderIndex = 0; orderIndex < orderGroups.length; orderIndex++) {
		game.world.bringToTop(orderGroups[orderIndex]);
	}
	if (fond2) {
		fond2.bringToTop();
	}
}
