function createGradientTexture() {
	var bmd = game.add.bitmapData(1300, 700);
	var ctx = bmd.ctx;
	var skyGradient = ctx.createLinearGradient(0, 0, 0, 700);
	skyGradient.addColorStop(0, '#1a0b0b');
	skyGradient.addColorStop(0.28, '#4b120d');
	skyGradient.addColorStop(0.55, '#902812');
	skyGradient.addColorStop(0.78, '#2f120f');
	skyGradient.addColorStop(1, '#120708');
	ctx.fillStyle = skyGradient;
	ctx.fillRect(0, 0, 1300, 700);

	var lavaGlow = ctx.createRadialGradient(650, 340, 30, 650, 340, 430);
	lavaGlow.addColorStop(0, 'rgba(255,230,150,0.55)');
	lavaGlow.addColorStop(0.2, 'rgba(255,130,30,0.45)');
	lavaGlow.addColorStop(0.45, 'rgba(210,55,10,0.28)');
	lavaGlow.addColorStop(1, 'rgba(0,0,0,0)');
	ctx.fillStyle = lavaGlow;
	ctx.fillRect(0, 0, 1300, 700);

	for (var i = 0; i < 120; i++) {
		var x = randInt(0, 1300);
		var y = randInt(0, 420);
		var radius = randInt(1, 3);
		ctx.fillStyle = 'rgba(255, ' + randInt(90, 200) + ', ' + randInt(20, 80) + ', ' + (Math.random() * 0.35 + 0.06).toFixed(2) + ')';
		ctx.beginPath();
		ctx.arc(x, y, radius, 0, Math.PI * 2);
		ctx.fill();
	}

	return bmd;
}

function createEmberTexture() {
	var bmd = game.add.bitmapData(18, 18);
	var ctx = bmd.ctx;
	var gradient = ctx.createRadialGradient(9, 9, 1, 9, 9, 9);
	gradient.addColorStop(0, 'rgba(255,245,210,1)');
	gradient.addColorStop(0.3, 'rgba(255,158,48,0.95)');
	gradient.addColorStop(0.65, 'rgba(255,77,0,0.65)');
	gradient.addColorStop(1, 'rgba(255,77,0,0)');
	ctx.fillStyle = gradient;
	ctx.beginPath();
	ctx.arc(9, 9, 9, 0, Math.PI * 2);
	ctx.fill();
	return bmd;
}

function addAshBands() {
	for (var i = 0; i < 3; i++) {
		var band = game.add.graphics(0, 90 + i * 85);
		band.beginFill(0x2a1211, 0.12 + i * 0.04);
		band.drawEllipse(650, 120, 1500 - i * 180, 100 + i * 18);
		band.endFill();
		band.blurX = 18;
		band.blurY = 18;
		ashBands.push(band);
	}
}

function spawnEmbers() {
	for (var i = 0; i < 26; i++) {
		var ember = game.add.sprite(randInt(525, 675), randInt(305, 365), emberTexture);
		ember.anchor.set(0.5);
		ember.scale.setTo(Math.random() * 0.5 + 0.25);
		ember.alpha = Math.random() * 0.45 + 0.35;
		ember.speedX = Math.random() * 0.8 - 0.4;
		ember.speedY = Math.random() * -1.5 - 0.7;
		ember.drift = Math.random() * 0.025 + 0.01;
		embers.push(ember);
	}
}

function update() {

	timer++;

		nuages2[decimal].alpha = 0.5;
		nuages2[decimal].tint = volcanoPalette[(pi[decimal] + 3) % volcanoPalette.length];

		switch(pi[decimal]) {
		case 0:
			order0.add(nuages[decimal]);
			order0.add(nuages2[decimal]);
			break;
		case 1:
			order1.add(nuages[decimal]);
			order1.add(nuages2[decimal]);
			break;
		case 2:

			break;
		case 9:

			order9.add(nuages2[decimal]);
			break;
		}
	}

	while (jj <= decimal ) {
		if (nuages[jj].x > 1800) {
			nuages[jj].destroy();
		}
		nuages[jj].x += (pi[jj])/Math.abs(velocityDivider);
		nuages2[jj].x += (pi[jj])/Math.abs(velocityDivider);
		//nuages[jj].angle += (1/(pi[jj]))*3;
		jj++;
		//if (nuages[jj].x > 1300) {
		//}
	}
	jj = 0;

	for (var i = 0; i < ashBands.length; i++) {
		ashBands[i].x += Math.sin((timer + i * 20) * 0.01) * 0.3;
	}

	for (var j = 0; j < embers.length; j++) {
		embers[j].x += embers[j].speedX + Math.sin((timer + j * 7) * embers[j].drift);
		embers[j].y += embers[j].speedY;
		embers[j].alpha = 0.22 + (Math.sin((timer + j * 9) * 0.08) + 1) * 0.24;
		if (embers[j].y < 120 || embers[j].x < 470 || embers[j].x > 750) {
			embers[j].x = randInt(525, 675);
			embers[j].y = randInt(315, 360);
		}
	}

	if (mountainGlow) {
		mountainGlow.alpha = 0.12 + (Math.sin(timer * 0.08) + 1) * 0.08;
	}

	game.world.bringToTop(order0);
	game.world.bringToTop(order1);
