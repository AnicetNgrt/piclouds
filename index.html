function spawnAuroraBand(digit) {
	auroraBands.push({
		baseY:     30 + Math.random() * 190,          // y: 30-220 in upper sky
		amplitude: 10 + digit * 9,                    // higher digit → taller waves
		frequency: 0.4 + digit * 0.18,               // higher digit → more oscillations
		phase:     Math.random() * 6.28,
		phaseSpd:  0.012 + digit * 0.006,            // higher digit → faster shimmer
		driftUp:   0.25 + Math.random() * 0.35,      // upward drift speed
		life:      1.0,
		lifeDecay: 1.0 / (200 + Math.random() * 120),// 200-320 frame lifespan
		color:     auroraColors[digit],
		filaments: digit >= 6 ? 3 : 2,               // wider bands for large digits
		thickness: 1 + (digit >= 8 ? 1 : 0)          // slightly thicker for 8 & 9
	});
	if (auroraBands.length > MAX_AURORA_BANDS) {
		auroraBands.splice(0, auroraBands.length - MAX_AURORA_BANDS);
	}
}

function updateAndDrawAuroras() {
	auroraGraphics.clear();
	for (var i = auroraBands.length - 1; i >= 0; i--) {
		var b = auroraBands[i];
		b.phase  += b.phaseSpd;
		b.baseY  -= b.driftUp;
		b.life   -= b.lifeDecay;
		if (b.life <= 0 || b.baseY < -80) { auroraBands.splice(i, 1); continue; }
		// Fade in over first ~12% of life, then fade out toward end
		var fadeIn = Math.min(1.0, (1.0 - b.life) * 8);
		var alpha  = b.life * fadeIn * 0.60;
		auroraGraphics.lineStyle(b.thickness, b.color, alpha);
		for (var f = 0; f < b.filaments; f++) {
			var spread = b.filaments > 1 ? (f / (b.filaments - 1) - 0.5) * 8 : 0;
			var phOff  = f * 0.3;
			auroraGraphics.moveTo(0, b.baseY + spread + Math.sin(b.phase + phOff) * b.amplitude);
			for (var x = 15; x <= 1300; x += 15) {
				auroraGraphics.lineTo(x, b.baseY + spread +
					Math.sin(b.phase + phOff + x * b.frequency * 0.005) * b.amplitude);
			}
		}
	}
}
