var noteFreqs = [261.63, 293.66, 329.63, 392.00, 440.00,
                 523.25, 587.33, 659.25, 783.99, 880.00];

function initAudio() {
    if (audioCtx) return;
    try {
        audioCtx     = new (window.AudioContext || window.webkitAudioContext)();
        audioEnabled = true;
        audioHint.text = '\u266a sound on';
        game.add.tween(audioHint).to({ alpha: 0 }, 1200,
            Phaser.Easing.Linear.None, true, 700);
    } catch (e) {
        if (audioHint) audioHint.text = 'audio n/a';
    }
}

function playDigitNote(digit) {
    if (!audioEnabled || !audioCtx) return;
    if (digit < 0 || digit > 9) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();

    var t    = audioCtx.currentTime;
    var freq = noteFreqs[digit];
    // Louder for higher digits (bigger, faster clouds)
    var vol  = 0.04 + digit * 0.022;

    // Fundamental sine — long, airy decay
    var o1 = audioCtx.createOscillator();
    var g1 = audioCtx.createGain();
    o1.type = 'sine';
    o1.frequency.setValueAtTime(freq, t);
    g1.gain.setValueAtTime(0, t);
    g1.gain.linearRampToValueAtTime(vol, t + 0.06);
    g1.gain.exponentialRampToValueAtTime(0.001, t + 2.0);
    o1.connect(g1);
    g1.connect(audioCtx.destination);
    o1.start(t);
    o1.stop(t + 2.0);

    // Octave harmonic for warmth
    var o2 = audioCtx.createOscillator();
    var g2 = audioCtx.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(freq * 2, t);
    g2.gain.setValueAtTime(0, t);
    g2.gain.linearRampToValueAtTime(vol * 0.18, t + 0.04);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
    o2.connect(g2);
    g2.connect(audioCtx.destination);
    o2.start(t);
    o2.stop(t + 0.9);

    // Light up the matching key
    activeKeyTimer[digit] = KEY_LIT_FRAMES;
}

	osc.start(audioCtx.currentTime);
	osc.stop(audioCtx.currentTime + duration);

// Returns a packed tint that blends digit hue with the current night factor.

function digitTint(digit, nightFactor) {
	var dc = SYNTHWAVE_MODE ? SW_DIGIT_COLORS[digit] : DIGIT_COLORS[digit];
	var f  = SYNTHWAVE_MODE ? lerp(1.0, 0.55, nightFactor) : lerp(1.0, 0.22, nightFactor);

}

// Four colour stops around the cycle (phase 0 = noon, 0.5 = midnight)
var tintStops = [

	{ r: 255, g: 130, b: 50  },  // 0.25 dusk  – warm orange
	{ r: 18,  g: 22,  b: 75  },  // 0.50 night – deep indigo
	{ r: 255, g: 165, b: 110 },  // 0.75 dawn  – peach
];

function getDayNightTint(phase) {
	var n  = tintStops.length;
	var sc = phase * n;
	var i  = Math.floor(sc) % n;
	var j  = (i + 1) % n;
	var t  = sc - Math.floor(sc);
	return {
		r: Math.floor(lerp(tintStops[i].r, tintStops[j].r, t)),
		g: Math.floor(lerp(tintStops[i].g, tintStops[j].g, t)),
		b: Math.floor(lerp(tintStops[i].b, tintStops[j].b, t))
	};
}

function drawHistogram() {
	histGfx.clear();

	var dColors  = SYNTHWAVE_MODE ? SW_DIGIT_PHASER_COLORS : DIGIT_PHASER_COLORS;
	var panelBg  = SYNTHWAVE_MODE ? 0x110022 : 0x000000;
	var panelBdr = SYNTHWAVE_MODE ? 0xFF14B4 : 0xFFFFFF;
	var panelAlp = SYNTHWAVE_MODE ? 0.72     : 0.48;
	var bdrAlp   = SYNTHWAVE_MODE ? 0.55     : 0.18;

	histGfx.lineStyle(1, panelBdr, bdrAlp);
	histGfx.beginFill(panelBg, panelAlp);
	histGfx.drawRoundedRect(HX, HY, HW, HH, 5);
	histGfx.endFill();

	var maxCount = 1;
	for (var i = 0; i < 10; i++) {
		if (digitCounts[i] > maxCount) maxCount = digitCounts[i];
	}

	var total = decimal + 1;
	if (total > 0) {
		var expectedH = Math.min(HBARMAXH,
			Math.round((total / 10 / maxCount) * HBARMAXH));
		var expectedY = HBARBASE - expectedH;
		histGfx.lineStyle(1, SYNTHWAVE_MODE ? 0x00E6FF : 0xFFFFFF, 0.5);
		histGfx.moveTo(HX + 5, expectedY);
		histGfx.lineTo(HX + HW - 5, expectedY);
	}

	histGfx.lineStyle(0);
	for (var d = 0; d < 10; d++) {
		var barH = maxCount > 0
			? Math.max(1, Math.round((digitCounts[d] / maxCount) * HBARMAXH))
			: 1;
		var barX = HX + 7 + d * (HBARW + HBARGAP);
		// In SW mode draw a glow behind each bar
		if (SYNTHWAVE_MODE) {
			histGfx.beginFill(dColors[d], 0.18);
			histGfx.drawRect(barX - 2, HBARBASE - barH - 2, HBARW + 4, barH + 4);
			histGfx.endFill();
		}
		histGfx.beginFill(dColors[d], SYNTHWAVE_MODE ? 1.0 : 0.85);
		histGfx.drawRect(barX, HBARBASE - barH, HBARW, barH);
		histGfx.endFill();
	}
}

	});
	subLabel.anchor.setTo(0.5, 0.5);
	game.add.tween(bigLabel).to({ y: y - 130, alpha: 0 }, 1500,
		Phaser.Easing.Quadratic.Out, true)
		.onComplete.add(function() { bigLabel.destroy(); });
	game.add.tween(subLabel).to({ y: y - 70, alpha: 0 }, 1500,
		Phaser.Easing.Quadratic.Out, true)
		.onComplete.add(function() { subLabel.destroy(); });
}

// Returns a new shooting-star object by consuming 6 Pi digits
function spawnShootingStar() {
	var i  = shootingStarPiIdx % (pi.length - 10);
	var px = pi[i];      // x-seed
	var py = pi[i + 1];  // y-seed
	var pa = pi[i + 2];  // angle   (0–9)
	var ps = pi[i + 3];  // speed   (0–9)
	var pl = pi[i + 4];  // life    (0–9)
	var pd = pi[i + 5];  // direction: 0–4 left, 5–9 right
	shootingStarPiIdx += 6;

	var startX = (px * 137 + i * 11) % 1300;
	var startY = 15 + py * 22;              // 15–213 px from top of sky
	var angle  = 0.28 + pa / 30.0;         // ~16° – ~46° below horizontal
	var speed  = 12 + ps * 3.0;            // 12–39 px/frame
	var dir    = (pd >= 5) ? 1 : -1;       // rightward or leftward
	return {
		x: startX, y: startY,
		dx: Math.cos(angle) * speed * dir,
		dy: Math.sin(angle) * speed,        // positive = downward in canvas
		trail: [],
		life: 0,
		maxLife: 13 + (pl % 7)             // 13–19 frames ≈ 0.4–0.6 s at 30 fps
	};
}

// =====================================================================
// RAIN SYSTEM — triggered whenever a Pi digit is 0
// A digit of 0 produces an invisible, stationary cloud (scale=0, v=0).
// Instead of nothing, that moment spawns a shower of falling raindrops.
// Each drop is a short angled streak drawn by a single Phaser.Graphics
// object that is cleared and redrawn every frame.
// Drops vanish at the horizon (y ≈ 393) so they never overlap fond2.
// =====================================================================
var rainDrops    = [];
var rainGraphics;

// ── Lightning Storm System ─────────────────────────────────────────────────
// Augments the digit-0 rain with a forked lightning bolt + screen flash.
// boltPoints caches zigzag vertices so the glow and core passes share one path.
var lightningGraphics;
var flashGraphics;
var lightningTimer   = 0;
var LIGHTNING_FRAMES = 8;   // frames the bolt stays visible (~0.27 s at 30 fps)
var flashAlpha       = 0;   // 0–1; decremented each frame until dark again
var boltPoints       = [];

function buildBolt(pidx) {
	boltPoints = [];
	var startX = (pi[pidx % pi.length] * 130 + pi[(pidx + 1) % pi.length] * 13) % 1200 + 50;
	var x = startX, y = 0;
	boltPoints.push({ x: x, y: y });
	var numSegs = 7 + (pi[pidx % pi.length] % 5);   // 7–11 segments
	for (var s = 0; s < numSegs; s++) {
		y += Math.floor(360 / numSegs);
		x += (pi[(pidx + s + 2) % pi.length] - 4) * 22;   // zigzag ±88 px
		x = Math.max(20, Math.min(1280, x));                // clamp to canvas
		boltPoints.push({ x: x, y: y });
	}
}

function drawBolt() {
	lightningGraphics.clear();
	if (boltPoints.length < 2) { return; }
	if (SYNTHWAVE_MODE) {
		// Wide hot-pink glow
		lightningGraphics.lineStyle(8, 0xFF0099, 0.3);
		lightningGraphics.moveTo(boltPoints[0].x, boltPoints[0].y);
		for (var k = 1; k < boltPoints.length; k++) {
			lightningGraphics.lineTo(boltPoints[k].x, boltPoints[k].y);
		}
		// Mid hot-pink halo
		lightningGraphics.lineStyle(4, 0xFF14B4, 0.55);
		lightningGraphics.moveTo(boltPoints[0].x, boltPoints[0].y);
		for (var k = 1; k < boltPoints.length; k++) {
			lightningGraphics.lineTo(boltPoints[k].x, boltPoints[k].y);
		}
		// Core — electric cyan
		lightningGraphics.lineStyle(2, 0x00FFEE, 1.0);
		lightningGraphics.moveTo(boltPoints[0].x, boltPoints[0].y);
		for (var k = 1; k < boltPoints.length; k++) {
			lightningGraphics.lineTo(boltPoints[k].x, boltPoints[k].y);
		}
	} else {
		// Classic: thick soft yellow-white halo
		lightningGraphics.lineStyle(5, 0xFFFF99, 0.35);
		lightningGraphics.moveTo(boltPoints[0].x, boltPoints[0].y);
		for (var k = 1; k < boltPoints.length; k++) {
			lightningGraphics.lineTo(boltPoints[k].x, boltPoints[k].y);
		}
		// Core pass — thin bright white
		lightningGraphics.lineStyle(2, 0xFFFFFF, 1.0);
		lightningGraphics.moveTo(boltPoints[0].x, boltPoints[0].y);
		for (var k = 1; k < boltPoints.length; k++) {
			lightningGraphics.lineTo(boltPoints[k].x, boltPoints[k].y);
		}
	}
}

function triggerLightning(pidx) {
	buildBolt(pidx);
	drawBolt();
	lightningTimer = LIGHTNING_FRAMES;
	flashAlpha = Math.max(flashAlpha, 0.55);
}

function spawnRain() {
	var NUM_DROPS = 28;
	var centreX   = 60 + Math.random() * 1180;
	var centreY   = 10 + Math.random() * 120;
	for (var d = 0; d < NUM_DROPS; d++) {
		var vy = 5 + Math.random() * 5;
		rainDrops.push({
			x:       centreX + (Math.random() - 0.5) * 420,
			y:       centreY + Math.random() * 80,
			vx:      -0.6 + Math.random() * 0.4,
			vy:      vy,
			alpha:   0.45 + Math.random() * 0.45,
			len:     6 + Math.random() * 10,
			life:    0,
			maxLife: Math.floor((393 - centreY) / vy) + 10
		});
	}
}

// ── Synthwave helper: retro sun (half below horizon) ──────────────────────
function drawRetroSun(gfx) {
	var cx = 650, cy = 400, R = 120;

	// Atmospheric bloom
	gfx.lineStyle(0);
	gfx.beginFill(0xFF0066, 0.07);
	gfx.drawCircle(cx, cy, R * 3.2);
	gfx.endFill();
	gfx.beginFill(0xFF2080, 0.12);
	gfx.drawCircle(cx, cy, R * 2.0);
	gfx.endFill();

	// Sun disc — concentric rings simulate a hot-pink → amber → yellow gradient
	var rings = [
		[R * 2.0, 0x880044],
		[R * 1.85,0xAA0055],
		[R * 1.7, 0xCC0066],
		[R * 1.55,0xDD1077],
		[R * 1.4, 0xEE1888],
		[R * 1.25,0xFF20AA],
		[R * 1.1, 0xFF30BB],
		[R * 1.0, 0xFF3090],
		[R * 0.9, 0xFF5070],
		[R * 0.8, 0xFF7050],
		[R * 0.7, 0xFF9030],
		[R * 0.6, 0xFFAA18],
		[R * 0.5, 0xFFBB10],
		[R * 0.4, 0xFFCC08],
		[R * 0.28,0xFFDE04],
		[R * 0.16,0xFFEE02],
		[R * 0.07,0xFFF800]
	];
	for (var ri = 0; ri < rings.length; ri++) {
		gfx.beginFill(rings[ri][1], 1.0);
		gfx.drawCircle(cx, cy, rings[ri][0]);
		gfx.endFill();
	}

	// Horizontal scan lines — drawn only in the visible top half
	// Lines get denser (closer together) toward the horizon (perspective)
	var numLines = 18;
	for (var li = 0; li < numLines; li++) {
		// t = 0 at top of sun, 1 at horizon
		var t  = li / (numLines - 1);
		var ly = (cy - R) + t * R;
		var dx = Math.sqrt(Math.max(0, R * R - (ly - cy) * (ly - cy)));
		if (dx < 2) continue;
		var lineH = 2 + (1 - t) * 2; // thicker lines near top
		gfx.beginFill(0x110022, 0.75);
		gfx.drawRect(cx - dx * 0.97, ly - lineH * 0.5, dx * 1.94, lineH);
		gfx.endFill();
	}

	// Thin bright rim
	gfx.lineStyle(1.5, 0xFF80FF, 0.7);
	gfx.beginFill(0, 0);
	gfx.drawCircle(cx, cy, R * 2.0);
	gfx.endFill();
}

// ── Synthwave helper: perspective grid on the ground ─────────────────────
function drawPerspectiveGrid(gfx) {
	gfx.clear();
	if (!SYNTHWAVE_MODE) return;

	var vx = 650, vy = 400, bY = 710;
	var numV    = 18;
	var spreadW = 1300;

	// Radiating lines from vanishing point
	for (var vi = 0; vi <= numV; vi++) {
		var bx   = vx + (vi - numV / 2) * (spreadW / numV);
		var prog = Math.abs(vi - numV / 2) / (numV / 2); // 0=center, 1=edge
		var alpha = 0.55 - prog * 0.3;
		gfx.lineStyle(1, 0xFF1493, alpha);
		gfx.moveTo(vx, vy);
		gfx.lineTo(bx, bY);
	}

	// Horizontal lines – exponentially crowded toward horizon
	var numH = 12;
	for (var hi = 1; hi <= numH; hi++) {
		var t     = Math.pow(hi / numH, 2.2);
		var lineY = vy + t * (bY - vy);
		var lineW = t * spreadW;
		var alpha  = 0.15 + t * 0.45;
		gfx.lineStyle(1, 0xFF1493, alpha);
		gfx.moveTo(vx - lineW / 2, lineY);
		gfx.lineTo(vx + lineW / 2, lineY);
	}
}

function update() {

	// ── Day / Night Cycle ───────────────────────────────────────────────
	dayNightTimer++;
	var phase, nightAlpha;

	if (SYNTHWAVE_MODE) {
		phase      = 0.22;     // frozen at dusk – permanent synthwave sky
		nightAlpha = 0.38;     // stars faintly visible at all times

		fond.tint  = rgbToPhaser(90, 10, 110);   // deep purple sky
		fond2.tint = rgbToPhaser(30, 4,  50);    // near-black ground

		starsLayer.alpha = nightAlpha;
		game.stage.backgroundColor = rgbToCSS(10, 3, 22);
	} else {
		phase = (dayNightTimer % CYCLE_FRAMES) / CYCLE_FRAMES;
		var tint  = getDayNightTint(phase);
		currentTintHex = rgbToPhaser(tint.r, tint.g, tint.b);

		fond.tint  = currentTintHex;
		fond2.tint = currentTintHex;

		nightAlpha = 0;
		if (phase > 0.25 && phase < 0.75) {
			nightAlpha = Math.sin((phase - 0.25) / 0.5 * Math.PI);
		}
		starsLayer.alpha = nightAlpha;

		var bgR = Math.floor(lerp(67,  5,  nightAlpha));
		var bgG = Math.floor(lerp(169, 5,  nightAlpha));
		var bgB = Math.floor(lerp(223, 30, nightAlpha));
		game.stage.backgroundColor = rgbToCSS(bgR, bgG, bgB);
	}
	// ────────────────────────────────────────────────────────────────────

	// ── Shooting Stars ───────────────────────────────────────────────────────
	// Spawn a new star only while the night phase is visible
	if (nightAlpha > 0.05) {
		shootingStarTimer++;
		var spawnInterval = (pi[shootingStarPiIdx % (pi.length - 10)] + 1) * 15;
		if (shootingStarTimer >= spawnInterval) {
			shootingStarTimer = 0;
			shootingStars.push(spawnShootingStar());
		}
	}

	// Advance and draw every active shooting star
	shootingStarGfx.clear();
	for (var si = shootingStars.length - 1; si >= 0; si--) {
		var star = shootingStars[si];
		star.trail.push({ x: star.x, y: star.y });
		if (star.trail.length > 10) { star.trail.shift(); }
		star.x  += star.dx;
		star.y  += star.dy;
		star.life++;

		var fadeOut = Math.max(0, 1 - star.life / star.maxLife);
		var visible = fadeOut * nightAlpha;

		if (visible > 0.02 && star.trail.length > 1) {
			var swGlow = SYNTHWAVE_MODE ? 0xFF00CC : 0xCCE0FF;
			var swCore = SYNTHWAVE_MODE ? 0x00FFEE : 0xFFFFFF;
			for (var ti = 1; ti < star.trail.length; ti++) {
				var progress = ti / star.trail.length;
				// Glow pass
				shootingStarGfx.lineStyle(4, swGlow, progress * visible * 0.35);
				shootingStarGfx.moveTo(star.trail[ti - 1].x, star.trail[ti - 1].y);
				shootingStarGfx.lineTo(star.trail[ti].x,     star.trail[ti].y);
				// Core pass
				shootingStarGfx.lineStyle(1, swCore, progress * visible * 0.95);
				shootingStarGfx.moveTo(star.trail[ti - 1].x, star.trail[ti - 1].y);
				shootingStarGfx.lineTo(star.trail[ti].x,     star.trail[ti].y);
			}
			// Head dot
			shootingStarGfx.lineStyle(0);
			shootingStarGfx.beginFill(swCore, visible);
			shootingStarGfx.drawCircle(star.x, star.y, 3);
			shootingStarGfx.endFill();
		}

		if (star.life >= star.maxLife ||
			star.x > 1400 || star.x < -100 ||
			star.y > 400  || star.y < -50) {
			shootingStars.splice(si, 1);
		}
	}
	// ─────────────────────────────────────────────────────────────────────────

	// ── Sun & Moon / Retro Sun ───────────────────────────────────────────────
	celestialLayer.clear();

	if (SYNTHWAVE_MODE) {
		// Retro synthwave sun: stationary at horizon center, half below
		drawRetroSun(celestialLayer);
		drawPerspectiveGrid(gridLayer);
	} else {
		// Day  = phase 0.75 → 1.0 → 0.0 → 0.25 (wraps through 0)
		// Night = phase 0.25 → 0.75
		var isDaytime = (phase < 0.25 || phase > 0.75);
		gridLayer.clear();

		if (isDaytime) {
			var dayNorm = phase > 0.75 ? (phase - 0.75) / 0.5 : (phase + 0.25) / 0.5;
			var sunX    = dayNorm * 1200 + 50;
			var sunY    = 370 - Math.sin(dayNorm * Math.PI) * 300;
			var sunVis  = Math.min(dayNorm / 0.12, (1.0 - dayNorm) / 0.12, 1.0);
			celestialLayer.beginFill(0xFFEE88, sunVis * 0.22);
			celestialLayer.drawCircle(sunX, sunY, 90);
			celestialLayer.endFill();
			celestialLayer.beginFill(0xFFDD44, sunVis);
			celestialLayer.drawCircle(sunX, sunY, 46);
			celestialLayer.endFill();
		} else {
			var moonNorm = (phase - 0.25) / 0.5;
			var moonX    = moonNorm * 1200 + 50;
			var moonY    = 370 - Math.sin(moonNorm * Math.PI) * 290;
			celestialLayer.beginFill(0xCCDDFF, nightAlpha * 0.18);
			celestialLayer.drawCircle(moonX, moonY, 62);
			celestialLayer.endFill();
			celestialLayer.beginFill(0xF0F5FF, nightAlpha);
			celestialLayer.drawCircle(moonX, moonY, 30);
			celestialLayer.endFill();
		}
	}
	// ─────────────────────────────────────────────────────────────────────────

	timer++;

	if (timer > (pi[decimal+1])*densityDivider) {

		decimal++;
		timer = 0;
		digitCounts[pi[decimal]]++;   // feed the frequency histogram
		nuages.push(game.add.tileSprite(-200, 400-(pi[decimal]*34-15), 768, 312, 'nuage'));
		nuages[decimal].anchor.x = 0.7;
		nuages[decimal].anchor.y = 0.5;
		nuages[decimal].scale.setTo((pi[decimal])/10, (pi[decimal])/10);
		nuages[decimal].alpha = 0.9;
		nuages2.push(game.add.tileSprite(-200, 400+(pi[decimal]*34-15), 768, 312, 'nuage2'));
		nuages2[decimal].anchor.x = 0.7;
		nuages2[decimal].anchor.y = 0.5;
		nuages2[decimal].scale.setTo((pi[decimal])/10, (pi[decimal])/10);
		nuages[decimal].alpha = 0.99;

		// Enable click-to-reveal on this cloud
		nuages[decimal].inputEnabled = true;
		nuages[decimal].piDigit     = pi[decimal];
		nuages[decimal].piIndex     = decimal;
		nuages[decimal].events.onInputDown.add(function(sprite) {
			showDigitPopup(sprite.x, sprite.y - 60, sprite.piDigit, sprite.piIndex);
		});

		// Push this digit onto the top ticker strip
		addTickerItem(pi[decimal]);

		// Play the note for this digit
		playDigitNote(pi[decimal]);

		// Update live Pi digit counter
		piCounterText.setText('\u03C0[' + decimal + '] = ' + pi[decimal]);

		switch(pi[decimal]) {
		case 0:
			order0.add(nuages[decimal]);
			order0.add(nuages2[decimal]);
			spawnRain();              // digit 0 → rain shower
			triggerLightning(decimal); // + Pi-seeded lightning bolt + flash
			break;
		case 1:
			order1.add(nuages[decimal]);
			order1.add(nuages2[decimal]);
			break;
		case 2:
			order2.add(nuages[decimal]);
			order2.add(nuages2[decimal]);
			break;
		case 3:
			order3.add(nuages[decimal]);
			order3.add(nuages2[decimal]);
			break;
		case 4:
			order4.add(nuages[decimal]);
			order4.add(nuages2[decimal]);
			break;
		case 5:
			order5.add(nuages[decimal]);
			order5.add(nuages2[decimal]);
			break;
		case 6:
			order6.add(nuages[decimal]);
			order6.add(nuages2[decimal]);
			break;
		case 7:
			order7.add(nuages[decimal]);
			order7.add(nuages2[decimal]);
			break;
		case 8:
			order8.add(nuages[decimal]);
			order8.add(nuages2[decimal]);
			break;
		case 9:
			order9.add(nuages[decimal]);
			order9.add(nuages2[decimal]);
			break;
		}

		// Play the note for this Pi digit
		playDigitNote(pi[decimal]);
	}

	while (jj <= decimal ) {
		if (nuages[jj].x > 1800) {
			nuages[jj].destroy();
		}
		nuages[jj].x  += (pi[jj])/Math.abs(velocityDivider);
		nuages2[jj].x += (pi[jj])/Math.abs(velocityDivider);
		// Chromatic tint: each digit's hue, dimmed by the night factor
		var ct = digitTint(pi[jj], nightAlpha);
		nuages[jj].tint  = ct;
		nuages2[jj].tint = ct;
		jj++;
	}
	jj = 0;

	// Place celestial layer above stars but below all cloud groups
	game.world.bringToTop(celestialLayer);

	// Scroll ticker items leftward; remove those that exit the canvas
	for (var ti = tickerItems.length - 1; ti >= 0; ti--) {
		tickerItems[ti].x -= 1.5;
		if (tickerItems[ti].x < -20) {
			tickerItems[ti].destroy();
			tickerItems.splice(ti, 1);
		}
	}

	// Refresh the Pi index counter in the HUD
	if (decimal >= 0) {
		hudText.setText('\u03C0[' + decimal + ']=' + pi[decimal]);
	}

	game.world.bringToTop(order0);
	game.world.bringToTop(order1);
	game.world.bringToTop(order2);
	game.world.bringToTop(order3);
	game.world.bringToTop(order4);
	game.world.bringToTop(order5);
	game.world.bringToTop(order6);
	game.world.bringToTop(order7);
	game.world.bringToTop(order8);
	game.world.bringToTop(order9);
	game.world.bringToTop(rainGraphics);   // rain in front of clouds
	fond2.bringToTop();                    // ground always on top of rain
	game.world.bringToTop(gridLayer);      // SW grid drawn on top of ground

	// ── Rain rendering ────────────────────────────────────────────────
	var rainColor = SYNTHWAVE_MODE ? 0xFF44CC : 0xAADDFF;
	rainGraphics.clear();
	for (var ri = rainDrops.length - 1; ri >= 0; ri--) {
		var drop = rainDrops[ri];
		drop.x  += drop.vx;
		drop.y  += drop.vy;
		drop.life++;
		if (drop.life >= drop.maxLife || drop.y > 393) {
			rainDrops.splice(ri, 1);
			continue;
		}
		var fadeStart = drop.maxLife * 0.75;
		var dropAlpha = drop.alpha;
		if (drop.life > fadeStart) {
			dropAlpha *= 1 - (drop.life - fadeStart) / (drop.maxLife - fadeStart);
		}
		rainGraphics.lineStyle(1.5, rainColor, dropAlpha);
		rainGraphics.moveTo(drop.x, drop.y);
		rainGraphics.lineTo(drop.x - drop.vx * drop.len * 0.4, drop.y - drop.len);
	}
	// ─────────────────────────────────────────────────────────────────
	// Ticker band sits above the water layer
	game.world.bringToTop(tickerBgGfx);
	game.world.bringToTop(tickerGroup);

	// Redraw keyboard and keep it on top of everything
	drawKeyboard();
	game.world.bringToTop(uiGroup);
	// HUD on the very top so it's always readable
	hudText.bringToTop();

	// ── Histogram: redraw and raise above everything ───────────────────────
	drawHistogram();
	game.world.bringToTop(histGfx);
	for (var hl = 0; hl < histLabels.length; hl++) {
		histLabels[hl].bringToTop();
	}
	// ──────────────────────────────────────────────────────────────────────

	// ── Lightning & Flash update ───────────────────────────────────────────
	if (lightningTimer > 0) {
		lightningTimer--;
		if (lightningTimer === 0) {
			lightningGraphics.clear();
		}
	}
	if (flashAlpha > 0) {
		flashAlpha = Math.max(0, flashAlpha - 0.055);
		flashGraphics.clear();
		var flashColor = SYNTHWAVE_MODE ? 0xFF0099 : 0xFFFFFF;
		var flashStrength = SYNTHWAVE_MODE ? flashAlpha * 0.7 : flashAlpha;
		flashGraphics.beginFill(flashColor, flashStrength);
		flashGraphics.drawRect(0, 0, 1300, 700);
		flashGraphics.endFill();
	} else {
		flashGraphics.clear();
	}
	game.world.bringToTop(lightningGraphics);
	game.world.bringToTop(flashGraphics);
	// ──────────────────────────────────────────────────────────────────────
}


  </script>

	<button id="themeBtn" onclick="toggleTheme()" title="Toggle Synthwave theme" style="
