/* ---- Theme switcher ---- */

  width: 1300px;
  height: 700px;

}

/* Large retro sun — half-circle sitting at the horizon */

  position: absolute;
  width: 280px;
  height: 140px;
  top: 262px; /* horizon y=400, sun top = 400 - 140 = 260, slight visual tweak */
  left: 510px;
  background: linear-gradient(
    to bottom,
    #ffe066 0%,
    #ff9900 18%,
    #ff5500 38%,
    #ff0055 60%,
    #aa0077 80%,
    #550088 100%
  );
  border-radius: 140px 140px 0 0;
  overflow: hidden;

    0 0 100px rgba(255,85,0,0.55),
    0 0 200px rgba(255,0,85,0.25);
}

#synth-sun::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: repeating-linear-gradient(
    0deg,
    transparent 0px,
    transparent 8px,

  );
}

    rgba(255,204,0,1)  70%,
    rgba(255,85,0,0.5) 90%,
    transparent        100%
  );

    0 0 18px rgba(255,204,0,0.9),
    0 0 40px rgba(255,102,0,0.6),
    0 -2px 8px rgba(255,255,255,0.6);
}

  position: absolute;
  top: 400px; left: 0;
  width: 1300px;
  height: 300px;
  overflow: hidden;
}

#synth-grid-inner {
  position: absolute;
  bottom: 0;
  width: 400%;
  height: 1100px;
  left: -150%;

#synth-chrome {

  height: 300px;
  background: repeating-linear-gradient(
    90deg,
    rgba(200,200,255,0.0) 0%,
    rgba(200,200,255,0.07) 25%,
    rgba(255,180,255,0.12) 50%,
