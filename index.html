	var lbl = document.getElementById('ticker-label');
	if (lbl) lbl.textContent = constantLabels[name].symbol + ' =';
	updateTicker();
}

function updateTicker() {
	var el = document.getElementById('ticker-digits');
	if (!el) return;
	var recent = digitHistory.slice(-60);
	el.textContent = recent.join(' ');

	var pos = document.getElementById('ticker-pos');
	if (pos) pos.textContent = 'digit #' + (decimal + 1);
}

// Keyboard shortcut: 1=π  2=e  3=φ  4=√2
document.addEventListener('keydown', function(e) {
	var map = { '1':'pi', '2':'e', '3':'phi', '4':'sqrt2' };
	if (map[e.key]) switchConstant(map[e.key]);
});

// ── Phaser lifecycle ─────────────────────────────────────────────────────────
function preload() {
	game.load.image('nuage', 'nuage.png');
	game.load.image('nuage2','nuage2.png');
	game.load.image('field', 'field.png');
	game.load.image('fond',  'fond.png');
	game.load.image('fond2', 'fond2.png');
}

function create() {
	game.time.desiredFps = 30;
	game.stage.backgroundColor = skyColors['pi'];
	fond  = game.add.tileSprite(0,   0, 1300, 400, 'fond');
	fond2 = game.add.tileSprite(0, 400, 1300, 300, 'fond2');
	order0 = game.add.group();
	order1 = game.add.group();
	order2 = game.add.group();
	order3 = game.add.group();
	order4 = game.add.group();
	order5 = game.add.group();
	order6 = game.add.group();
	order7 = game.add.group();
	order8 = game.add.group();
	order9 = game.add.group();
	fond2.alpha = 0.9;
}

function update() {
	timer++;

	if (timer > (pi[decimal+1]) * densityDivider) {
		decimal++;
		timer = 0;

		// Track digit history for the ticker
		digitHistory.push(pi[decimal]);
		if (digitHistory.length > 120) digitHistory.shift();
		updateTicker();

		nuages.push(game.add.tileSprite(-200, 400-(pi[decimal]*34-15), 768, 312, 'nuage'));
		nuages[decimal].anchor.x = 0.7;
		nuages[decimal].anchor.y = 0.5;
		nuages[decimal].scale.setTo((pi[decimal])/10, (pi[decimal])/10);
		nuages[decimal].alpha = 0.99;
		nuages2.push(game.add.tileSprite(-200, 400+(pi[decimal]*34-15), 768, 312, 'nuage2'));
		nuages2[decimal].anchor.x = 0.7;
		nuages2[decimal].anchor.y = 0.5;
		nuages2[decimal].scale.setTo((pi[decimal])/10, (pi[decimal])/10);

		switch(pi[decimal]) {
		case 0: order0.add(nuages[decimal]); order0.add(nuages2[decimal]); break;
		case 1: order1.add(nuages[decimal]); order1.add(nuages2[decimal]); break;
		case 2: order2.add(nuages[decimal]); order2.add(nuages2[decimal]); break;
		case 3: order3.add(nuages[decimal]); order3.add(nuages2[decimal]); break;
		case 4: order4.add(nuages[decimal]); order4.add(nuages2[decimal]); break;
		case 5: order5.add(nuages[decimal]); order5.add(nuages2[decimal]); break;
		case 6: order6.add(nuages[decimal]); order6.add(nuages2[decimal]); break;
		case 7: order7.add(nuages[decimal]); order7.add(nuages2[decimal]); break;
		case 8: order8.add(nuages[decimal]); order8.add(nuages2[decimal]); break;
		case 9: order9.add(nuages[decimal]); order9.add(nuages2[decimal]); break;
		}
	}

	while (jj <= decimal) {
		if (nuages[jj] && nuages[jj].alive) {
			if (nuages[jj].x > 1800) {
				nuages[jj].destroy();
			} else {
				nuages[jj].x += (pi[jj]) / Math.abs(velocityDivider);
			}
		}
		if (nuages2[jj] && nuages2[jj].alive) {
			nuages2[jj].x += (pi[jj]) / Math.abs(velocityDivider);
		}
		jj++;
	}
	jj = 0;

	game.world.bringToTop(order0);
	game.world.bringToTop(order1);
	game.world.bringToTop(order2);
	game.world.bringToTop(order3);
	game.world.bringToTop(order4);
	game.world.bringToTop(order5);
	game.world.bringToTop(order6);
	game.world.bringToTop(order7);
	game.world.bringToTop(order8);
	game.world.bringToTop(order9);
	fond2.bringToTop();
}
	</script>
</head>
<body style="background-color: rgb(67,136,170);">
	<div id="game" style="
		cursor: none;
		position: absolute;
		TOP: 0px;
		LEFT: 0px;
		image-rendering: optimizeSpeed;
		image-rendering: -moz-crisp-edges;
		image-rendering: -o-crisp-edges;
		image-rendering: -webkit-optimize-contrast;
		image-rendering: optimize-contrast;
		-ms-interpolation-mode: nearest-neighbor;
		image-rendering: pixelated;">
	</div>

	<!-- ── Constant-switcher panel ─────────────────────────────────── -->
	<div id="constant-panel">
		<div class="panel-label">Mathematical Constant</div>
		<div class="current-symbol" id="current-symbol">π</div>
		<div class="current-name"   id="current-name">Pi</div>
		<div class="buttons">
			<button data-name="pi"    class="active" onclick="switchConstant('pi')">π</button>
			<button data-name="e"              onclick="switchConstant('e')">e</button>
			<button data-name="phi"            onclick="switchConstant('phi')">φ</button>
			<button data-name="sqrt2"          onclick="switchConstant('sqrt2')">√2</button>
		</div>
		<div class="hint">keys 1 · 2 · 3 · 4</div>
	</div>

	<!-- ── Live digit ticker ──────────────────────────────────────── -->
	<div id="digit-ticker">
		<span class="ticker-label" id="ticker-label">π =</span>
		<span class="ticker-digits" id="ticker-digits"></span>
		<span class="ticker-pos"   id="ticker-pos">digit #0</span>
	</div>
</body>
</html>
